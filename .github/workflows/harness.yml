name: Quality Harness

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - run: npm run harness:check

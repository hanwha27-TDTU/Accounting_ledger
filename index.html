          if (existingTxIds.has(txId)) replaced++; else created++;
          const tx = { id: txId, business_id: businessId, business_site_id: state.site?.id || null, transaction_date: r.date, recognition_date: r.date, transaction_type: type, description: r.description || '(내용 없음)', counterparty_id: cp?.id || null, account_id: acct.id, supply_amount: supply, vat_amount: vat, total_amount: supply + vat, vat_type: vat > 0 ? 'taxable' : 'exempt', evidence_status: /카드|현금영수증|세금계산서|계산서/.test(r.note || '') ? 'attached' : 'not_attached', payment_status: 'paid', review_status: SimpleBookAccounts.find(r.account) ? 'normal' : 'requires_review', source_channel: 'simple_book_import', source_revision: 1, posting_rule_version: APP_INFO.postingRuleVersion, created_at: now, updated_at: now, deleted_at: null };
          const journal = { id: Utils.deterministicId(`${txId}|journal`), business_id: businessId, source_transaction_id: txId, entry_date: r.date, status: 'generated', generated_from: 'source_transaction', posting_rule_version: APP_INFO.postingRuleVersion, memo: tx.description, created_at: now, updated_at: now, deleted_at: null };
          let lines;
          try { lines = AccountingDomain.buildPosting(tx, map).map(l => ({ ...l, id: Utils.deterministicId(`${txId}|line|${l.sort_order}`), journal_entry_id: journal.id })); }
          catch (e) { unbalanced++; continue; }
          if (AccountingDomain.validateJournal(lines).status !== 'pass') { unbalanced++; continue; }
          txns.push(tx); journals.push(journal); allLines.push(...lines);
        }
        if (!txns.length) return { created: 0, replaced: 0, unbalanced, skipped, total: 0, newAccounts: 0 };
        const audit = this.audit('import', businessId, 'create', null, { rows: txns.length, channel: 'simple_book_import' }, `간편장부 가져오기 ${txns.length}건`);
        const queueRows = [
          ...newAccounts.map(a => this.queue('accounts', this.remoteSafeAccount(a))),
          ...newCounterparties.map(c => this.queue('counterparties', c)),
          ...txns.map(t => this.queue('source_transactions', t)),
          ...journals.map(j => this.queue('journal_entries', j)),
          ...allLines.map(l => this.queue('journal_entry_lines', l)),
          this.queue('audit_logs', audit)
        ];
        await storage.putMany({
          ...(newAccounts.length ? { accounts: newAccounts } : {}),
          ...(newCounterparties.length ? { counterparties: newCounterparties } : {}),
          source_transactions: txns, journal_entries: journals, journal_entry_lines: allLines,
          audit_logs: [audit], sync_queue: queueRows
        });
        await this.reload();
        return { created, replaced, unbalanced, skipped, total: txns.length, newAccounts: newAccounts.length };
      },

      audit(entityType, entityId, action, beforeData, afterData, reason) {
        return { id: Utils.uuid(), business_id: state.business?.id || afterData?.business_id || null, actor_user_id: state.session?.user?.id || null, entity_type: entityType, entity_id: entityId, action, before_data: beforeData, after_data: afterData, reason, created_at: Utils.now() };
      },

      queue(entityType, payload) {
        const now = Utils.now();
        return { id: Utils.uuid(), entity_type: entityType, entity_id: payload.id, operation: 'upsert', payload, status: 'pending', retry_count: 0, last_error: null, created_at: now, updated_at: now, deleted_at: null };
      },

      tombstone(entityType, entityId) {
        const now = Utils.now();
        return { id: Utils.uuid(), entity_type: entityType, entity_id: entityId, business_id: state.business?.id || null, deleted_at: now, deleted_by_device_id: this.deviceId(), reason: 'user_delete', created_at: now };
      },

      // Soft delete a source transaction with its journal entry and lines, keeping an audit trail,
      // tombstones for delete sync, and sync-queue upserts so the cloud row is also marked deleted.
      async deleteTransaction(transactionId) {
        const transaction = state.transactions.find(row => row.id === transactionId && !row.deleted_at);
        if (!transaction) throw new Error('TRANSACTION_NOT_FOUND');
        const now = Utils.now();
        const soft = row => ({ ...row, deleted_at: now, updated_at: now });
        const journals = state.journals.filter(row => row.source_transaction_id === transactionId && !row.deleted_at);
        const journalIds = new Set(journals.map(row => row.id));
        const lines = state.journalLines.filter(row => journalIds.has(row.journal_entry_id) && !row.deleted_at);
        const deletedTx = soft(transaction);
        const deletedJournals = journals.map(soft);
        const deletedLines = lines.map(soft);
        const tombstones = [
          this.tombstone('source_transactions', transaction.id),
          ...deletedJournals.map(row => this.tombstone('journal_entries', row.id)),
          ...deletedLines.map(row => this.tombstone('journal_entry_lines', row.id))
        ];
        const audit = this.audit('source_transaction', transaction.id, 'delete', transaction, deletedTx, '거래 삭제');
        const queueRows = [
          this.queue('source_transactions', deletedTx),
          ...deletedJournals.map(row => this.queue('journal_entries', row)),
          ...deletedLines.map(row => this.queue('journal_entry_lines', row)),
          this.queue('audit_logs', audit)
        ];
        await storage.putMany({
          source_transactions: [deletedTx],
          ...(deletedJournals.length ? { journal_entries: deletedJournals } : {}),
          ...(deletedLines.length ? { journal_entry_lines: deletedLines } : {}),
          audit_logs: [audit],
          tombstones,
          sync_queue: queueRows
        });
        await this.reload();
        return { deletedTransaction: 1, deletedJournals: deletedJournals.length, deletedLines: deletedLines.length };
      },

      // Bulk delete: clear every ledger store on this device. Connection settings and device id (localStorage) stay.
      async clearLocalData() {
        await storage.clearAll();
        state.config.canonicalVersion = 0;
        state.config.lastSyncAt = null;
        ConfigAdapter.save(state.config);
        await this.reload();
      },

      // Store the metadata for an already-uploaded Cloudinary file and mark the transaction as attached.
      // The audit trail keeps the public_id, not the full URL (Data Privacy Guardian).
      async attachEvidence(transactionId, uploadResult, file) {
        const transaction = state.transactions.find(row => row.id === transactionId && !row.deleted_at);
        if (!transaction) throw new Error('TRANSACTION_NOT_FOUND');
        const now = Utils.now();
        const evidence = {
          id: Utils.uuid(), business_id: transaction.business_id, evidence_document_id: null,
          source_transaction_id: transaction.id, storage_provider: 'cloudinary',
          cloudinary_public_id: uploadResult.public_id || null, resource_type: uploadResult.resource_type || null,
          secure_url: uploadResult.secure_url || null,
          thumbnail_url: CloudinaryAdapter.thumbnailUrl(uploadResult.secure_url, uploadResult.resource_type),
          original_filename: file.name || null, mime_type: file.type || null,
          file_size: uploadResult.bytes || file.size || null, file_hash: null,
          page_count: uploadResult.pages || null, preview_status: 'ready',
          future_ocr_text: null, manual_summary: null, future_ai_summary: null, future_ai_status: 'not_configured',
          upload_status: 'uploaded', delete_status: null,
          created_at: now, updated_at: now, deleted_at: null
        };
        const updatedTx = { ...transaction, evidence_status: 'attached', updated_at: now };
        const audit = this.audit('evidence_file', evidence.id, 'create', null, { id: evidence.id, source_transaction_id: transaction.id, cloudinary_public_id: evidence.cloudinary_public_id }, '증빙 첨부');
        const queueRows = [this.queue('evidence_files', evidence), this.queue('source_transactions', updatedTx), this.queue('audit_logs', audit)];
        await storage.putMany({ evidence_files: [evidence], source_transactions: [updatedTx], audit_logs: [audit], sync_queue: queueRows });
        await this.reload();
        return evidence;
      },

      // Remove an evidence link: soft-delete the metadata + tombstone (converges across devices), and if the
      // transaction has no other evidence, mark it not_attached. The Cloudinary original is not deleted here
      // (that needs a signed API); we flag it as unlinked for a future server-side cleanup.
      async removeEvidence(evidenceId) {
        const evidence = state.evidenceFiles.find(row => row.id === evidenceId && !row.deleted_at);
        if (!evidence) throw new Error('EVIDENCE_NOT_FOUND');
        const now = Utils.now();
        const deleted = { ...evidence, deleted_at: now, updated_at: now, delete_status: 'unlinked' };
        const tombstone = this.tombstone('evidence_files', evidence.id);
        const audit = this.audit('evidence_file', evidence.id, 'delete', { id: evidence.id, cloudinary_public_id: evidence.cloudinary_public_id }, { id: evidence.id, deleted_at: now }, '증빙 제거');
        const queueRows = [this.queue('evidence_files', deleted), this.queue('audit_logs', audit)];
        const putPayload = { evidence_files: [deleted], audit_logs: [audit], tombstones: [tombstone], sync_queue: queueRows };
        const tx = state.transactions.find(row => row.id === evidence.source_transaction_id && !row.deleted_at);
        const stillAttached = state.evidenceFiles.some(row => row.source_transaction_id === evidence.source_transaction_id && !row.deleted_at && row.id !== evidence.id);
        if (tx && !stillAttached) {
          const updatedTx = { ...tx, evidence_status: 'not_attached', updated_at: now };
          putPayload.source_transactions = [updatedTx];
          queueRows.push(this.queue('source_transactions', updatedTx));
        }
        await storage.putMany(putPayload);
        await this.reload();
        return { detachedTransaction: tx && !stillAttached ? 1 : 0 };
      },

      async exportBackup() {
        const tables = await storage.snapshot();
        return {
          backupSchemaVersion: APP_INFO.backupSchemaVersion,
          appVersion: APP_INFO.version,
          schemaVersion: APP_INFO.schemaVersion,
          createdAt: Utils.now(),
          deviceId: this.deviceId(),
          canonicalVersion: Number(state.config.canonicalVersion || 0),
          tables,
          warnings: ['이 파일에는 거래처와 세무자료가 포함될 수 있습니다. 공개 저장소나 공유 폴더에 올리지 마세요.']
        };
      },

      async restoreBackup(backup) {
        if (!backup || backup.backupSchemaVersion !== APP_INFO.backupSchemaVersion || !backup.tables) throw new Error('BACKUP_SCHEMA_UNSUPPORTED');
        const recordsByStore = {};
        for (const store of LOCAL_STORES) {
          const rows = backup.tables[store];
          if (rows !== undefined && !Array.isArray(rows)) throw new Error(`BACKUP_TABLE_INVALID:${store}`);
          recordsByStore[store] = rows || [];
        }
        for (const store of LOCAL_STORES) await storage.replaceStore(store, recordsByStore[store]);
        state.config.canonicalVersion = Number(backup.canonicalVersion || 0);
        ConfigAdapter.save(state.config);
        await this.reload();
      },

      deviceId() {
        if (!state.config.deviceId) {
          state.config.deviceId = Utils.uuid();
          ConfigAdapter.save(state.config);
        }
        return state.config.deviceId;
      }
    });

    const SyncService = Object.freeze({
      async runConnectionDiagnostics() {
        state.connectionDiagnostics = { ...state.connectionDiagnostics, status: 'checking', detail: null };
        renderShellStatus();
        try {
          state.connectionDiagnostics = { status: 'complete', ...(await remote.diagnose()) };
        } catch (error) {
          state.connectionDiagnostics = {
            status: 'error', api: 'error', anonymousIsolation: 'unknown', googleProvider: 'unknown',
            checkedAt: Utils.now(), detail: error.message
          };
        }
        renderShellStatus();
        if (state.route === 'settings' || state.route === 'developer' || state.route === 'guide') render();
        return state.connectionDiagnostics;
      },
      async initializeAuth() {
        if (!remote.isConfigured()) return;
        try {
          state.session = await remote.session();
          if (state.session) { state.allowedUser = await remote.checkAllowed(state.session); await this.loadAllowedUsers(); }
        } catch (error) {
          state.syncError = error.message;
          if (error.message === 'AUTH_EMAIL_NOT_ALLOWED') {
            try { await remote.signOut(); } catch { /* keep original denial */ }
            state.session = null;
            state.allowedUser = null;
          }
        }
      },

      async connectAndSync() {
        if (!remote.isConfigured()) throw new Error('SUPABASE_NOT_CONFIGURED');
        state.syncStatus = 'syncing'; renderShellStatus();
        state.session = await remote.session();
        if (!state.session) throw new Error('AUTH_REQUIRED');
        state.allowedUser = await remote.checkAllowed(state.session);
        await this.loadAllowedUsers();
        await this.syncNow();
      },

      async syncNow() {
        if (!state.session) throw new Error('AUTH_REQUIRED');
        state.syncStatus = 'syncing'; state.syncError = null; renderShellStatus();
        try {
          const meta = await remote.syncMeta();
          const cloudCanonical = Number(meta.canonical_version?.value || 0);
          const localCanonical = Number(state.config.canonicalVersion || 0);
          if (cloudCanonical > localCanonical) {
            const cloudByTable = {};
            for (const table of SYNC_TABLE_ORDER) cloudByTable[table] = (await remote.pullTable(table)) || [];
            // Empty-cloud guard: a real canonical final always carries the owner's business. If the pull
            // returns no business while we hold one locally, treat it as an RLS/auth failure and refuse to
            // wipe local data (protects against a broken empty response silently deleting everything).
            const localBusinesses = await storage.getAll('businesses');
            if (localBusinesses.some(row => !row.deleted_at) && cloudByTable.businesses.length === 0) {
              throw new Error('EMPTY_CLOUD_GUARD');
            }
            for (const table of SYNC_TABLE_ORDER) await storage.replaceStore(table, cloudByTable[table]);
            const pending = await storage.getAll('sync_queue');
            const completedAt = Utils.now();
            await storage.replaceStore('sync_queue', pending.map(row => ({ ...row, status: 'superseded_by_canonical', updated_at: completedAt })));
            state.config.canonicalVersion = cloudCanonical;
          } else {
            const queue = (await storage.getAll('sync_queue')).filter(row => row.status === 'pending' && !row.deleted_at);
            queue.sort((a,b) => SYNC_TABLE_ORDER.indexOf(a.entity_type) - SYNC_TABLE_ORDER.indexOf(b.entity_type));
            for (const item of queue) {
              try {
                const payload = item.entity_type === 'accounts' ? AppService.remoteSafeAccount(item.payload) : item.payload;
                await remote.upsert(item.entity_type, payload);
                await storage.put('sync_queue', { ...item, status: 'complete', updated_at: Utils.now(), last_error: null });
              } catch (error) {
                await storage.put('sync_queue', { ...item, retry_count: Number(item.retry_count || 0) + 1, last_error: error.message, updated_at: Utils.now() });
                throw error;
              }
            }
            for (const table of SYNC_TABLE_ORDER) {
              const [localRows, cloudRows] = await Promise.all([storage.getAll(table), remote.pullTable(table)]);
              const merged = new Map(localRows.map(row => [row.id, row]));
              for (const remoteRow of cloudRows) merged.set(remoteRow.id, Utils.latestByUpdatedAt(merged.get(remoteRow.id), remoteRow));
              await storage.replaceStore(table, [...merged.values()]);
            }
          }
          await this.convergeTombstones();
          state.config.lastSyncAt = Utils.now();
          state.config.canonicalVersion = cloudCanonical;
          ConfigAdapter.save(state.config);
          state.syncStatus = 'complete';
          await AppService.reload();
        } catch (error) {
          state.syncStatus = 'error'; state.syncError = error.message; throw error;
        } finally {
          renderShellStatus();
        }
      },

      // Delete convergence: upload local tombstones the cloud lacks, pull cloud tombstones,
      // and apply every tombstone as a local soft-delete so a delete on one device reaches all devices.
      // RLS hides soft-deleted rows from pullTable, so tombstones are the only cross-device delete signal.
      async convergeTombstones() {
        const cloud = (await remote.pullTombstones()) || [];
        const cloudIds = new Set(cloud.map(row => row.id));
        const local = await storage.getAll('tombstones');
        const localIds = new Set(local.map(row => row.id));
        const toPush = local.filter(row => !cloudIds.has(row.id));
        if (toPush.length) await remote.pushTombstones(toPush);
        const newFromCloud = cloud.filter(row => !localIds.has(row.id));
        const updatesByStore = {};
        for (const stone of [...local, ...newFromCloud]) {
          if (!SYNC_TABLE_ORDER.includes(stone.entity_type)) continue;
          const row = await storage.get(stone.entity_type, stone.entity_id);
          if (row && !row.deleted_at) (updatesByStore[stone.entity_type] ||= []).push({ ...row, deleted_at: stone.deleted_at, updated_at: stone.deleted_at });
        }
        const payload = { ...updatesByStore };
        if (newFromCloud.length) payload.tombstones = newFromCloud;
        if (Object.keys(payload).length) await storage.putMany(payload);
      },

      async runBusinessRoundtrip() {
        if (!state.session) throw new Error('AUTH_REQUIRED');
        try {
          state.businessRoundtrip = await remote.businessRoundtrip();
        } catch (error) {
          state.businessRoundtrip = { status: 'error', steps: state.businessRoundtrip.steps || {}, checkedAt: Utils.now(), detail: error.message };
        }
        return state.businessRoundtrip;
      },

      accessEvent(action, targetEmail, result) {
        return { actor_user_id: state.session?.user?.id || null, actor_email: Utils.normalizeEmail(state.session?.user?.email) || null, action, target_email: targetEmail || null, result, detail: null };
      },

      async loadAllowedUsers() {
        if (!state.session) { state.allowedUsers = []; return; }
        try { state.allowedUsers = (await remote.listAllowedUsers()) || []; }
        catch { state.allowedUsers = []; }
      },

      async addAllowedUser({ email, role, label }) {
        if (!state.session) throw new Error('AUTH_REQUIRED');
        const normalized = Utils.normalizeEmail(email);
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(normalized)) throw new Error('ALLOWLIST_EMAIL_INVALID');
        const now = Utils.now();
        const row = { id: Utils.uuid(), email: normalized, role: ['owner', 'editor', 'viewer'].includes(role) ? role : 'viewer', status: 'active', label: (label || '').trim() || null, created_at: now, updated_at: now, deleted_at: null };
        await remote.insertAllowedUser(row);
        await remote.logAccessEvent(this.accessEvent('allowlist_add', normalized, 'success'));
        await this.loadAllowedUsers();
      },

      async setAllowedUserStatus(id, status) {
        if (!state.session) throw new Error('AUTH_REQUIRED');
        const target = state.allowedUsers.find(row => row.id === id);
        if (target && Utils.normalizeEmail(target.email) === Utils.normalizeEmail(APP_INFO.ownerEmail)) throw new Error('ALLOWLIST_OWNER_PROTECTED');
        await remote.updateAllowedUser(id, { status, updated_at: Utils.now() });
        await remote.logAccessEvent(this.accessEvent(status === 'active' ? 'allowlist_reactivate' : 'allowlist_revoke', target?.email, 'success'));
        await this.loadAllowedUsers();
      },

      // Designate THIS device as the cloud source of truth: upload all local rows + tombstones,
      // then bump accounting_sync_meta.canonical_version. Other devices detect the higher canonical
      // on their next sync and replace local with cloud, discarding local-only changes (AGENTS 동기화 6-9).
      async designateCanonical() {
        if (!state.session) throw new Error('AUTH_REQUIRED');
        if (!isBootstrapOwner()) throw new Error('CANONICAL_OWNER_ONLY');
        state.syncStatus = 'syncing'; state.syncError = null; renderShellStatus();
        try {
          for (const table of SYNC_TABLE_ORDER) {
            const rows = await storage.getAll(table);
            const safe = table === 'accounts' ? rows.map(row => AppService.remoteSafeAccount(row)) : rows;
            await remote.upsertMany(table, safe);
          }
          await remote.pushTombstones(await storage.getAll('tombstones'));
          const meta = await remote.syncMeta();
          const nextCanonical = Math.max(Number(meta.canonical_version?.value || 0), Number(state.config.canonicalVersion || 0)) + 1;
          await remote.setSyncMeta('canonical_version', nextCanonical);
          const now = Utils.now();
          const pending = await storage.getAll('sync_queue');
          await storage.replaceStore('sync_queue', pending.map(row => ({ ...row, status: 'superseded_by_canonical', updated_at: now })));
          state.config.canonicalVersion = nextCanonical;
          state.config.lastSyncAt = now;
          ConfigAdapter.save(state.config);
          state.syncStatus = 'complete';
          await AppService.reload();
          return nextCanonical;
        } catch (error) {
          state.syncStatus = 'error'; state.syncError = error.message; throw error;
        } finally {
          renderShellStatus();
        }
      }
    });

    // 7. View formatters and renderers
    const el = id => document.getElementById(id);
    const icon = name => `<i data-lucide="${name}" aria-hidden="true"></i>`;
    const term = name => `<button type="button" class="term-button" data-term="${Utils.escape(name)}">${Utils.escape(name)}</button>`;
    const badge = (text, kind = '') => `<span class="badge ${kind}">${Utils.escape(text)}</span>`;
    const currentYear = new Date().getFullYear();

    function refreshIcons() { try { window.lucide?.createIcons({ attrs: { 'stroke-width': 1.8 } }); } catch { /* labels remain visible */ } }
    function routeTo(route) { location.hash = route; }
    function activeTransactions() { return state.transactions.filter(row => !row.deleted_at); }
    function counterpartyName(id) { return state.counterparties.find(row => row.id === id)?.name || '-'; }
    function accountName(id) { return state.accounts.find(row => row.id === id)?.account_name || '미분류'; }
    function transactionLabel(type) { return ({ income:'수입', expense:'비용', asset_purchase:'자산구입' }[type] || type); }
    function errorMessage(error) {
      const code = String(error?.message || error);
      if (code.includes('SUPABASE_NOT_CONFIGURED')) return 'Supabase URL과 publishable key를 먼저 설정해 주세요.';
      if (code.includes('AUTH_REQUIRED')) return 'Google 로그인이 필요합니다.';
      if (code.includes('AUTH_EMAIL_NOT_ALLOWED')) return '허용되지 않은 Google 계정입니다. owner가 허용 목록에 추가해야 합니다.';
      if (code.includes('GOOGLE_PROVIDER_DISABLED') || /unsupported provider|provider is not enabled/i.test(code)) return 'Supabase에서 Google 로그인 제공자가 아직 활성화되지 않았습니다. Google Client ID와 Secret 설정이 필요합니다.';
      if (code.includes('ANONYMOUS_DATA_EXPOSED')) return '로그인하지 않은 상태에서 회계 데이터가 조회되어 연결을 중단했습니다. RLS를 점검해 주세요.';
      if (code.includes('PUBLIC_CONNECTION')) return 'Supabase 공개 연결을 확인하지 못했습니다. 네트워크와 프로젝트 설정을 확인해 주세요.';
      if (code.includes('SECRET_KEY_NOT_ALLOWED')) return '비밀키 또는 service role 형태의 키는 이 앱에 저장할 수 없습니다.';
      if (code.includes('BUSINESS_REQUIRED')) return '사업자 정보를 먼저 설정해 주세요.';
      if (code.includes('TRANSACTION_NOT_FOUND')) return '삭제할 거래를 찾지 못했습니다. 목록을 새로고침해 주세요.';
      if (code.includes('EVIDENCE_NOT_FOUND')) return '제거할 증빙을 찾지 못했습니다. 목록을 새로고침해 주세요.';
      if (code.includes('ALLOWLIST_EMAIL_INVALID')) return '올바른 이메일 형식을 입력해 주세요.';
      if (code.includes('ALLOWLIST_OWNER_PROTECTED')) return '소유자 계정은 차단할 수 없습니다.';
      if (code.includes('CANONICAL_OWNER_ONLY')) return '최종본 지정은 소유자 계정만 할 수 있습니다.';
      if (code.includes('EMPTY_CLOUD_GUARD')) return '클라우드에서 회계자료를 받지 못해(권한·연결 문제 가능) 로컬 데이터를 지키려고 최종본 적용을 중단했습니다. 로그인과 연결을 확인한 뒤 다시 시도해 주세요.';
      if (code.includes('CLOUDINARY_NOT_CONFIGURED')) return 'Cloudinary cloud name과 unsigned preset을 먼저 설정해 주세요.';
      if (code.includes('CLOUDINARY_')) return '증빙 업로드에 실패했습니다. Cloudinary 설정과 unsigned preset 허용 형식을 확인해 주세요.';
      if (code.includes('REMOTE_409')) return '이미 허용 목록에 있는 이메일이거나 중복된 값입니다.';
      if (code.includes('JOURNAL_UNBALANCED')) return '차변과 대변이 맞지 않아 거래를 저장하지 않았습니다.';
      if (code.includes('BACKUP_')) return '백업 파일 구조를 확인할 수 없어 복원하지 않았습니다.';
      return '작업을 완료하지 못했습니다. 개발 기록의 진단 정보를 확인해 주세요.';
    }

    function renderNav() {
      let lastGroup = '';
      el('mainNav').innerHTML = NAV_ITEMS.map(item => {
        const group = item.group !== lastGroup ? `<div class="nav-group-label">${item.group}</div>` : '';
        lastGroup = item.group;
        return `${group}<button type="button" class="nav-button ${state.route === item.id ? 'active' : ''}" data-route="${item.id}">${icon(item.icon)}<span>${item.label}</span></button>`;
      }).join('');
      el('sidebarVersion').textContent = `v${APP_INFO.version}`;
      refreshIcons();
    }

    function renderShellStatus() {
      const configured = remote.isConfigured();
      const connected = Boolean(state.session && state.allowedUser);
      const pending = state.queue.length;
      const providerDisabled = state.connectionDiagnostics.googleProvider === 'disabled';
      let label = !state.online ? '오프라인 · 로컬 저장' : !configured ? '로컬 전용' : providerDisabled ? 'Google 설정 필요' : !connected ? '로그인 필요' : state.syncStatus === 'syncing' ? '동기화 중' : pending ? `대기 ${pending}건` : '동기화 완료';
      let kind = !state.online ? 'offline' : state.syncStatus === 'error' ? 'error' : connected ? 'online' : '';
      el('syncLabel').textContent = label;
      el('syncDot').className = `status-dot ${kind}`;
      el('sidebarStatusText').textContent = state.ready ? `IndexedDB 저장 · 대기 ${pending}건` : '로컬 저장 준비 중';
      el('sidebarStatusDot').className = `status-dot ${state.ready ? (state.online ? 'online' : 'offline') : ''}`;
      el('topbarContext').textContent = state.business ? `${state.business.name} · ${state.site?.main_industry_name || '업종 미확인'}` : '사업자 설정을 확인하세요';
    }

    function pageHeader(title, subtitle, actions = '') {
      return `<div class="page-header"><div><h1 class="page-title">${title}</h1><p class="page-subtitle">${subtitle}</p></div>${actions ? `<div class="inline-actions">${actions}</div>` : ''}</div>`;
    }

    function renderDashboard() {
      const rows = activeTransactions();
      const month = Utils.today().slice(0,7);
      const monthly = rows.filter(row => row.transaction_date.startsWith(month));
      const summary = AccountingDomain.summarize(monthly);
      const allSummary = AccountingDomain.summarize(rows);
      const recent = rows.slice(0, 6);
      const tasks = [
        !state.business && ['사업자 정보를 등록하세요', '장부 시작연도와 업종을 먼저 설정합니다.', 'settings', '필수'],
        allSummary.missingEvidence > 0 && [`증빙 미첨부 ${allSummary.missingEvidence}건`, '이미지·PDF 업로드는 Cloudinary 설정 후 연결됩니다.', 'evidence', '확인'],
        state.queue.length > 0 && [`동기화 대기 ${state.queue.length}건`, state.session ? '지금 동기화할 수 있습니다.' : 'Google 로그인 후 클라우드에 반영됩니다.', 'settings', '대기'],
        !state.config.lastBackupAt && ['첫 JSON 백업을 만드세요', '로컬 데이터의 별도 복구 파일을 준비합니다.', 'settings', '권장'],
        !state.config.vatPayerType || state.config.vatPayerType === 'unconfirmed' ? ['과세유형 확인이 필요합니다', '현재 VAT 계산은 검토 후보로 표시됩니다.', 'settings', '세무'] : null
      ].filter(Boolean);
      return `
        ${pageHeader('대시보드', '입력, 증빙, 검토, 동기화 상태를 한눈에 확인합니다.', `<button class="button primary" type="button" data-route="transactions">${icon('plus')}새 거래</button>`)}
        ${!state.online ? `<div class="notice">${icon('wifi-off')}<div><strong>오프라인입니다.</strong><br>거래는 이 기기에 계속 저장되며, 인터넷 연결 후 동기화할 수 있습니다.</div></div>` : ''}
        <div class="metric-grid">
          <div class="metric-card"><div class="metric-head"><span class="metric-label">이번 달 수입</span><span class="metric-icon">${icon('trending-up')}</span></div><div class="metric-value">${Utils.won(summary.income)}</div><div class="metric-foot">${monthly.filter(r=>r.transaction_type==='income').length}건 입력</div></div>
          <div class="metric-card"><div class="metric-head"><span class="metric-label">이번 달 비용</span><span class="metric-icon warm">${icon('trending-down')}</span></div><div class="metric-value">${Utils.won(summary.expense)}</div><div class="metric-foot">${monthly.filter(r=>r.transaction_type==='expense').length}건 입력</div></div>
          <div class="metric-card"><div class="metric-head"><span class="metric-label">미첨부 증빙</span><span class="metric-icon warm">${icon('paperclip')}</span></div><div class="metric-value">${allSummary.missingEvidence}건</div><div class="metric-foot">전체 거래 기준</div></div>
          <div class="metric-card"><div class="metric-head"><span class="metric-label">동기화 대기</span><span class="metric-icon">${icon('refresh-cw')}</span></div><div class="metric-value">${state.queue.length}건</div><div class="metric-foot">canonical v${Number(state.config.canonicalVersion || 0)}</div></div>
        </div>
        <section class="panel card-panel">
          <div class="panel-head"><div><h2 class="section-title">세법 용어 검색</h2><p class="section-help">모르는 세법 용어를 검색하면 법적 정의와 초등학생 눈높이 설명을 보여드립니다.</p></div><button class="button small" type="button" data-open-guide-topic="tax-terms">${icon('book-a')}전체 용어 보기</button></div>
          <input class="input" id="termSearch" type="search" autocomplete="off" placeholder="예: 필요경비, 복식부기, 부가가치세, 경비율, 원천징수">
          <div id="termSearchResults" class="term-results"></div>
        </section>
        <div class="layout-two">
          <section class="panel card-panel">
            <div class="panel-head"><div><h2 class="section-title">최근 거래</h2><p class="section-help">원천거래 기준으로 표시합니다.</p></div><button class="button small" type="button" data-route="ledger">장부 보기</button></div>
            ${recent.length ? `<div class="activity-list">${recent.map(row => `<div class="activity-row"><span class="metric-icon ${row.transaction_type==='income'?'':'warm'}">${icon(row.transaction_type==='income'?'arrow-down-left':'arrow-up-right')}</span><div class="activity-main"><div class="activity-title">${Utils.escape(row.description)}</div><div class="activity-note">${row.transaction_date} · ${Utils.escape(counterpartyName(row.counterparty_id))} · ${Utils.escape(accountName(row.account_id))}</div></div><div class="${row.transaction_type==='income'?'amount-positive':'amount-negative'}">${row.transaction_type==='income'?'+':'-'}${Utils.won(row.total_amount)}</div></div>`).join('')}</div>` : emptyState('receipt-text','아직 입력한 거래가 없습니다','첫 거래를 입력하면 원천거래와 복식 전표가 함께 만들어집니다.')}
          </section>
          <section class="panel card-panel">
            <div class="panel-head"><div><h2 class="section-title">지금 확인할 일</h2><p class="section-help">신고 전까지 남은 작업을 숨기지 않습니다.</p></div></div>
            ${tasks.length ? `<div class="task-list">${tasks.map(task => `<div class="task-row"><div class="task-main"><div class="task-title">${Utils.escape(task[0])}</div><div class="task-note">${Utils.escape(task[1])}</div></div>${badge(task[3], task[3]==='필수'?'danger':'warning')}<button class="icon-button" type="button" data-route="${task[2]}" title="이동" aria-label="${Utils.escape(task[0])}로 이동">${icon('chevron-right')}</button></div>`).join('')}</div>` : `<div class="notice info">${icon('circle-check')}<div>현재 즉시 확인할 항목이 없습니다.</div></div>`}
          </section>
        </div>`;
    }

    function renderTransactionForm() {
      if (!state.business) return `${pageHeader('거래 입력','먼저 사업자 정보를 설정해야 원천거래와 전표를 연결할 수 있습니다.')}<div class="notice">${icon('triangle-alert')}<div>사업자 설정이 필요합니다.</div></div><button class="button primary" type="button" data-route="settings">사업자 설정 열기</button>`;
      const choices = AccountingDomain.accountChoices(state.accounts, state.formType);
      return `
        ${pageHeader('거래 입력', `쉽게 입력한 한 건을 ${term('원천거래')}와 ${term('복식부기')} 전표로 함께 저장합니다.`)}
        <form id="transactionForm" class="panel card-panel" novalidate>
          <div class="field full"><span class="field-label required">거래 유형</span><div class="segmented" role="group" aria-label="거래 유형">${[['income','수입'],['expense','비용'],['asset_purchase','자산구입']].map(([value,label])=>`<button class="segment ${state.formType===value?'active':''}" type="button" data-transaction-type="${value}" aria-pressed="${state.formType===value}">${label}</button>`).join('')}</div></div>
          <div class="form-grid" style="margin-top:16px">
            <div class="field third"><label class="required" for="transactionDate">거래일</label><input class="input" id="transactionDate" name="transactionDate" type="date" min="2025-01-01" value="${Utils.today()}"><div class="field-error" data-error="transactionDate"></div></div>
            <div class="field third"><label for="counterpartyName">거래처</label><input class="input" id="counterpartyName" name="counterpartyName" maxlength="80" autocomplete="organization" placeholder="예: 한빛문구"></div>
            <div class="field third"><label class="required" for="accountId">${term('계정과목')}</label><select class="select" id="accountId" name="accountId"><option value="">선택하세요</option>${choices.map(row=>`<option value="${row.id}">${Utils.escape(row.account_name)}</option>`).join('')}</select><div class="field-error" data-error="accountId"></div></div>
            <div class="field full"><label class="required" for="description">거래 내용</label><input class="input" id="description" name="description" maxlength="160" placeholder="무엇을 사고팔았는지 적어주세요"><div class="field-error" data-error="description"></div></div>
            <div class="field third"><label class="required" for="totalAmount">총 금액</label><div class="money-wrap"><input class="input" id="totalAmount" name="totalAmount" inputmode="numeric" autocomplete="off" placeholder="0"><span class="money-unit">원</span></div><div class="field-error" data-error="totalAmount"></div></div>
            <div class="field third"><label for="vatType">부가세 처리 후보</label><select class="select" id="vatType" name="vatType"><option value="taxable">과세(총액에서 분리)</option><option value="exempt">면세</option><option value="none">부가세 없음/검토</option></select><div class="field-help">증빙에 세액이 따로 적혀 있다면 그 금액이 우선합니다.</div></div>
            <div class="field third"><label for="paymentStatus">결제 상태</label><select class="select" id="paymentStatus" name="paymentStatus"><option value="paid">받음/지급 완료</option><option value="unpaid">외상·미지급</option></select></div>
            <div class="field full"><label class="checkbox-row"><input type="checkbox" id="hasEvidence" name="hasEvidence"><span>증빙을 이미 보관하고 있습니다.<br><span class="field-help">파일 첨부 연결은 Cloudinary 설정 후 제공됩니다. 지금은 보관 여부만 기록합니다.</span></span></label></div>
          </div>
          <div class="calc-strip" aria-live="polite"><div class="calc-item"><div class="calc-label">${term('공급가액')}</div><div class="calc-value" id="supplyPreview">0원</div></div><div class="calc-item"><div class="calc-label">${term('부가세')}</div><div class="calc-value" id="vatPreview">0원</div></div><div class="calc-item"><div class="calc-label">합계</div><div class="calc-value" id="totalPreview">0원</div></div></div>
          <div class="form-actions"><button class="button" type="reset">초기화</button><button class="button primary" type="submit">${icon('save')}거래와 전표 저장</button></div>
        </form>`;
    }

    function filteredTransactions() {
      const query = state.filters.query.toLowerCase();
      return activeTransactions().filter(row => {
        const matchesType = state.filters.type === 'all' || row.transaction_type === state.filters.type;
        const matchesYear = state.filters.year === 'all' || row.transaction_date.startsWith(state.filters.year);
        const matchesQuery = !query || row.description.toLowerCase().includes(query) || counterpartyName(row.counterparty_id).toLowerCase().includes(query) || accountName(row.account_id).toLowerCase().includes(query);
        return matchesType && matchesYear && matchesQuery;
      });
    }

    function renderLedger() {
      const rows = filteredTransactions();
      const years = [...new Set(activeTransactions().map(row => row.transaction_date.slice(0,4)))].sort().reverse();
      return `
        ${pageHeader('장부', `국세청 간편장부 열 구조로 보는 원천거래입니다. 내부 기준은 ${term('복식부기')} 원장입니다.`, `<button class="button primary" type="button" data-route="transactions">${icon('plus')}거래 입력</button>`)}
        <div class="filter-bar"><input class="input" id="ledgerQuery" type="search" placeholder="내용·거래처 검색" value="${Utils.escape(state.filters.query)}"><select class="select" id="ledgerType"><option value="all">전체 유형</option><option value="income" ${state.filters.type==='income'?'selected':''}>수입</option><option value="expense" ${state.filters.type==='expense'?'selected':''}>비용</option><option value="asset_purchase" ${state.filters.type==='asset_purchase'?'selected':''}>자산</option></select><select class="select" id="ledgerYear"><option value="all">전체 연도</option>${years.map(year=>`<option value="${year}" ${state.filters.year===year?'selected':''}>${year}년</option>`).join('')}</select></div>
        <div class="table-wrap"><table><thead><tr><th>일자</th><th>계정과목</th><th>거래내용</th><th>거래처</th><th class="number">수입</th><th class="number">비용</th><th class="number">자산</th><th>상태</th></tr></thead><tbody>${rows.map(row => `<tr><td>${row.transaction_date}</td><td><button class="term-button" type="button" data-account-id="${row.account_id}">${Utils.escape(accountName(row.account_id))}</button></td><td>${Utils.escape(row.description)}</td><td>${Utils.escape(counterpartyName(row.counterparty_id))}</td><td class="number amount-positive">${row.transaction_type==='income'?Utils.won(row.total_amount):''}</td><td class="number amount-negative">${row.transaction_type==='expense'?Utils.won(row.total_amount):''}</td><td class="number">${row.transaction_type==='asset_purchase'?Utils.won(row.total_amount):''}</td><td>${row.review_status==='normal'?badge('정상','success'):badge('검토 필요','warning')}</td></tr>`).join('')}</tbody></table>${rows.length?'':emptyState('book-open','표시할 거래가 없습니다','검색 조건을 바꾸거나 새 거래를 입력하세요.')}</div>`;
    }

    function renderJournals() {
      const rows = state.journals.filter(row => !row.deleted_at).sort((a,b)=>String(b.entry_date).localeCompare(String(a.entry_date)));
      return `
        ${pageHeader('전표 검토', `${term('차변')}과 ${term('대변')}이 같은지 확인합니다.`)}
        ${rows.length ? rows.map(journal => {
          const lines = state.journalLines.filter(line => line.journal_entry_id === journal.id && !line.deleted_at).sort((a,b)=>a.sort_order-b.sort_order);
          const result = AccountingDomain.validateJournal(lines);
          return `<section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">${journal.entry_date} · ${Utils.escape(journal.memo || '전표')}</h2><p class="section-help">규칙 ${Utils.escape(journal.posting_rule_version)} · 원천거래 ${journal.source_transaction_id.slice(0,8)}</p></div>${result.status==='pass'?badge('차대변 일치','success'):badge(`차액 ${Utils.won(result.difference)}`,'danger')}</div><div class="table-wrap"><table style="min-width:620px"><thead><tr><th>계정과목</th><th>설명</th><th class="number">차변</th><th class="number">대변</th></tr></thead><tbody>${lines.map(line=>`<tr><td>${Utils.escape(accountName(line.account_id))}</td><td>${Utils.escape(line.line_memo || '')}</td><td class="number">${line.debit_amount?Utils.won(line.debit_amount):''}</td><td class="number">${line.credit_amount?Utils.won(line.credit_amount):''}</td></tr>`).join('')}</tbody><tfoot><tr><th colspan="2">합계</th><th class="number">${Utils.won(result.debit)}</th><th class="number">${Utils.won(result.credit)}</th></tr></tfoot></table></div></section>`;
        }).join('') : emptyState('scale','검토할 전표가 없습니다','거래를 저장하면 자동으로 복식 전표가 만들어집니다.')}`;
    }

    function evidenceFor(transactionId) {
      return state.evidenceFiles.filter(row => row.source_transaction_id === transactionId && !row.deleted_at);
    }

    function evidenceThumb(file) {
      const url = Utils.escape(file.secure_url || '');
      if (file.resource_type === 'image' && (file.thumbnail_url || file.secure_url)) {
        return `<a class="evidence-thumb" href="${url}" target="_blank" rel="noopener" title="${Utils.escape(file.original_filename || '증빙')}"><img src="${Utils.escape(file.thumbnail_url || file.secure_url)}" alt="${Utils.escape(file.original_filename || '증빙')}" loading="lazy"></a>`;
      }
      return `<a class="button small" href="${url}" target="_blank" rel="noopener">${icon('file-text')}${Utils.escape(file.original_filename || 'PDF 증빙')}</a>`;
    }

    function renderEvidence() {
      const configured = CloudinaryAdapter.isConfigured();
      const rows = activeTransactions();
      const missing = rows.filter(row => row.evidence_status !== 'attached');
      return `${pageHeader('증빙','이미지·PDF 원본은 Cloudinary(unsigned)에, 파일 메타는 장부·Supabase에 연결합니다.')}
        ${configured ? '' : `<div class="notice">${icon('cloud-off')}<div><strong>Cloudinary 증빙 저장소가 아직 설정되지 않았습니다.</strong><br>설정에서 cloud name과 제한된 unsigned upload preset을 입력하면 파일 첨부가 활성화됩니다. API secret은 입력하지 않습니다.</div><button class="button" type="button" data-route="settings">${icon('settings-2')}설정 열기</button></div>`}
        <section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">거래별 증빙</h2><p class="section-help">파일이 없어도 거래는 유지하고 검토 항목으로 남깁니다. 첨부는 오프라인에서도 되고 로그인 시 클라우드에 동기화됩니다.</p></div>${badge(`미첨부 ${missing.length}건`, missing.length?'warning':'success')}</div>
        ${rows.length ? `<div>${rows.map(row => {
          const files = evidenceFor(row.id);
          return `<div class="evidence-row"><div class="activity-main"><div class="activity-title">${Utils.escape(row.description)}</div><div class="activity-note">${row.transaction_date} · ${Utils.escape(counterpartyName(row.counterparty_id))} · ${Utils.won(row.total_amount)}</div>${files.length?`<div class="evidence-files">${files.map(file => `<div class="evidence-file-wrap">${evidenceThumb(file)}<button class="evidence-remove" type="button" data-remove-evidence="${file.id}" title="증빙 제거" aria-label="증빙 제거">${icon('x')}</button></div>`).join('')}</div>`:''}</div><div class="evidence-actions">${files.length?badge(`${files.length}개 첨부`,'success'):badge('미첨부','warning')}<button class="button small" type="button" data-attach-tx="${row.id}" ${configured?'':'disabled'}>${icon('upload')}파일 첨부</button></div></div>`;
        }).join('')}</div>` : emptyState('paperclip','거래가 없습니다','거래를 입력하면 여기에서 증빙을 첨부할 수 있습니다.')}
        </section>
        <input id="evidenceFileInput" type="file" accept="image/*,application/pdf" hidden>`;
    }

    function renderImports() {
      return `${pageHeader('가져오기','국세청 간편장부 Excel을 내부 복식 원장으로 옮기는 작업 공간입니다.')}
        <div class="notice">${icon('construction')}<div><strong>구조 검증 단계입니다.</strong><br>원본 파일 보존, 행별 미리보기, 중복 탐지, 사용자 확인 없이 전표를 확정하지 않는 흐름으로 구현됩니다.</div></div>
        <section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">간편장부 Excel 미리보기</h2><p class="section-help"><code>장부</code> 시트(A=월·B=일·C=계정과목·D=거래내용·E=거래처·F/G=수입·H/I=비용·J/K=자산·L=비고)를 읽습니다. <strong>원본 행을 그대로 보여줄 뿐, 아직 장부에 반영하지 않습니다.</strong></p></div>${badge('미리보기','info')}</div>
          <input type="file" id="importFile" accept=".xlsx" class="input" aria-label="간편장부 Excel 선택">
          <div id="importStatus"></div>
          <div id="importPreview"></div>
        </section>
        <section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">간편장부 계정과목 분류표</h2><p class="section-help">${Utils.escape(SimpleBookAccounts.source)}. 가져오기와 장부 입력 시 이 분류를 기준으로 수입·비용·자산 열에 대응합니다.</p></div>${badge('국세청 기준','info')}</div><div class="coa-ref">${simpleBookAccountsHtml()}</div></section>`;
    }

    function openModal(html) { const root = el('modalRoot'); root.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${html}</div>`; root.hidden = false; }
    function closeModal() { const root = el('modalRoot'); root.hidden = true; root.innerHTML = ''; }

    // 가져오기 검증·수정 모달 — 오류/경고를 탐지해 보여주고, 값 변경은 사용자가 승인(적용)해야 반영된다.
    function renderImportReview() {
      const rv = state.importReview;
      if (!rv) return;
      const v = SimpleBookImport.validate(rv.rows);
      const accountsHtml = v.accounts.length ? `<div class="review-section"><h4 class="review-title">미분류 계정과목 ${v.accounts.length}종 — 표준 계정과목으로 바꾸기</h4>${v.accounts.map(a => `<div class="review-fix"><span class="review-label">${Utils.escape(a.name)} <span class="major">${a.count}건</span></span><select class="select" data-remap-from="${Utils.escape(a.name)}">${SimpleBookAccounts.all().map(sa => `<option value="${Utils.escape(sa.name)}" ${sa.name === a.suggestion ? 'selected' : ''}>${Utils.escape(sa.name)} · ${Utils.escape(sa.groupLabel)}</option>`).join('')}</select><button class="button small" type="button" data-remap-apply="${Utils.escape(a.name)}">적용</button></div>`).join('')}</div>` : '';
      const vatHtml = v.vatSuspects.length ? `<div class="review-section"><h4 class="review-title">부가세 확인 ${v.vatSuspects.length}건</h4><div class="review-fix"><span class="review-label">부가세가 금액의 10%가 아니라 <strong>금액÷11</strong>에 가깝습니다. “금액”을 부가세 포함 총액으로 보고 공급가액(=금액−부가세)을 다시 계산할까요?</span><button class="button small" type="button" data-vat-fix>일괄 적용</button></div></div>` : '';
      const errHtml = v.errors.length ? `<div class="review-section"><h4 class="review-title">오류 ${v.errorCount}건 (반영에서 자동 제외)</h4><div class="table-wrap import-preview"><table><thead><tr><th>행</th><th>일자</th><th>계정과목</th><th>내용</th><th>문제</th></tr></thead><tbody>${v.errors.slice(0, 50).map(e => { const r = rv.rows[e.i]; return `<tr><td>${r.sourceRow || ''}</td><td>${Utils.escape(r.date)}</td><td>${Utils.escape(r.account)}</td><td>${Utils.escape(r.description)}</td><td>${Utils.escape(e.msg)}</td></tr>`; }).join('')}</tbody></table></div></div>` : '';
      const warnCount = v.warns.length + v.accounts.reduce((s, a) => s + a.count, 0) + v.vatSuspects.length;
      const clean = !v.accounts.length && !v.vatSuspects.length && !v.errors.length && !v.warns.length;
      const body = `<div class="modal-head"><h3 class="modal-title">가져오기 검증 · ${Utils.escape(rv.fileName || '')}</h3><button class="icon-button" type="button" data-modal-close aria-label="닫기">${icon('x')}</button></div>
        <div class="modal-body">
          <div class="notice ${v.errorCount ? '' : 'info'}">${icon(v.errorCount ? 'triangle-alert' : 'circle-check')}<div>정상 <strong>${v.cleanCount}</strong>건 · 경고 <strong>${warnCount}</strong>건 · 오류 <strong>${v.errorCount}</strong>건${v.errorCount ? ' — 오류 행은 반영에서 자동 제외됩니다.' : ''}</div></div>
          ${accountsHtml}${vatHtml}${errHtml}
          ${clean ? `<div class="notice info">${icon('circle-check')}<div>발견된 문제가 없습니다. 바로 반영할 수 있습니다.</div></div>` : ''}
        </div>
        <div class="modal-actions"><button class="button" type="button" data-modal-close>닫기</button><button class="button primary" type="button" data-review-post>${v.errorCount ? `오류 제외하고 반영(${v.cleanCount}건)` : `장부에 반영(${rv.rows.length}건)`}</button></div>`;
      openModal(body);
      bindReviewEvents();
    }
    function bindReviewEvents() {
      const root = el('modalRoot');
      root.querySelectorAll('[data-modal-close]').forEach(b => b.addEventListener('click', closeModal));
      root.querySelectorAll('[data-remap-apply]').forEach(b => b.addEventListener('click', () => {
        const from = b.dataset.remapApply;
        const sel = root.querySelector(`[data-remap-from="${CSS.escape(from)}"]`);
        state.importReview.rows = SimpleBookImport.remapAccount(state.importReview.rows, from, sel.value);
        renderImportReview();
      }));
      const vatBtn = root.querySelector('[data-vat-fix]');
      if (vatBtn) vatBtn.addEventListener('click', () => {
        const v = SimpleBookImport.validate(state.importReview.rows);
        state.importReview.rows = SimpleBookImport.recomputeVatInclusive(state.importReview.rows, v.vatSuspects);
        renderImportReview();
      });
      const postBtn = root.querySelector('[data-review-post]');
      if (postBtn) postBtn.addEventListener('click', async () => {
        const rv = state.importReview;
        const v = SimpleBookImport.validate(rv.rows);
        const valid = rv.rows.filter((r, i) => !v.errorRowSet.has(i));
        if (!valid.length) return toast('반영할 정상 거래가 없습니다.', 'error');
        postBtn.disabled = true; postBtn.textContent = '반영 중…';
        try {
          const out = await AppService.importSimpleBook(valid);
          closeModal();
          toast(`장부 반영 완료 · 신규 ${out.created}건 / 갱신 ${out.replaced}건${out.unbalanced ? ` / 불균형 제외 ${out.unbalanced}건` : ''}`, 'success');
          state.importReview = null; routeTo('ledger');
        } catch (error) { diagnostic(error); postBtn.disabled = false; postBtn.textContent = '장부에 반영'; }
      });
    }

    function importSummaryHtml(res) {
      const c = res.counts || {};
      const unknown = res.unknownAccounts || [];
      const warn = unknown.length ? `<div class="notice">${icon('triangle-alert')}<div>분류표에 없는 계정과목 ${unknown.length}종: ${unknown.slice(0, 8).map(Utils.escape).join(', ')}${unknown.length > 8 ? ' 외' : ''}. 반영 단계에서 매핑을 확인하세요.</div></div>` : '';
      const canPost = Boolean(state.business);
      return `<div class="notice info">${icon('circle-check')}<div><strong>${res.rows.length}건</strong> 읽음${res.year ? ` · ${Utils.escape(res.year)}년 귀속` : ''} · 수입 ${c.income || 0}건 / 비용 ${c.expense || 0}건 / 자산 ${c.asset || 0}건<br>합계 — 수입 <strong>${Utils.won(res.totals.income)}</strong> · 비용 <strong>${Utils.won(res.totals.expense)}</strong> · 자산 <strong>${Utils.won(res.totals.asset)}</strong></div></div>${warn}
        ${canPost ? '' : `<div class="notice">${icon('info')}<div>먼저 설정에서 사업자 정보를 저장하면 장부에 반영할 수 있습니다.</div></div>`}
        <div class="form-actions"><button class="button primary" type="button" data-open-review ${canPost ? '' : 'disabled'}>${icon('list-checks')}검증·반영 창 열기</button><span class="section-help">업로드하면 자동으로 검증 창이 열립니다. 같은 파일을 다시 반영해도 중복되지 않습니다.</span></div>`;
    }
    function importPreviewHtml(res) {
      const cap = 200;
      const shown = res.rows.slice(0, cap);
      const rowHtml = shown.map(r => `<tr><td>${Utils.escape(r.date)}</td><td>${Utils.escape(r.account)}${r.knownAccount ? '' : ' <span class="major">(미분류)</span>'}</td><td>${Utils.escape(r.description)}</td><td>${Utils.escape(r.counterparty)}</td><td class="number">${r.income ? Utils.won(r.income) : ''}</td><td class="number">${r.expense ? Utils.won(r.expense) : ''}</td><td class="number">${r.asset ? Utils.won(r.asset) : ''}</td><td>${Utils.escape(r.note)}</td></tr>`).join('');
      const more = res.rows.length > cap ? `<div class="section-help">…미리보기는 상위 ${cap}건만 표시합니다(전체 ${res.rows.length}건).</div>` : '';
      return `<div class="table-wrap import-preview"><table><thead><tr><th>일자</th><th>계정과목</th><th>거래내용</th><th>거래처</th><th class="number">수입</th><th class="number">비용</th><th class="number">자산</th><th>비고</th></tr></thead><tbody>${rowHtml}</tbody></table></div>${more}`;
    }
    function simpleBookAccountsHtml() {
      return SimpleBookAccounts.GROUPS.map(g => `<div class="coa-group"><div class="coa-group-head"><strong>${Utils.escape(g.label)}</strong> <span class="major">간편장부 ${Utils.escape(g.column)} 열</span></div><table class="coa-table"><tbody>${g.items.map(it => `<tr><th>${Utils.escape(it.name)}</th><td>${Utils.escape(it.desc)}</td></tr>`).join('')}</tbody></table></div>`).join('');
    }

    // 기준경비율 추계소득 계산기(검토용). 업종 경비율은 자동 채우되 사용자가 수정할 수 있고,
    // EstimatedIncome 엔진으로 실시간 계산한다. 확정 신고값이 아니라 후보 계산이다.
    function estimatorPanelHtml(summary) {
      const code = state.business?.main_industry_code || '';
      const rate = ExpenseRates.find(code);
      const name = state.business?.main_industry_name || IndustryCodes.find(code)?.name || '';
      const dutyThreshold = BookkeepingDuty.thresholdOf(code);
      const rev = Math.max(0, Math.round(summary.income || 0));
      const rateNote = rate ? `업종 ${Utils.escape(code)} ${Utils.escape(name)} 경비율 자동 채움 · 필요시 수정` : '업종코드를 설정하면 경비율이 자동으로 채워집니다. 값을 직접 입력할 수도 있습니다.';
      const dutyNote = dutyThreshold != null ? ` · 이 업종 복식부기 기준: 직전연도 수입 ${Utils.won(dutyThreshold)} 이상` : '';
      return `<div class="estimator">
        <div class="estimator-grid">
          <label class="est-field"><span>총수입금액</span><input class="select" type="text" inputmode="numeric" id="estRevenue" value="${rev || ''}"></label>
          <label class="est-field"><span>직전연도 수입금액</span><input class="select" type="text" inputmode="numeric" id="estPriorRevenue" value="" placeholder="입력 시 자동 판정"></label>
          <label class="est-field"><span>매입비용</span><input class="select" type="text" inputmode="numeric" id="estPurchase" value=""></label>
          <label class="est-field"><span>임차료</span><input class="select" type="text" inputmode="numeric" id="estRent" value=""></label>
          <label class="est-field"><span>인건비</span><input class="select" type="text" inputmode="numeric" id="estLabor" value=""></label>
          <label class="est-field"><span>기장의무</span><select class="select" id="estDuty"><option value="double">복식부기의무자</option><option value="simple">간편장부대상자</option></select></label>
          <label class="est-field"><span>기준경비율(%)</span><input class="select" type="text" inputmode="decimal" id="estStdRate" value="${rate ? rate.standardGeneral : ''}"></label>
          <label class="est-field"><span>단순경비율(%)</span><input class="select" type="text" inputmode="decimal" id="estSimpleRate" value="${rate ? rate.simpleGeneral : ''}"></label>
        </div>
        <p class="est-note major">${Utils.escape(rateNote)}${dutyNote}</p>
        <div class="est-judgement"><span class="est-tag" id="estDutyAuto"></span><span class="est-tag" id="estMethodAuto"></span></div>
        <div class="est-out">
          <div class="est-row"><span>주요경비(매입+임차+인건)</span><strong id="estMainCosts">0원</strong></div>
          <div class="est-row"><span>① 기준소득금액</span><strong id="estPrimary">0원</strong></div>
          <div class="est-row"><span>② 비교소득금액</span><strong id="estComparison">0원</strong></div>
          <div class="est-row total"><span>소득금액 = min(①, ②)</span><strong id="estIncome">0원</strong></div>
          <div class="est-row"><span>필요경비(수입 − 소득)</span><strong id="estNecessary">0원</strong></div>
        </div>
      </div>`;
    }

    function renderReports() {
      const summary = AccountingDomain.summarize(activeTransactions());
      const legalReady = false;
      return `${pageHeader('리포트','검토용 집계와 법정 신고서식 출력을 명확히 구분합니다.')}
        <div class="metric-grid"><div class="metric-card"><div class="metric-label">누적 수입</div><div class="metric-value">${Utils.won(summary.income)}</div></div><div class="metric-card"><div class="metric-label">누적 비용</div><div class="metric-value">${Utils.won(summary.expense)}</div></div><div class="metric-card"><div class="metric-label">사업용 자산</div><div class="metric-value">${Utils.won(summary.assets)}</div></div><div class="metric-card"><div class="metric-label">검토 필요</div><div class="metric-value">${summary.review}건</div></div></div>
        <section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">추계소득금액 계산 방법(기준경비율)</h2><p class="section-help">장부 없이 추계신고할 때 소득금액을 정하는 방법입니다. 국세청 추계신고 작성사례 기준 · 검토용 안내.</p></div>${badge('검토용','info')}</div><div class="notice">${icon('info')}<div>소득금액 = <strong>min(①, ②)</strong><br>① 기준소득금액 = 수입금액 − 주요경비(매입·임차·인건) − (수입금액 × 기준경비율 × <strong>복식부기 ½</strong>)<br>② 비교소득금액 = 수입금액 × (1 − 단순경비율) × <strong>복식부기 3.4배 / 간편장부 2.8배</strong><br><span class="major">주요경비는 정규증빙(세금계산서·계산서·신용카드·현금영수증)을 갖춰야 인정됩니다.</span></div></div>${estimatorPanelHtml(summary)}<div class="notice danger">${icon('shield-alert')}<div><strong>복식부기의무자</strong>가 장부 없이 추계신고하면 무신고가산세와 장부 기록·보관 불성실 가산세 중 <strong>큰 금액</strong>이 부과됩니다. 추계는 최후 수단이며 장부 기장이 원칙입니다.</div></div></section>
        <section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">법정 신고서식</h2><p class="section-help">국가법령정보센터의 최신 서식 스냅샷과 필드 매핑이 있어야 확정 출력할 수 있습니다.</p></div>${badge(legalReady?'출력 가능':'출력 차단',legalReady?'success':'danger')}</div><div class="notice danger">${icon('shield-alert')}<div>현재 앱에는 검증된 <code>form_snapshot_id</code>가 연결되지 않았습니다. 간편장부소득금액계산서와 필요경비명세서는 확정 신고서식으로 출력하지 않습니다.</div></div><button class="button" type="button" disabled>${icon('download')}법정서식 내보내기</button></section>`;
    }

    function renderClosing() {
      const year = Utils.today().slice(0,4);
      const closed = state.closings.filter(row=>!row.deleted_at);
      return `${pageHeader('마감','기간을 잠그기 전에 전표, 증빙, VAT 검토 항목을 확인합니다.')}
        <div class="notice">${icon('lock-keyhole')}<div><strong>현재는 마감 준비 상태를 표시합니다.</strong><br>마감 후 수정 통제와 재개방 감사로그가 완성되기 전에는 실제 잠금 버튼을 활성화하지 않습니다.</div></div>
        <div class="status-board"><div class="status-item"><div class="status-item-head"><span class="status-item-title">${year}년 장부</span>${badge(closed.some(row=>row.period_start.startsWith(year))?'마감 기록 있음':'열림','info')}</div><div class="status-item-body">거래 ${activeTransactions().filter(row=>row.transaction_date.startsWith(year)).length}건 · 검토 필요 ${AccountingDomain.summarize(activeTransactions().filter(row=>row.transaction_date.startsWith(year))).review}건</div></div><div class="status-item"><div class="status-item-head"><span class="status-item-title">신고 준비</span>${badge('검토 필요','warning')}</div><div class="status-item-body">법정서식 스냅샷과 증빙 누락을 먼저 확인해야 합니다.</div></div></div>`;
    }

    function isBootstrapOwner() {
      return Boolean(state.session) && Utils.normalizeEmail(state.session.user.email) === Utils.normalizeEmail(APP_INFO.ownerEmail);
    }

    // Codes starting with 94 are 인적용역 (personal service) — those providers often have no business registration number.
    function industryPickedHtml(code, name) {
      if (!code) return '검색해서 업종을 고르거나, 아래에 코드를 직접 입력하세요.';
      const personal = String(code).startsWith('94') ? ' · <span class="personal-service-hint">인적용역 · 사업자등록번호 없을 수 있음</span>' : '';
      const rate = ExpenseRates.find(code);

      const dutyHtml = dutyThreshold != null ? `<div class="law-line">기장의무 <span class="law-tag">후보</span> 직전연도 수입 <strong>${Utils.won(dutyThreshold)}</strong> 이상이면 복식부기, 미만이면 간편장부 <span class="major">(소득세법 시행령 §208⑤)</span></div>` : '';

            `마지막 동기화 ${lastSync} · canonical v${Number(state.config.canonicalVersion || 0)}<br>${connected ? '지금 로컬 변경을 클라우드에 반영할 수 있습니다.' : '설정에서 Google 로그인 후 사용할 수 있습니다.'}${owner ? '<br><strong>최종본 지정</strong>은 다른 기기의 로컬 전용 변경을 이 기기 기준으로 덮어씁니다.' : ''}`,
            `<button class="button primary" id="dataSyncButton" type="button" ${connected ? '' : 'disabled'}>${icon('cloud')}지금 동기화</button>${owner ? `<button class="button danger" id="dataCanonicalButton" type="button" ${connected ? '' : 'disabled'}>${icon('crown')}이 기기를 최종본으로</button>` : ''}`)}
          ${dataCard('JSON 백업', '암호화되지 않은 파일이므로 안전한 위치에 보관하세요.',
            state.config.lastBackupAt ? badge(new Date(state.config.lastBackupAt).toLocaleString('ko-KR'), 'success') : badge('백업 없음', 'warning'),
            '전체 로컬 데이터를 하나의 JSON 파일로 내려받습니다. 거래처와 세무자료가 포함될 수 있습니다.',
            `<button class="button" id="dataBackupButton" type="button">${icon('download')}백업 만들기</button>`)}
          ${dataCard('JSON 복원', '현재 로컬 데이터를 파일 내용으로 교체합니다.',
            badge('주의', 'warning'),
            '백업 파일을 선택하면 이 기기의 로컬 데이터를 파일 기준으로 덮어씁니다. 복원 전에 현재 데이터를 백업하세요.',
            `<button class="button" id="dataRestoreButton" type="button">${icon('upload')}복원 파일 선택</button><input id="dataRestoreFile" type="file" accept="application/json,.json" hidden>`)}
          ${dataCard('부분 삭제', '거래 한 건을 소프트 삭제합니다.',
            badge(`${activeCount}건`, activeCount ? 'info' : ''),
            activeCount
              ? `삭제해도 감사로그와 tombstone에 기록되고 동기화에 반영됩니다.<select class="select" id="dataDeleteSelect" aria-label="삭제할 거래 선택">${deleteOptions}</select>`
              : '삭제할 수 있는 거래가 없습니다. 거래를 입력하면 여기에서 개별 삭제할 수 있습니다.',
            `<button class="button danger" id="dataPartialDeleteButton" type="button" ${activeCount ? '' : 'disabled'}>${icon('trash-2')}선택 거래 삭제</button>`)}
          ${dataCard('일괄 삭제', '이 기기의 모든 장부 데이터를 삭제합니다.',
            badge('위험', 'danger'),
            '거래, 전표, 사업자 정보 등 모든 로컬 데이터를 지웁니다. Supabase 연결 설정과 기기 식별자는 유지되고, 클라우드 데이터에는 영향을 주지 않습니다.',

    }

    function guideSection(number, title, note, body) {
      return `<section class="guide-section"><div class="guide-section-head"><span class="guide-step-number">${number}</span><div><h2 class="guide-section-title">${title}</h2><p class="guide-section-note">${note}</p></div></div>${body}</section>`;
    }

    const GUIDE_TOPICS = Object.freeze([
      { id: 'google-cloud', icon: 'cloud-cog', title: '구글클라우드 연결방법', note: 'Google 로그인부터 Supabase 연결과 앱 진단까지 한 단계씩 확인합니다.' },

      { id: 'vat-exemption', icon: 'badge-percent', title: '부가가치세 면세', note: '어떤 공급이 면세인지 부가가치세법 근거와 함께 설명합니다.' },

      { id: 'tax-terms', icon: 'book-a', title: '주요 세법 용어사전', note: '세법 용어의 법적 정의와 초등학생 눈높이 설명을 함께 봅니다. 대시보드에서도 검색됩니다.' }
    ]);
    function guideTopicButtons() {
      return GUIDE_TOPICS.map(t => { const open = state.guideTopic === t.id; return `<button class="guide-topic-button ${open ? 'active' : ''}" type="button" data-guide-topic="${t.id}" aria-expanded="${open}"><span class="guide-topic-icon">${icon(t.icon)}</span><span class="guide-topic-copy"><span class="guide-topic-title">${t.title}</span><span class="guide-topic-note">${t.note}</span></span><span class="guide-topic-arrow">${icon(open ? 'chevron-up' : 'chevron-right')}</span></button>`; }).join('');
    }
    function renderGuide() {
      const header = `${pageHeader('가이드','필요한 주제를 선택하면 쉬운 설명과 법적 근거를 함께 보여드립니다.')}<div class="guide-topic-list">${guideTopicButtons()}</div>`;
      const topic = state.guideTopic;
      if (topic === 'google-cloud') return `${header}${googleCloudGuideHtml()}`;
      if (topic === 'tax-terms') return `${header}${termsGuideHtml()}`;
      if (topic === 'bookkeeping-duty' || topic === 'vat-exemption' || topic === 'estimate-expense-rate' || topic === 'overseas') return `${header}${legalGuideHtml(topic)}`;
      return header;
    }
    function termCardHtml(t) {
      return `<div class="term-card"><div class="term-card-name">${Utils.escape(t.term)}</div><div class="term-card-kid">${icon('smile')}<span>${Utils.escape(t.kid)}</span></div><div class="term-card-law"><strong>법적 정의</strong> · ${Utils.escape(t.law)}</div></div>`;
    }
    function termsGuideHtml() {
      const cats = [];
      TAX_TERMS.forEach(t => { if (!cats.includes(t.cat)) cats.push(t.cat); });
      const groups = cats.map(cat => `<div class="term-group"><h3 class="term-group-title">${Utils.escape(cat)}</h3>${TAX_TERMS.filter(t => t.cat === cat).map(termCardHtml).join('')}</div>`).join('');
      return `<section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">주요 세법 용어사전</h2><p class="section-help">각 용어의 법적 정의와 초등학생도 이해하기 쉬운 설명을 함께 담았습니다. 대시보드 검색창에서도 찾을 수 있습니다.</p></div>${badge(`${TAX_TERMS.length}개 용어`,'info')}</div>${groups}</section>`;
    }
    function googleCloudGuideHtml() {
      const status = GuideService.status();
      const statusItem = (label, passed, successText, waitText) => `<div class="guide-check"><div class="guide-check-label">${label}</div><div class="guide-check-state ${passed ? 'success' : 'warning'}">${passed ? successText : waitText}</div></div>`;
      const origins = GuideService.javascriptOrigins().map((value, index) => guideValue(`JavaScript 원본 ${index + 1}`, value)).join('');
      const redirects = GuideService.appRedirectUrls().map((value, index) => guideValue(`Supabase Redirect URL ${index + 1}`, value)).join('');
      return `<div class="guide-summary">
          <div class="notice info">${icon('refresh-cw')}<div><strong>이 안내는 현재 앱 기록과 연결되어 있습니다.</strong><br>앱 버전, 소유자 이메일, Supabase 주소, 배포 주소와 연결 진단이 바뀌면 아래 값과 상태도 함께 바뀝니다. 현재 앱은 v${APP_INFO.version}입니다.</div></div>
          <div class="guide-checks">
            ${statusItem('Data API', status.dataApi, '연결됨', '진단 필요')}
            ${statusItem('익명 자료 차단', status.anonymousIsolation, '차단 정상', '진단 필요')}
            ${statusItem('Google OAuth', status.googleProvider, '사용 가능', '설정 필요')}
            ${statusItem('소유자 로그인', status.ownerLogin, '로그인 완료', '로그인 필요')}
          </div>
        </div>
        <div class="notice danger">${icon('shield-alert')}<div><strong>비밀값은 이 가이드나 앱에 적지 마세요.</strong><br>Google Client Secret은 Google Cloud에서 확인한 뒤 Supabase Dashboard에만 입력합니다. 화면 캡처, 문서, GitHub, 앱 설정에는 남기지 않습니다.</div></div>
        <div class="panel">
          ${guideSection(1, 'Google Cloud 프로젝트를 준비합니다', 'Google 로그인을 만들 공간을 선택합니다.', `<ol class="guide-steps"><li>Google Cloud Console을 열고 위쪽 프로젝트 선택 버튼을 누릅니다.</li><li><strong>새 프로젝트</strong>를 누릅니다.</li><li>아래 이름을 입력하고 <strong>만들기</strong>를 누릅니다.</li><li>프로젝트가 만들어지면 반드시 그 프로젝트가 선택되어 있는지 확인합니다.</li></ol><div class="guide-values">${guideValue('프로젝트 이름', APP_INFO.googleCloudProjectName)}${guideValue('프로젝트 ID', APP_INFO.googleCloudProjectId)}</div>`)}
          ${guideSection(2, 'Google 인증 플랫폼을 설정합니다', '로그인 화면에 표시될 앱 정보와 사용할 사람을 정합니다.', `<ol class="guide-steps"><li>상단 검색창에 <strong>Google Auth Platform</strong>을 입력해 이동합니다.</li><li><strong>시작하기</strong>를 누르고 앱 이름과 사용자 지원 이메일을 입력합니다. 앱 이름은 나중에 로그인 화면에 보입니다.</li><li>대상은 <strong>외부</strong>를 선택합니다. 조직 계정이 없어도 사용할 수 있는 방식입니다.</li><li>게시 상태는 <strong>테스트 중</strong>으로 둡니다. 지금은 앱 게시 버튼을 누르지 않습니다.</li><li><strong>대상</strong> 메뉴의 테스트 사용자에서 아래 이메일만 추가합니다.</li></ol><div class="guide-values">${guideValue('로그인 화면 앱 이름', APP_INFO.name)}${guideValue('사용자 지원 이메일', APP_INFO.ownerEmail)}${guideValue('앱 소유자·테스트 사용자', APP_INFO.ownerEmail)}</div>`)}
          ${guideSection(3, '필요한 권한만 선택합니다', '이 앱은 로그인한 사람의 기본 이름과 이메일만 확인합니다.', `<ol class="guide-steps"><li><strong>데이터 액세스</strong> 메뉴에서 <strong>범위 추가 또는 삭제</strong>를 누릅니다.</li><li>아래 세 범위만 체크하고 저장합니다.</li><li>Gmail, Drive, Calendar 같은 다른 권한은 선택하지 않습니다.</li></ol><div class="guide-values">${guideValue('범위 1', 'openid')}${guideValue('범위 2', '.../auth/userinfo.email')}${guideValue('범위 3', '.../auth/userinfo.profile')}</div>`)}
          ${guideSection(4, '웹 OAuth 클라이언트를 만듭니다', 'Google이 바른장부와 Supabase를 믿을 수 있도록 정확한 주소를 등록합니다.', `<ol class="guide-steps"><li><strong>클라이언트</strong> 메뉴에서 <strong>클라이언트 만들기</strong>를 누릅니다.</li><li>애플리케이션 유형은 <strong>웹 애플리케이션</strong>을 선택합니다.</li><li>아래 클라이언트 이름을 입력합니다.</li><li><strong>승인된 JavaScript 원본</strong>에는 아래 세 주소를 각각 추가합니다. GitHub 주소에는 저장소 경로를 넣지 않습니다.</li><li><strong>승인된 리디렉션 URI</strong>에는 Supabase callback 주소 하나만 넣습니다.</li><li><strong>만들기</strong>를 누른 뒤 Client ID와 Client Secret을 확인합니다. Secret은 복사한 뒤 Supabase에만 붙여넣습니다.</li></ol><div class="guide-values">${guideValue('OAuth 클라이언트 이름', APP_INFO.googleOAuthClientName)}${origins}${guideValue('승인된 리디렉션 URI', GuideService.callbackUrl())}</div>`)}
          ${guideSection(5, 'Supabase에서 Google 로그인을 켭니다', 'Google에서 만든 두 값을 Supabase Auth에 연결합니다.', `<ol class="guide-steps"><li>Supabase Dashboard에서 현재 프로젝트를 엽니다.</li><li><strong>Authentication → Sign In / Providers → Google</strong>로 이동합니다.</li><li><strong>Enable Sign in with Google</strong>을 켭니다.</li><li>Google Cloud의 Client ID를 <strong>Client IDs</strong>에 입력합니다.</li><li>Client Secret을 <strong>Client Secret (for OAuth)</strong>에 입력합니다.</li><li><strong>Skip nonce checks</strong>와 <strong>Allow users without an email</strong>은 끈 상태로 둡니다.</li><li><strong>Save</strong>를 누릅니다.</li></ol><div class="guide-values">${guideValue('Supabase 프로젝트 ref', GuideService.projectRef())}${guideValue('Supabase Project URL', GuideService.supabaseUrl())}${guideValue('Google에 등록할 callback', GuideService.callbackUrl())}</div>`)}
          ${guideSection(6, 'Supabase 이동 주소를 등록합니다', '로그인 뒤 돌아올 수 있는 앱 주소만 허용합니다.', `<ol class="guide-steps"><li>Supabase에서 <strong>Authentication → URL Configuration</strong>으로 이동합니다.</li><li><strong>Site URL</strong>에 GitHub Pages 앱 주소를 입력하고 저장합니다.</li><li><strong>Redirect URLs</strong>에서 아래 세 주소를 하나씩 추가합니다.</li><li>주소 끝의 <code>/</code>까지 똑같이 입력합니다.</li></ol><div class="guide-values">${guideValue('Site URL', APP_INFO.githubPagesUrl)}${redirects}</div>`)}
          ${guideSection(7, '바른장부에서 연결을 확인합니다', '세 가지 진단이 통과한 다음 소유자 계정으로 로그인합니다.', `<ol class="guide-steps"><li>왼쪽 메뉴에서 <strong>설정</strong>을 누릅니다.</li><li><strong>Supabase 및 Google 로그인</strong>에서 <strong>연결 진단</strong>을 누릅니다.</li><li>Data API는 <strong>정상</strong>, 익명 회계자료 격리는 <strong>차단 정상</strong>, Google OAuth는 <strong>사용 가능</strong>인지 확인합니다.</li><li><strong>Google로 로그인</strong>을 누르고 아래 소유자 계정을 선택합니다.</li><li>앱으로 돌아왔을 때 위쪽 상태가 <strong>동기화 완료</strong>이면 연결이 끝난 것입니다.</li></ol><div class="guide-values">${guideValue('로그인할 Google 계정', APP_INFO.ownerEmail)}</div><div class="form-actions"><button class="button" type="button" data-route="settings">${icon('settings-2')}설정에서 확인</button></div>`)}
          ${guideSection(8, '문제가 생기면 이 순서로 봅니다', '주소 한 글자, 테스트 사용자, 비밀값 위치를 먼저 확인하면 대부분 해결됩니다.', `<ol class="guide-steps"><li><strong>redirect_uri_mismatch</strong>: Google Cloud의 승인된 리디렉션 URI가 위 callback 주소와 완전히 같은지 확인합니다.</li><li><strong>Access blocked</strong>: Google Auth Platform이 테스트 중인지, 소유자 이메일이 테스트 사용자에 들어 있는지 확인합니다.</li><li><strong>Google 설정 필요</strong>: Supabase Google provider가 켜져 있고 Client ID와 Secret이 저장됐는지 확인합니다.</li><li><strong>로그인은 됐지만 자료 접근 불가</strong>: 허용 사용자 대장에서 이메일 상태가 active인지 확인합니다.</li><li>주소를 고친 뒤 앱의 <strong>설정 → 연결 진단</strong>을 다시 누릅니다.</li></ol>`)}
        </div>`;

    // 주요 세무 법령을 쉬운 설명 + 근거 조문으로 안내한다. 확정 신고 판단이 아니라 이해를 돕는 안내다.
    function legalGuideHtml(topic) {
      if (topic === 'bookkeeping-duty') {
        return `<section class="panel card-panel"><div class="panel-head"><div><h2 class="section-title">기장의무 판단 — 간편장부 vs 복식부기</h2><p class="section-help">내 사업이 어떤 장부를 써야 하는지 쉬운 말과 법적 근거로 정리합니다.</p></div>${badge('법적 근거','info')}</div>
          <div class="notice info">${icon('book-open-check')}<div><strong>장부는 두 종류입니다.</strong><br><strong>간편장부</strong>는 가계부처럼 날짜·내용·금액을 적는 쉬운 장부이고, <strong>복식부기</strong>는 한 거래를 차변·대변 양쪽에 이중으로 적는 정식 장부입니다.</div></div>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#163b33">
  <meta name="description" content="대한민국 개인사업자를 위한 간편장부·복식부기 통합 회계장부">
  <title>바른장부</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #66736f;
      --line: #d9e0dd;
      --line-strong: #bdc9c5;
      --surface: #ffffff;
      --surface-soft: #f4f7f5;
      --surface-warm: #fff9ee;
      --brand: #17624f;
      --brand-strong: #104b3d;
      --brand-soft: #e6f3ee;
      --accent: #b65b27;
      --accent-soft: #fff0e5;
      --danger: #b33b3b;
      --danger-soft: #fff0ef;
      --warning: #8a5a12;
      --warning-soft: #fff4d8;
      --success: #1d6b45;
      --shadow: 0 10px 28px rgba(25, 47, 41, .08);
      --sidebar: 232px;
      --header: 68px;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { background: #edf2ef; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      background: var(--surface-soft);
      font-size: 14px;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .52; }
    a { color: inherit; }
    [hidden] { display: none !important; }
    :focus-visible { outline: 3px solid rgba(23, 98, 79, .24); outline-offset: 2px; }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar) minmax(0, 1fr); }
    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 40;
      width: var(--sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid #24483f;
      background: #163b33;
      color: #f7fbf9;
    }
    .brand {
      height: var(--header);
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: #f4c45f;
      color: #163b33;
      font-weight: 900;
      font-size: 16px;
    }
    .brand-name { font-size: 17px; font-weight: 800; }
    .brand-version { margin-top: 2px; color: #b9d1ca; font-size: 11px; }
    .nav { padding: 14px 10px; overflow-y: auto; }
    .nav-group-label { padding: 13px 10px 7px; color: #98b9af; font-size: 11px; font-weight: 700; }
    .nav-button {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 11px;
      border: 0;
      border-radius: 6px;
      color: #dce9e5;
      background: transparent;
      text-align: left;
    }
    .nav-button:hover { background: rgba(255,255,255,.08); }
    .nav-button.active { background: #f7fbf9; color: #163b33; font-weight: 800; }
    .nav-button svg { width: 18px; height: 18px; flex: 0 0 auto; }
    .sidebar-footer { margin-top: auto; padding: 14px; border-top: 1px solid rgba(255,255,255,.12); }
    .sidebar-status { display: flex; align-items: center; gap: 8px; color: #c8dbd5; font-size: 12px; }

    .main-column { grid-column: 2; min-width: 0; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
    }
    .topbar-left, .topbar-actions, .inline-actions { display: flex; align-items: center; gap: 9px; }
    .topbar-title { font-size: 18px; font-weight: 800; }
    .topbar-context { color: var(--muted); font-size: 12px; }
    .icon-button.mobile-menu { display: none; }
    .content { width: min(1420px, 100%); margin: 0 auto; padding: 24px 28px 56px; }

    .icon-button, .button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
    }
    .button { padding: 8px 14px; }
    .icon-button { width: 38px; padding: 0; }
    .button svg, .icon-button svg { width: 17px; height: 17px; }
    .button:hover, .icon-button:hover { border-color: #8da39c; background: #f9fbfa; }
    .button.primary { border-color: var(--brand); background: var(--brand); color: #fff; }
    .button.primary:hover { background: var(--brand-strong); }
    .button.danger { border-color: #e2b4b4; color: var(--danger); background: var(--danger-soft); }
    .button.ghost { border-color: transparent; background: transparent; }
    .button.small { min-height: 32px; padding: 6px 10px; font-size: 12px; }
    .button.block { width: 100%; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #99aaa4; flex: 0 0 auto; }
    .status-dot.online { background: #4bc184; box-shadow: 0 0 0 3px rgba(75,193,132,.14); }
    .status-dot.offline { background: #e1a43d; }
    .status-dot.error { background: #d45151; }
    .sync-chip {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 20px; }
    .page-title { margin: 0; font-size: 25px; line-height: 1.25; }
    .page-subtitle { margin: 7px 0 0; color: var(--muted); line-height: 1.65; }
    .section-title { margin: 0; font-size: 16px; }
    .section-help { margin: 5px 0 0; color: var(--muted); line-height: 1.55; font-size: 13px; }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 13px 14px;
      margin-bottom: 16px;
      border: 1px solid #ead8a7;
      border-radius: 6px;
      background: var(--warning-soft);
      color: #6d4c17;
      line-height: 1.55;
    }
    .notice.info { border-color: #bad7cc; background: var(--brand-soft); color: #245849; }
    .notice.danger { border-color: #e4bcbc; background: var(--danger-soft); color: #7d2d2d; }
    .notice svg { width: 18px; height: 18px; margin-top: 1px; flex: 0 0 auto; }

    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 22px; }
    .metric-card {
      min-width: 0;
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      box-shadow: 0 2px 8px rgba(25,47,41,.03);
    }
    .metric-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .metric-label { color: var(--muted); font-size: 12px; font-weight: 700; }
    .metric-icon { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 6px; background: var(--brand-soft); color: var(--brand); }
    .metric-icon.warm { background: var(--accent-soft); color: var(--accent); }
    .metric-icon svg { width: 16px; height: 16px; }
    .metric-value { margin-top: 13px; font-size: 23px; font-weight: 850; font-variant-numeric: tabular-nums; }
    .metric-foot { margin-top: 7px; color: var(--muted); font-size: 12px; }

    .layout-two { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(300px, .8fr); gap: 16px; }
    .panel { border-top: 1px solid var(--line-strong); background: transparent; padding: 18px 0 4px; }
    .panel + .panel { margin-top: 18px; }
    .panel.card-panel { padding: 18px; border: 1px solid var(--line); border-radius: 7px; background: var(--surface); }
    .panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 15px; }

    .task-list, .activity-list, .guardian-list { display: grid; gap: 8px; }
    .task-row, .activity-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 10px 0;
      border-bottom: 1px solid #e8ecea;
    }
    .task-row:last-child, .activity-row:last-child { border-bottom: 0; }
    .task-main, .activity-main { min-width: 0; flex: 1; }
    .task-title, .activity-title { font-weight: 750; }
    .task-note, .activity-note { margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 3px 7px;
      border-radius: 5px;
      background: #edf1ef;
      color: #53615d;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.success { background: #e5f3ea; color: var(--success); }
    .badge.warning { background: var(--warning-soft); color: var(--warning); }
    .badge.danger { background: var(--danger-soft); color: var(--danger); }
    .badge.info { background: var(--brand-soft); color: var(--brand); }

    .form-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 14px; }
    .field { grid-column: span 6; min-width: 0; }
    .field.third { grid-column: span 4; }
    .field.full { grid-column: 1 / -1; }
    .field label, .field-label { display: block; margin-bottom: 7px; font-size: 12px; font-weight: 800; }
    .required::after { content: " *"; color: var(--danger); }
    .input, .select, .textarea {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }
    .textarea { min-height: 84px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus { border-color: var(--brand); outline: 3px solid rgba(23,98,79,.1); }
    .field-help { margin-top: 6px; color: var(--muted); font-size: 11px; line-height: 1.5; }
    .field-error { min-height: 18px; margin-top: 5px; color: var(--danger); font-size: 11px; }
    .money-wrap { position: relative; }
    .money-wrap .input { padding-right: 36px; text-align: right; font-variant-numeric: tabular-nums; }
    .money-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--line-strong); border-radius: 6px; overflow: hidden; }
    .segment { min-height: 42px; border: 0; border-right: 1px solid var(--line); background: #fff; color: var(--muted); font-weight: 750; }
    .segment:last-child { border-right: 0; }
    .segment.active { background: var(--brand); color: #fff; }
    .checkbox-row { display: flex; align-items: flex-start; gap: 9px; line-height: 1.5; }
    .checkbox-row input { width: 17px; height: 17px; margin-top: 2px; accent-color: var(--brand); }
    .calc-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; margin-top: 14px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--line); }
    .calc-item { padding: 11px; background: var(--surface-soft); text-align: right; }
    .calc-label { color: var(--muted); font-size: 11px; }
    .calc-value { margin-top: 4px; font-weight: 850; font-variant-numeric: tabular-nums; }
    .form-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }

    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 7px; background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 820px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid #e8ecea; text-align: left; vertical-align: middle; }
    th { position: sticky; top: 0; z-index: 2; background: #f3f6f4; color: #57645f; font-size: 11px; font-weight: 850; }
    tbody tr:hover { background: #fafcfb; }
    tbody tr:last-child td { border-bottom: 0; }
    td.number, th.number { text-align: right; font-variant-numeric: tabular-nums; }
    .empty-state { padding: 42px 20px; text-align: center; color: var(--muted); }
    .empty-state svg { width: 30px; height: 30px; margin-bottom: 10px; color: #8da39c; }
    .empty-title { color: var(--ink); font-weight: 800; }
    .empty-note { margin: 6px auto 0; max-width: 420px; line-height: 1.6; font-size: 12px; }

    .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .filter-bar .input, .filter-bar .select { width: auto; min-width: 150px; min-height: 36px; padding: 7px 9px; }
    .amount-positive { color: var(--brand); font-weight: 800; }
    .amount-negative { color: var(--accent); font-weight: 800; }

    .status-board { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .status-item { padding: 14px; border: 1px solid var(--line); border-radius: 7px; background: #fff; }
    .status-item-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .status-item-title { font-weight: 800; }
    .status-item-body { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.6; }

    .data-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .data-card { display: flex; flex-direction: column; }
    .data-card .data-body { color: var(--muted); font-size: 12.5px; line-height: 1.7; }
    .data-card .data-actions { margin-top: auto; padding-top: 14px; display: flex; gap: 9px; flex-wrap: wrap; }
    .data-card .data-actions .button { flex: 1; justify-content: center; }
    .data-card .select { margin-top: 4px; width: 100%; }

    .evidence-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .evidence-row:last-child { border-bottom: 0; }
    .evidence-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .evidence-files { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .evidence-thumb { display: block; width: 56px; height: 56px; border-radius: 6px; overflow: hidden; border: 1px solid var(--line); }
    .evidence-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .evidence-file-wrap { position: relative; display: inline-flex; }
    .evidence-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; padding: 0; border-radius: 50%; border: 1px solid var(--line); background: var(--surface); color: var(--muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
    .evidence-remove:hover { color: var(--danger); border-color: var(--danger); }
    .evidence-remove i { width: 13px; height: 13px; }

    .industry-results { border: 1px solid var(--line); border-radius: 7px; margin-top: 6px; max-height: 240px; overflow-y: auto; background: var(--surface); }
    .industry-item { display: block; width: 100%; text-align: left; padding: 9px 12px; cursor: pointer; border: 0; border-bottom: 1px solid var(--line); background: transparent; font: inherit; color: inherit; }
    .industry-item:last-child { border-bottom: 0; }
    .industry-item:hover, .industry-item:focus { background: rgba(0,0,0,.05); outline: none; }
    .industry-item .code { font-weight: 800; font-variant-numeric: tabular-nums; }
    .industry-item .major { color: var(--muted); font-size: 11px; }
    .industry-picked { margin-top: 8px; font-size: 13px; }
    .label-optional { color: var(--muted); font-weight: 500; font-size: 12px; }
    .personal-service-hint { color: var(--warning); font-weight: 700; }
    .expense-rate { margin-top: 6px; font-size: 13px; }
    .expense-rate-tag { display: inline-block; padding: 1px 7px; border-radius: 10px; background: rgba(0,0,0,.06); font-size: 11px; color: var(--muted); margin-right: 4px; }
    .law-line { margin-top: 5px; font-size: 13px; }
    .law-tag { display: inline-block; padding: 1px 7px; border-radius: 10px; background: rgba(0,0,0,.06); font-size: 11px; color: var(--muted); margin-right: 4px; }
    .law-tag.warn { background: rgba(180,120,0,.14); color: var(--warning); }
    .coa-ref { display: grid; gap: 14px; }
    .coa-group-head { margin-bottom: 6px; font-size: 14px; }
    .coa-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .coa-table th { text-align: left; white-space: nowrap; vertical-align: top; padding: 4px 12px 4px 0; font-weight: 600; width: 1%; }
    .coa-table td { vertical-align: top; padding: 4px 0; color: var(--muted); border-bottom: 1px solid rgba(0,0,0,.05); }
    .coa-table th { border-bottom: 1px solid rgba(0,0,0,.05); }
    .estimator { margin: 12px 0; }
    .estimator-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
    .est-field { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; color: var(--muted); }
    .est-field input, .est-field select { text-align: right; }
    .est-field select { text-align: left; }
    .est-note { margin: 8px 0 12px; }
    .est-out { display: grid; gap: 6px; padding: 12px 14px; border: 1px solid rgba(0,0,0,.08); border-radius: 10px; background: rgba(0,0,0,.02); }
    .est-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-size: 13.5px; }
    .est-row strong { font-variant-numeric: tabular-nums; }
    .est-row.total { border-top: 1px solid rgba(0,0,0,.1); padding-top: 8px; margin-top: 2px; font-size: 15px; }
    .est-row.total strong { color: var(--brand); }
    .est-judgement { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 10px; }
    .est-tag { font-size: 12px; padding: 2px 10px; border-radius: 10px; background: var(--brand-soft); color: var(--brand-strong); }
    .est-tag:empty { display: none; }
    .legal-basis { display: flex; gap: 10px; margin-top: 12px; padding: 12px 14px; border-left: 3px solid var(--brand); background: var(--brand-soft); border-radius: 0 10px 10px 0; font-size: 13px; line-height: 1.6; }
    .legal-basis strong { color: var(--brand-strong); }
    .guide-why { display: flex; gap: 10px; margin-top: 12px; padding: 13px 15px; border-radius: 12px; background: var(--surface-warm); border: 1px solid var(--warning-soft); font-size: 13.5px; line-height: 1.75; }
    .guide-why strong { color: var(--warning); }
    .guide-why > :first-child { flex: 0 0 auto; color: var(--warning); }
    .term-results { margin-top: 12px; }
    .term-group-title { font-size: 14px; margin: 18px 0 8px; color: var(--brand-strong); }
    .term-card { padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 10px; background: var(--surface); }
    .term-card-name { font-weight: 700; font-size: 15px; margin-bottom: 5px; }
    .term-card-kid { display: flex; gap: 8px; font-size: 13.5px; line-height: 1.65; margin-bottom: 7px; }
    .term-card-kid > :first-child { flex: 0 0 auto; color: var(--accent); }
    .term-card-law { font-size: 12.5px; color: var(--muted); line-height: 1.6; }
    .term-card-law strong { color: var(--brand-strong); }
    .import-preview { margin-top: 12px; max-height: 460px; overflow: auto; }
    .import-preview table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .import-preview th, .import-preview td { padding: 5px 8px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    .import-preview th { position: sticky; top: 0; background: var(--surface); }
    .import-preview td.number, .import-preview th.number { text-align: right; font-variant-numeric: tabular-nums; }
    .review-section { margin-top: 14px; }
    .review-title { margin: 0 0 8px; font-size: 14px; color: var(--brand-strong); }
    .review-fix { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line); }
    .review-label { flex: 1 1 220px; font-size: 13px; line-height: 1.5; }
    .review-fix .select { flex: 0 1 220px; }

    .term-button { border: 0; border-bottom: 1px dashed #7b918a; padding: 0; background: transparent; color: inherit; font-weight: inherit; }
    .tooltip {
      position: fixed;
      z-index: 100;
      width: min(320px, calc(100vw - 28px));
      padding: 12px 13px;
      border: 1px solid #9eb4ad;
      border-radius: 6px;
      background: #112f28;
      color: #f3f8f6;
      box-shadow: var(--shadow);
      line-height: 1.6;
      font-size: 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(15, 30, 26, .54);
    }
    .modal {
      width: min(680px, 100%);
      max-height: min(780px, calc(100vh - 40px));
      overflow: auto;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(9, 24, 20, .24);
    }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; border-bottom: 1px solid var(--line); }
    .modal-title { margin: 0; font-size: 18px; }
    .modal-body { padding: 20px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 9px; padding: 15px 20px; border-top: 1px solid var(--line); }

    .toast-region { position: fixed; right: 18px; bottom: 18px; z-index: 120; display: grid; gap: 8px; width: min(360px, calc(100vw - 36px)); }

    .developer-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .guardian-item { padding: 13px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }

      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 15px;

      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      text-align: left;

    .guide-topic-arrow svg { width: 18px; height: 18px; }

    .guide-values { display: grid; gap: 8px; margin-top: 14px; }
    .guide-value {
      min-width: 0;

      grid-template-columns: minmax(130px, .45fr) minmax(0, 1fr) 38px;
      align-items: center;
      gap: 10px;

    .guide-checks { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin: 14px 0 4px; }
    .guide-check { padding: 11px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
    .guide-check-label { color: var(--muted); font-size: 11px; }
    .guide-check-state { margin-top: 6px; font-weight: 800; }
    .guide-check-state.success { color: var(--success); }
    .guide-check-state.warning { color: var(--warning); }

    @media (max-width: 1100px) {
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout-two { grid-template-columns: 1fr; }
    }
    @media (max-width: 780px) {

      .app-shell { display: block; }
      .sidebar { transform: translateX(-100%); transition: transform .2s ease; box-shadow: 12px 0 30px rgba(0,0,0,.15); }

      .main-column { width: 100%; }
      .icon-button.mobile-menu { display: inline-flex; }
      .topbar { padding: 0 14px; }
      .topbar-context { display: none; }
      .content { padding: 18px 14px 42px; }
      .page-header { align-items: stretch; flex-direction: column; }
      .page-header .inline-actions { width: 100%; }
      .page-header .inline-actions .button { flex: 1; }
      .page-title { font-size: 21px; }
      .metric-grid { grid-template-columns: 1fr 1fr; gap: 9px; }
      .metric-card { padding: 14px; }
      .metric-value { font-size: 19px; }
      .form-grid { grid-template-columns: 1fr; }
      .field, .field.third, .field.full { grid-column: 1; }
      .status-board, .developer-grid, .guide-checks, .data-grid { grid-template-columns: 1fr; }
      .topbar-actions .button-label { display: none; }
    }
    @media (max-width: 480px) {
      .metric-grid { grid-template-columns: 1fr; }
      .segmented { grid-template-columns: 1fr; }
      .segment { border-right: 0; border-bottom: 1px solid var(--line); }
      .segment:last-child { border-bottom: 0; }
      .calc-strip { grid-template-columns: 1fr; }
      .form-actions { flex-direction: column-reverse; }
      .form-actions .button { width: 100%; }
      .topbar-title { font-size: 16px; }
      .guide-value { grid-template-columns: 1fr 38px; }
      .guide-value-label { grid-column: 1 / -1; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; } }

          { name: '급료', desc: '종업원에게 지급되는 월급, 잡급, 일당, 퇴직금 등 인건비' },
          { name: '제세공과금', desc: '업무용 자동차세, 면허세, 상공회의소 회비 등' },
          { name: '임차료', desc: '사업목적으로 사용하는 건물 및 토지를 빌리고 지급하는 대가(월세·연세). 단, 보증금은 제외' },

          { name: '지급수수료', desc: '서비스를 제공받고 지불하는 비용(송금·신용카드 결제수수료, 비품 유지수수료, 자문수수료, 도메인 등록수수료 등)' },

          { name: '광고선전비', desc: '판매촉진 목적으로 불특정 다수인에게 광고선전하는 데 드는 비용(전단지 배포비, 판촉물 등)' },
          { name: '여비교통비', desc: '임직원이 업무 수행을 위해 출장가는 경우 소요되는 비용(내부규정에 따른 여비·교통비)' },
          { name: '기타(비용)', desc: '업무와 관련하여 발생한 위 항목에 속하지 않는 기타 비용' }
        ]) },
        { key: 'manufacturing', label: '제조비용', column: '비용', items: Object.freeze([
          { name: '재료비', desc: '물품을 생산하기 위해 사용되는 재료' },
          { name: '노무비', desc: '물품 생산에 종사하는 직원의 인건비' },
          { name: '경비', desc: '제품을 생산하기 위해 소요되는 비용(전기요금, 운반비, 수선비, 외주가공비 등)' }
        ]) },
        { key: 'asset', label: '사업용 유형·무형자산 매입', column: '자산', items: Object.freeze([
          { name: '건물 및 구축물', desc: '업무에 사용하는 건물 및 구축물(사무실, 창고, 기숙사, 공장, 점포 등)' },
          { name: '차량운반구', desc: '업무에 사용하는 차량과 운반구' },
          { name: '비품', desc: '업무에 사용하는 책상, 의자, 컴퓨터, 가구, 금고 등' },
          { name: '기계장치', desc: '업무에 사용하는 기계와 부속 설비' }
        ]) }
      ]),
      all() { return this.GROUPS.flatMap(g => g.items.map(it => ({ name: it.name, desc: it.desc, group: g.key, groupLabel: g.label, column: g.column }))); },
      find(name) { const q = String(name || '').trim(); return this.all().find(a => a.name === q) || null; },
      columnOf(name) { const hit = this.find(name); return hit ? hit.column : null; }
    });

    // 간편장부 Excel(.xlsx) 리더 — 하드룰(무 CDN)에 따라 브라우저 내장 API만 사용한다.
    // ZIP 중앙디렉터리 파싱 + DecompressionStream('deflate-raw')로 압축 해제. 외부 라이브러리 없음.
    const XlsxReader = Object.freeze({
      async read(buffer) {
        const dv = new DataView(buffer);
        const bytes = new Uint8Array(buffer);
        let eocd = -1;
        const min = Math.max(0, buffer.byteLength - 22 - 65536);
        for (let i = buffer.byteLength - 22; i >= min; i--) { if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; } }
        if (eocd < 0) throw new Error('올바른 xlsx(zip) 파일이 아닙니다.');
        const count = dv.getUint16(eocd + 10, true);
        let p = dv.getUint32(eocd + 16, true);
        const entries = {};
        const dec = new TextDecoder();
        for (let n = 0; n < count; n++) {
          if (dv.getUint32(p, true) !== 0x02014b50) break;
          const method = dv.getUint16(p + 10, true);
          const compSize = dv.getUint32(p + 20, true);
          const fnLen = dv.getUint16(p + 28, true);
          const extraLen = dv.getUint16(p + 30, true);
          const commentLen = dv.getUint16(p + 32, true);
          const localOff = dv.getUint32(p + 42, true);
          const name = dec.decode(bytes.subarray(p + 46, p + 46 + fnLen));
          entries[name] = { method, compSize, localOff };
          p += 46 + fnLen + extraLen + commentLen;
        }
        return { dv, bytes, entries };
      },
      async text(ctx, name) {
        const e = ctx.entries[name];
        if (!e) return null;
        const { dv, bytes } = ctx;
        const lo = e.localOff;
        if (dv.getUint32(lo, true) !== 0x04034b50) throw new Error('zip 로컬 헤더 오류');
        const start = lo + 30 + dv.getUint16(lo + 26, true) + dv.getUint16(lo + 28, true);
        const comp = bytes.subarray(start, start + e.compSize);
        if (e.method === 0) return new TextDecoder().decode(comp);
        if (e.method === 8) {
          const stream = new Response(comp).body.pipeThrough(new DecompressionStream('deflate-raw'));
          return new TextDecoder().decode(new Uint8Array(await new Response(stream).arrayBuffer()));
        }
        throw new Error('지원하지 않는 압축 방식(zip method ' + e.method + ')입니다.');
      }
    });

    // 간편장부 「장부」 시트 파서 — 원본 행을 그대로 읽어 미리보기 후보를 만든다. 자동 전기(장부 반영)는 하지 않는다.
    // 컬럼: A=월 B=일 C=계정과목 D=거래내용 E=거래처 F/G=수입 금액/부가세 H/I=비용 J/K=자산 L=비고 (M열 이후 사용자 보조열은 무시).
    const SB_IMPORT_COL = Object.freeze({ month: 1, day: 2, account: 3, description: 4, counterparty: 5, incomeAmount: 6, incomeVat: 7, expenseAmount: 8, expenseVat: 9, assetAmount: 10, assetVat: 11, note: 12 });
    const SimpleBookImport = Object.freeze({
      SHEET: '장부',
      DATA_START_ROW: 4,
      COL: SB_IMPORT_COL,
      buildDate(year, month, day) {
        const m = parseInt(month, 10), d = parseInt(day, 10);
        if (year && m >= 1 && m <= 12 && d >= 1 && d <= 31) return `${year}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        return [month, day].filter(v => v != null && v !== '').join('/');
      },
      classify(income, expense, asset) { return income ? 'income' : expense ? 'expense' : asset ? 'asset' : 'unknown'; },
      // 미분류 계정과목에 가장 가까운 표준 간편장부 계정과목을 제안(자동 적용 아님, 사용자 승인용).
      suggestAccount(name) {
        const q = String(name || '').trim();
        const all = SimpleBookAccounts.all();
        const hit = (q && (all.find(a => a.name === q) || all.find(a => a.name.includes(q) || q.includes(a.name)))) || null;
        return hit ? hit.name : '기타(비용)';
      },
      // 오류(error)·경고(warn) 탐지. 값은 바꾸지 않고 문제만 보고한다(제안+승인 원칙).
      validate(rows) {
        const errors = [], warns = [], acctCount = {}, vatSuspects = [];
        rows.forEach((r, i) => {
          const amt = r.kind === 'income' ? r.income : r.kind === 'asset' ? r.asset : r.expense;
          const vat = r.kind === 'income' ? r.incomeVat : r.kind === 'asset' ? r.assetVat : r.expenseVat;
          const nonzero = [r.income, r.expense, r.asset].filter(x => x > 0).length;
          const dm = /^20\d{2}-(\d{2})-(\d{2})$/.exec(r.date);
          if (!dm || +dm[1] < 1 || +dm[1] > 12 || +dm[2] < 1 || +dm[2] > 31) errors.push({ i, code: 'bad_date', msg: '날짜가 올바르지 않습니다' });
          if (nonzero === 0) errors.push({ i, code: 'no_amount', msg: '금액이 없습니다' });
          if ([r.income, r.expense, r.asset, r.incomeVat, r.expenseVat, r.assetVat].some(x => x < 0)) errors.push({ i, code: 'negative', msg: '음수 금액이 있습니다' });
          if (nonzero > 1) warns.push({ i, code: 'ambiguous_kind', msg: '수입·비용·자산 중 둘 이상에 금액이 있습니다' });
          if (r.account && !r.knownAccount) acctCount[r.account] = (acctCount[r.account] || 0) + 1;
          if (vat > 0 && amt > 0) {
            const tol = Math.max(2, Math.round(amt * 0.005));
            if (Math.abs(vat - Math.round(amt / 10)) > tol && Math.abs(vat - Math.round(amt / 11)) <= tol) vatSuspects.push(i);
          }
        });
        const accounts = Object.entries(acctCount).map(([name, count]) => ({ name, count, suggestion: this.suggestAccount(name) }));
        const errorRows = new Set(errors.map(e => e.i));
        return { errors, warns, accounts, vatSuspects, errorCount: errorRows.size, cleanCount: rows.length - errorRows.size, errorRowSet: errorRows };
      },
      // 미분류 계정과목을 사용자가 고른 계정과목으로 일괄 치환(승인 후).
      remapAccount(rows, from, to) {
        return rows.map(r => r.account === from ? { ...r, account: to, knownAccount: !!SimpleBookAccounts.find(to) } : r);
      },
      // "금액"을 부가세 포함 총액으로 보고 공급가액 = 금액 − 부가세로 재계산(승인 후, 부가세 값은 유지).
      recomputeVatInclusive(rows, indices) {
        const set = new Set(indices);
        return rows.map((r, i) => {
          if (!set.has(i)) return r;
          const c = { ...r };
          if (r.kind === 'income') c.income = r.income - r.incomeVat;
          else if (r.kind === 'asset') c.asset = r.asset - r.assetVat;
          else c.expense = r.expense - r.expenseVat;
          return c;
        });
      },
      normalizeRow(cells, year, sourceRow) {
        const g = k => cells[this.COL[k]];
        const num = v => Utils.number(v);
        const income = num(g('incomeAmount')), expense = num(g('expenseAmount')), asset = num(g('assetAmount'));
        const account = String(g('account') || '').trim(), description = String(g('description') || '').trim();
        if (!account && !description && !income && !expense && !asset) return null;
        return {
          sourceRow: sourceRow || null,
          date: this.buildDate(year, g('month'), g('day')), account, description,
          counterparty: String(g('counterparty') || '').trim(),
          income, incomeVat: num(g('incomeVat')), expense, expenseVat: num(g('expenseVat')),
          asset, assetVat: num(g('assetVat')), note: String(g('note') || '').trim(),
          kind: this.classify(income, expense, asset), knownAccount: !!SimpleBookAccounts.find(account)
        };
      },
      colLetter(ref) { const m = /^([A-Z]+)/.exec(ref || ''); if (!m) return 0; let n = 0; for (const c of m[1]) n = n * 26 + (c.charCodeAt(0) - 64); return n; },
      async parse(buffer) {
        const ctx = await XlsxReader.read(buffer);
        const parser = new DOMParser();
        const shared = [];
        const ss = await XlsxReader.text(ctx, 'xl/sharedStrings.xml');
        if (ss) { const doc = parser.parseFromString(ss, 'application/xml'); for (const si of doc.getElementsByTagName('si')) { let s = ''; for (const t of si.getElementsByTagName('t')) s += t.textContent; shared.push(s); } }
        const wbDoc = parser.parseFromString(await XlsxReader.text(ctx, 'xl/workbook.xml'), 'application/xml');
        let rid = null;
        for (const sh of wbDoc.getElementsByTagName('sheet')) {
          if (sh.getAttribute('name') === this.SHEET) { rid = sh.getAttribute('r:id'); if (!rid) for (const at of sh.attributes) if (at.localName === 'id') { rid = at.value; break; } break; }
        }
        if (!rid) throw new Error('“장부” 시트를 찾지 못했습니다. 국세청 간편장부 서식(.xlsx)인지 확인해 주세요.');
        const relDoc = parser.parseFromString(await XlsxReader.text(ctx, 'xl/_rels/workbook.xml.rels'), 'application/xml');
        let target = null;
        for (const r of relDoc.getElementsByTagName('Relationship')) if (r.getAttribute('Id') === rid) { target = r.getAttribute('Target'); break; }
        if (!target) throw new Error('장부 시트 경로를 찾지 못했습니다.');
        const sheetXml = await XlsxReader.text(ctx, target.startsWith('/') ? target.slice(1) : 'xl/' + target.replace(/^\/?/, ''));
        if (!sheetXml) throw new Error('장부 시트를 읽지 못했습니다.');
        const shDoc = parser.parseFromString(sheetXml, 'application/xml');
        const year = (shared.join(' ').match(/(20\d{2})\s*년/) || [])[1] || '';
        const rows = [];
        for (const row of shDoc.getElementsByTagName('row')) {
          const rnum = parseInt(row.getAttribute('r'), 10) || 0;
          if (rnum < this.DATA_START_ROW) continue;
          const cells = {};
          for (const c of row.getElementsByTagName('c')) {
            const col = this.colLetter(c.getAttribute('r')), t = c.getAttribute('t');
            if (t === 'inlineStr') { const it = c.getElementsByTagName('t')[0]; cells[col] = it ? it.textContent : ''; continue; }
            const v = c.getElementsByTagName('v')[0]; if (!v) continue;
            cells[col] = (t === 's') ? (shared[parseInt(v.textContent, 10)] ?? '') : v.textContent;
          }
          const norm = this.normalizeRow(cells, year, rnum);
          if (norm) rows.push(norm);
        }
        const totals = rows.reduce((a, r) => { a.income += r.income; a.expense += r.expense; a.asset += r.asset; return a; }, { income: 0, expense: 0, asset: 0 });
        const counts = rows.reduce((a, r) => { a[r.kind] = (a[r.kind] || 0) + 1; return a; }, {});
        const unknownAccounts = [...new Set(rows.filter(r => r.account && !r.knownAccount).map(r => r.account))];
        return { year, rows, totals, counts, unknownAccounts };
      }
    });

    // 앱 전용 용어 툴팁(세법 용어사전 TAX_TERMS에 없는 앱·회계 개념만 유지). 세법 용어의 SSOT는
    // TAX_TERMS이며 showTerm이 이를 우선 사용한다. 중복 정의를 피하려고 여기엔 앱 고유 용어만 남긴다.
    const TERM_HELP = Object.freeze({
      '부가세': '과세 거래에서 공급가액에 더해지는 세금입니다. 업종과 증빙에 따라 처리 방식이 달라질 수 있습니다.',
      '원천거래': '실제로 발생한 거래 사실의 원본 기록입니다. 앱은 이 기록에서 복식 전표를 만듭니다.',

    });

    // 주요 세법 용어사전 — 각 용어의 법적 정의(근거 조문 포함)와 초등학생 눈높이 설명을 함께 담는다.
    // 법적 정의의 SSOT는 docs/skills/accounting-legal-basis-reference-skill.md. 확정 신고 판단이 아닌 이해용.
    const TAX_TERMS = Object.freeze([
      { term: '복식부기', cat: '장부·기장', law: '한 거래를 차변·대변 양쪽에 이중으로 기록하는 정식 부기 방식. 소득세법 제160조 제1항은 사업자가 원칙적으로 복식부기로 장부를 기록·관리하도록 정한다.', kid: '용돈을 쓸 때 "얼마 나갔는지"와 "왜 나갔는지"를 양쪽에 같이 적는 거예요. 두 쪽 금액이 항상 똑같아서 틀리면 바로 알 수 있어요.' },

      { term: '간편장부대상자', cat: '장부·기장', law: '업종별 일정 규모 미만이어서 간편장부를 쓸 수 있는 사업자(소득세법 제160조 제3항, 시행령 제208조 제5항). 신규개시자도 포함된다.', kid: '아직 규모가 작아서 쉬운 장부(간편장부)를 써도 되는 사장님이에요. 그해에 새로 시작한 사장님도 여기에 들어가요.' },
      { term: '기장의무', cat: '장부·기장', law: '사업자가 소득을 계산할 수 있도록 장부를 갖춰 기록할 의무(소득세법 제160조). 규모에 따라 간편장부 또는 복식부기로 나뉜다.', kid: '"돈이 얼마 들어오고 나갔는지 장부에 적어두세요"라는 약속이에요. 크기에 따라 쉬운 장부/정식 장부로 나뉘어요.' },
      { term: '계정과목', cat: '장부·기장', law: '수입·비용·자산을 성격이 같은 것끼리 묶어 부르는 이름(예: 매출, 소모품비, 비품). 간편장부는 국세청 계정과목 분류표를 따른다.', kid: '돈이 왜 들어오고 나갔는지 비슷한 것끼리 묶은 이름표예요. "밥값", "교통비"처럼요.' },
      { term: '차변', cat: '장부·기장', law: '복식부기에서 자산의 증가나 비용의 발생을 적는 왼쪽 자리. 대변 합계와 항상 같아야 한다.', kid: '정식 장부의 왼쪽 칸이에요. 물건이 늘거나 돈을 쓴 걸 적어요.' },
      { term: '대변', cat: '장부·기장', law: '복식부기에서 부채·자본의 증가나 수입의 발생을 적는 오른쪽 자리. 차변 합계와 항상 같아야 한다.', kid: '정식 장부의 오른쪽 칸이에요. 돈을 벌거나 빚이 생긴 걸 적어요. 왼쪽과 금액이 똑같아야 해요.' },
      { term: '총수입금액', cat: '소득·세액', law: '사업에서 벌어들인 모든 수입의 합계(소득세법 제24조). 매출뿐 아니라 영업손실보상금, 일부 세액공제액 등도 산입될 수 있다.', kid: '장사해서 들어온 돈을 전부 더한 거예요. 물건 판 돈 말고도 받은 보상금 같은 것도 들어갈 수 있어요.' },
      { term: '필요경비', cat: '소득·세액', law: '수입을 얻기 위해 쓴 비용으로 소득에서 빼주는 금액(소득세법 제27조). 증빙으로 확인되는 매입·임차료·인건비 등이 해당한다.', kid: '돈을 벌려고 쓴 돈이에요. 재료값, 가게 월세, 직원 월급처럼요. 번 돈에서 이걸 빼줘요.' },
      { term: '소득금액', cat: '소득·세액', law: '총수입금액에서 필요경비를 뺀 금액(사업소득금액, 소득세법 제19조 제2항). 세금을 매기는 기초가 된다.', kid: '"번 돈 − 쓴 돈"이에요. 진짜로 남은 돈에 세금을 매겨요.' },
      { term: '종합소득금액', cat: '소득·세액', law: '이자·배당·사업·근로·연금·기타 소득금액을 합한 금액(소득세법 제14조 제2항).', kid: '여기저기서 번 소득을 다 합친 거예요. 장사 소득, 월급 소득 같은 걸 모두 더해요.' },
      { term: '소득공제', cat: '소득·세액', law: '과세표준을 계산할 때 종합소득금액에서 빼주는 금액(인적공제·연금보험료공제 등, 소득세법 제50조~제52조).', kid: '"가족이 있어요", "보험료 냈어요" 같은 사정을 봐주려고 세금 매기기 전에 빼주는 금액이에요.' },
      { term: '과세표준', cat: '소득·세액', law: '세율을 곱하기 직전의 금액. 종합소득금액에서 종합소득공제를 뺀 금액이다(소득세법 제14조 제2항).', kid: '세금 계산의 진짜 기준 금액이에요. 여기에 세율을 곱해서 세금을 구해요.' },
      { term: '산출세액', cat: '소득·세액', law: '과세표준에 세율을 곱해 계산한 세금(소득세법 제55조의 기본세율 적용).', kid: '기준 금액에 세율을 곱해서 나온 "일단 계산된 세금"이에요.' },
      { term: '세액공제', cat: '소득·세액', law: '산출된 세금에서 직접 빼주는 금액(자녀세액공제·표준세액공제 등).', kid: '계산된 세금에서 바로 깎아주는 금액이에요. 소득공제가 "빼고 나서 곱하기"라면, 세액공제는 "곱한 다음 빼기"예요.' },
      { term: '원천징수', cat: '소득·세액', law: '돈을 지급하는 사람이 세금을 미리 떼어 국가에 내는 제도. 인적용역 대가는 대개 3.3%를 원천징수한다.', kid: '돈을 줄 때 세금을 미리 조금 떼고 주는 거예요. 프리랜서가 100만 원 일하면 3.3만 원 떼고 96.7만 원을 받는 식이에요.' },
      { term: '추계신고', cat: '경비율·추계', law: '장부가 없어 실제 경비를 알 수 없을 때 경비율로 소득을 추정해 신고하는 방법(소득세법 제80조 제3항, 시행령 제143조). 장부 기장이 원칙이며 추계는 예외다.', kid: '장부가 없을 때 "보통 이 정도 썼겠지" 하고 어림해서 신고하는 거예요. 원래는 장부를 쓰는 게 원칙이에요.' },
      { term: '단순경비율', cat: '경비율·추계', law: '수입금액에 곱해 경비를 한 번에 추정하는 비율. 직전 수입금액이 업종별 기준(가 6,000만·나 3,600만·다 2,400만원) 미만인 사업자에게 적용된다(시행령 제143조 제4항).', kid: '작은 사업자에게 쓰는 쉬운 경비율이에요. "번 돈의 몇 %는 경비였을 거야"라고 한 번에 계산해요.' },
      { term: '기준경비율', cat: '경비율·추계', law: '주요경비(매입·임차·인건비)는 증빙으로 빼고, 나머지 경비만 비율로 추정하는 방식. 직전 수입이 기준 이상이면 적용된다. 복식부기의무자는 기준경비율의 1/2만 적용한다(시행령 제143조 제3항).', kid: '조금 큰 사업자에게 쓰는 경비율이에요. 큰 비용(재료·월세·월급)은 영수증으로 인정받고, 나머지만 비율로 계산해요.' },
      { term: '주요경비', cat: '경비율·추계', law: '기준경비율 추계에서 증빙으로 인정받는 핵심 경비. 매입비용, 사업용 고정자산 임차료, 종업원 인건비를 말한다(시행령 제143조 제3항 제1호).', kid: '기준경비율로 계산할 때 영수증만 있으면 인정받는 큰 비용이에요. 재료값·가게 월세·직원 월급이 여기 들어가요.' },
      { term: '부가가치세', cat: '부가가치세', law: '재화·용역이 거래될 때 붙는 세금으로, 최종 소비자가 부담한다. 사업자는 매출세액에서 매입세액을 빼서 납부한다(부가가치세법 제37조).', kid: '물건을 살 때 값에 붙는 세금이에요. 결국 마지막에 사는 사람이 내고, 가게는 그 세금을 대신 모아 나라에 내요.' },
      { term: '공급가액', cat: '부가가치세', law: '부가가치세를 빼기 전 상품·서비스 자체의 금액(부가가치세법 제29조). 여기에 10% 부가세가 더해져 소비자가 낸다.', kid: '세금을 빼고 순수하게 물건 값만 말하는 거예요. 여기에 10%를 더한 게 실제로 내는 돈이에요.' },
      { term: '면세', cat: '부가가치세', law: '법이 정한 재화·용역에 부가가치세를 매기지 않는 것(부가가치세법 제26조). 미가공식료품·의료보건·교육·주택임대 등 필수·공익 성격의 공급이 해당한다.', kid: '꼭 필요한 것에는 부가세를 안 붙여주는 거예요. 쌀·병원·학교·집 월세처럼요.' },
      { term: '수입부가세', cat: '부가가치세', law: '해외에서 물품을 수입할 때 세관이 부과하는 부가가치세(부가가치세법 제4조 제2호). 과세사업자는 수입세금계산서로 매입세액 공제가 가능하고, 면세사업자는 공제받지 못해 원가에 포함된다.', kid: '외국에서 물건을 들여올 때 세관에서 붙이는 10% 세금이에요. 사업에 쓰면 나중에 돌려받을 수도 있어요.' },
      { term: '대리납부', cat: '부가가치세', law: '국외사업자에게서 용역·권리를 공급받을 때, 받는 사람이 부가가치세를 대신 신고·납부하는 제도(부가가치세법 제52조). 과세사업에 쓰면 제외되나, 면세사업자·비사업자는 대상이다.', kid: '외국 회사한테 서비스(해외 앱·클라우드)를 샀는데 그쪽이 세금을 안 떼면, 면세사업자는 내가 대신 10% 세금을 신고·납부하는 거예요.' },
      { term: '정규증빙', cat: '증빙·경비', law: '경비를 인정받기 위해 갖춰야 하는 적격 증빙. 세금계산서, 계산서, 신용카드매출전표, 현금영수증을 말한다.', kid: '"이만큼 진짜 썼어요"를 증명하는 제대로 된 영수증이에요. 이게 있어야 비용으로 인정받아요.' },
      { term: '감가상각비', cat: '증빙·경비', law: '건물·기계·비품처럼 여러 해 쓰는 자산의 가치 감소분을 해마다 나누어 비용으로 처리하는 것. 내용연수·상각률은 세법으로 정해져 있다.', kid: '오래 쓰는 비싼 물건(컴퓨터·기계)은 산 해에 한 번에 비용 처리하지 않고, 쓰는 동안 조금씩 나눠서 비용으로 적는 거예요.' },
      { term: '가산세', cat: '증빙·경비', law: '신고·납부·기장 의무를 어겼을 때 본세에 더해 물리는 세금. 복식부기의무자가 추계신고하면 무신고가산세와 장부 기록·보관 불성실 가산세 중 큰 금액이 부과된다.', kid: '약속(신고·장부)을 안 지키면 세금에 얹어서 더 내는 벌금 같은 거예요. 그래서 장부를 잘 써두는 게 이득이에요.' },
      { term: '업종코드', cat: '증빙·경비', law: '사업의 종류를 나타내는 국세청 코드(6자리). 경비율·기장의무 판단의 기준이 된다.', kid: '무슨 장사를 하는지 번호로 나타낸 거예요. 이 번호에 따라 경비율이나 장부 종류가 정해져요.' },
      { term: '기준환율', cat: '증빙·경비', law: '외화 거래를 원화로 환산할 때 적용하는 환율(매매기준율). 해외 구매·경비는 거래일의 기준환율로 원화 환산해 장부에 기록한다.', kid: '달러·엔 같은 외국 돈을 우리 돈으로 바꿀 때 쓰는 그날의 환율이에요. 해외에서 쓴 돈은 이걸로 원화로 바꿔 적어요.' }
    ]);
    const TermService = Object.freeze({
      all() { return TAX_TERMS; },
      find(name) { const q = String(name || '').trim(); return TAX_TERMS.find(t => t.term === q) || null; },
      search(query, limit = 20) {
        const q = String(query || '').trim().toLowerCase();
        if (!q) return [];
        return TAX_TERMS.filter(t => `${t.term} ${t.cat} ${t.law} ${t.kid}`.toLowerCase().includes(q)).slice(0, limit);
      }
    });

    // 2. Small pure utilities
    // Deterministic 128-bit hash (cyrb128) — used to derive stable UUIDs so re-importing the same
    // row overwrites instead of duplicating (idempotent import; no zombie rows).
    function hash128(str) {
      let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
      for (let i = 0, k; i < str.length; i++) {
        k = str.charCodeAt(i);
        h1 = h2 ^ Math.imul(h1 ^ k, 597399067); h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
        h3 = h4 ^ Math.imul(h3 ^ k, 951274213); h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
      }
      h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067); h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
      h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213); h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
      h1 ^= (h2 ^ h3 ^ h4); h2 ^= h1; h3 ^= h1; h4 ^= h1;
      return [h1 >>> 0, h2 >>> 0, h3 >>> 0, h4 >>> 0];
    }

    const Utils = Object.freeze({
      uuid: () => crypto.randomUUID(),
      deterministicId: (str) => {
        const p = hash128(String(str)).map(n => n.toString(16).padStart(8, '0')).join('');
        return `${p.slice(0, 8)}-${p.slice(8, 12)}-5${p.slice(13, 16)}-${((parseInt(p[16], 16) & 0x3) | 0x8).toString(16)}${p.slice(17, 20)}-${p.slice(20, 32)}`;
      },
      now: () => new Date().toISOString(),
      today: () => new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul' }).format(new Date()),
      won: value => `${Math.round(Number(value || 0)).toLocaleString('ko-KR')}원`,
      number: value => Number(String(value ?? '').replace(/[^0-9.-]/g, '')) || 0,
      escape: value => String(value ?? '').replace(/[&<>'"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[char])),
      normalizeEmail: value => String(value || '').trim().toLowerCase(),
      isSecretKey: value => /(?:service[_-]?role|sb_secret_|cloudinary:\/\/[^:]+:|oauth.{0,8}secret)/i.test(String(value || '')),
      latestByUpdatedAt(local, remote) {
        if (!local) return remote;
        if (!remote) return local;
        return Date.parse(local.updated_at || local.created_at || 0) > Date.parse(remote.updated_at || remote.created_at || 0) ? local : remote;
      },
      debounce(fn, wait = 180) {
        let timer;
        return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), wait); };
      }
    });

    // 3. Accounting domain layer: no DOM, storage, or remote calls
    const AccountingDomain = Object.freeze({
      calculateAmounts(totalInput, vatType) {
        const total = Math.max(0, Math.round(Utils.number(totalInput)));
        if (vatType !== 'taxable') return { supplyAmount: total, vatAmount: 0, totalAmount: total };
        const supplyAmount = Math.round(total / 1.1);
        return { supplyAmount, vatAmount: total - supplyAmount, totalAmount: total };
      },

      accountChoices(accounts, transactionType) {
        return accounts.filter(account => {
          if (account.deleted_at) return false;
          if (transactionType === 'income') return account.account_type === 'revenue';
          if (transactionType === 'expense') return account.account_type === 'expense';
          return account.local_key === 'equipment' || account.account_code === '203';
        });
      },

      buildPosting(transaction, accountsByKey) {
        const lines = [];
        const total = Number(transaction.total_amount);
        const supply = Number(transaction.supply_amount);
        const vat = Number(transaction.vat_amount);
        const settled = transaction.payment_status === 'paid';
        const selectedAccount = transaction.account_id;

        const addLine = (accountId, debit, credit, memo, sortOrder) => lines.push({
          id: Utils.uuid(),
          business_id: transaction.business_id,
          journal_entry_id: null,
          account_id: accountId,
          debit_amount: debit,
          credit_amount: credit,
          line_memo: memo,
          sort_order: sortOrder,
          created_at: transaction.created_at,
          updated_at: transaction.updated_at,
          deleted_at: null
        });

        if (transaction.transaction_type === 'income') {
          addLine(settled ? accountsByKey.bank.id : accountsByKey.receivable.id, total, 0, settled ? '입금 또는 즉시 수입' : '아직 받지 않은 수입', 1);
          addLine(selectedAccount, 0, supply, transaction.description, 2);
          if (vat > 0) addLine(accountsByKey.vat_payable.id, 0, vat, '매출 부가세 후보', 3);
        } else if (transaction.transaction_type === 'expense') {
          addLine(selectedAccount, supply, 0, transaction.description, 1);
          if (vat > 0) addLine(accountsByKey.vat_receivable.id, vat, 0, '매입 부가세 공제 후보', 2);
          addLine(settled ? accountsByKey.bank.id : accountsByKey.payable.id, 0, total, settled ? '지급 완료' : '아직 지급하지 않은 금액', 3);
        } else if (transaction.transaction_type === 'asset_purchase') {
          addLine(selectedAccount, supply, 0, transaction.description, 1);
          if (vat > 0) addLine(accountsByKey.vat_receivable.id, vat, 0, '자산 매입 부가세 공제 후보', 2);
          addLine(settled ? accountsByKey.bank.id : accountsByKey.payable.id, 0, total, settled ? '자산 대금 지급' : '자산 미지급금', 3);
        } else {
          throw new Error('POSTING_TYPE_UNSUPPORTED');
        }
        return lines;
      },

      // Korean business registration number checksum (10 digits). Deterministic — no external lookup.
      isValidBusinessNumber(value) {
        const d = String(value || '').replace(/\D/g, '');
        if (d.length !== 10) return false;
        const weights = [1, 3, 7, 1, 3, 7, 1, 3, 5];
        let sum = 0;
        for (let i = 0; i < 9; i++) sum += Number(d[i]) * weights[i];
        sum += Math.floor((Number(d[8]) * 5) / 10);
        const check = (10 - (sum % 10)) % 10;
        return check === Number(d[9]);
      },

      validateTransaction(input) {
        const errors = {};
        if (!/^20\d{2}-\d{2}-\d{2}$/.test(input.transactionDate || '')) errors.transactionDate = '거래일을 확인해 주세요.';
        if (!['income', 'expense', 'asset_purchase'].includes(input.transactionType)) errors.transactionType = '거래 유형을 선택해 주세요.';
        if (!String(input.description || '').trim()) errors.description = '거래 내용을 입력해 주세요.';
        if (!input.accountId) errors.accountId = '계정과목을 선택해 주세요.';
        if (Utils.number(input.totalAmount) <= 0) errors.totalAmount = '0원보다 큰 금액을 입력해 주세요.';
        return errors;
      },

      validateJournal(lines) {
        const debit = lines.reduce((sum, line) => sum + Number(line.debit_amount || 0), 0);
        const credit = lines.reduce((sum, line) => sum + Number(line.credit_amount || 0), 0);
        const invalidLine = lines.some(line => !line.account_id || (Number(line.debit_amount) > 0) === (Number(line.credit_amount) > 0));
        return { status: !invalidLine && debit === credit && debit > 0 ? 'pass' : 'error', debit, credit, difference: debit - credit, invalidLine };
      },

      summarize(transactions) {
        return transactions.filter(row => !row.deleted_at).reduce((summary, row) => {
          summary.count += 1;
          if (row.transaction_type === 'income') summary.income += Number(row.total_amount || 0);
          if (row.transaction_type === 'expense') summary.expense += Number(row.total_amount || 0);
          if (row.transaction_type === 'asset_purchase') summary.assets += Number(row.total_amount || 0);
          if (row.evidence_status !== 'attached') summary.missingEvidence += 1;
          if (row.review_status !== 'normal') summary.review += 1;
          return summary;
        }, { count: 0, income: 0, expense: 0, assets: 0, missingEvidence: 0, review: 0 });
      }
    });

    // 4. IndexedDB persistence adapter
    class IndexedDbAdapter {
      constructor() { this.db = null; this.name = 'accounting-ledger-v1'; this.version = 2; }
      async open() {
        if (this.db) return this.db;
        this.db = await new Promise((resolve, reject) => {
          const request = indexedDB.open(this.name, this.version);
          request.onupgradeneeded = () => {
            const db = request.result;
            for (const storeName of LOCAL_STORES) {
              if (!db.objectStoreNames.contains(storeName)) {
                const store = db.createObjectStore(storeName, { keyPath: 'id' });
                if (storeName !== 'sync_queue' && storeName !== 'tombstones') store.createIndex('updated_at', 'updated_at');
                if (['source_transactions','journal_entries','journal_entry_lines','accounts','counterparties','evidence_files'].includes(storeName)) store.createIndex('business_id', 'business_id');
                if (storeName === 'evidence_files') store.createIndex('source_transaction_id', 'source_transaction_id');
              }
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error || new Error('IDB_OPEN_FAILED'));
        });
        return this.db;
      }
      async transaction(storeNames, mode, executor) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeNames, mode);
          let result;
          tx.oncomplete = () => resolve(result);
          tx.onerror = () => reject(tx.error || new Error('IDB_TRANSACTION_FAILED'));
          tx.onabort = () => reject(tx.error || new Error('IDB_TRANSACTION_ABORTED'));
          result = executor(tx);
        });
      }
      async getAll(storeName) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readonly').objectStore(storeName).getAll();
          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);
        });
      }
      async get(storeName, id) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readonly').objectStore(storeName).get(id);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
      }
      async put(storeName, value) {
        return this.transaction([storeName], 'readwrite', tx => tx.objectStore(storeName).put(value));
      }
      async putMany(recordsByStore) {
        const names = Object.keys(recordsByStore);
        if (!names.length) return;
        return this.transaction(names, 'readwrite', tx => {
          for (const [storeName, rows] of Object.entries(recordsByStore)) {
            const store = tx.objectStore(storeName);
            for (const row of rows) store.put(row);
          }
        });
      }
      async replaceStore(storeName, rows) {
        return this.transaction([storeName], 'readwrite', tx => {
          const store = tx.objectStore(storeName);
          store.clear();
          for (const row of rows) store.put(row);
        });
      }
      async clearAll() {
        return this.transaction([...LOCAL_STORES], 'readwrite', tx => {
          for (const store of LOCAL_STORES) tx.objectStore(store).clear();
        });
      }
      async snapshot() {
        const tables = {};
        for (const store of LOCAL_STORES) tables[store] = await this.getAll(store);
        return tables;
      }
    }

    // Cloudinary evidence storage via unsigned upload preset only. No API secret is ever used or stored.
    const CloudinaryAdapter = Object.freeze({
      isConfigured() { return Boolean(state.config.cloudinaryCloud && state.config.cloudinaryPreset); },
      async upload(file) {
        if (!this.isConfigured()) throw new Error('CLOUDINARY_NOT_CONFIGURED');
        if (Utils.isSecretKey(state.config.cloudinaryPreset) || Utils.isSecretKey(state.config.cloudinaryCloud)) throw new Error('SECRET_KEY_NOT_ALLOWED');
        const resourceType = file.type === 'application/pdf' ? 'auto' : 'image';
        const form = new FormData();
        form.append('file', file);
        form.append('upload_preset', state.config.cloudinaryPreset);
        const response = await fetch(`https://api.cloudinary.com/v1_1/${encodeURIComponent(state.config.cloudinaryCloud)}/${resourceType}/upload`, { method: 'POST', body: form });
        if (!response.ok) {
          const detail = await response.text();
          throw new Error(`CLOUDINARY_${response.status}:${detail.slice(0, 200)}`);
        }
        return response.json();
      },
      thumbnailUrl(secureUrl, resourceType) {
        if (resourceType !== 'image' || typeof secureUrl !== 'string' || !secureUrl.includes('/upload/')) return secureUrl || null;
        return secureUrl.replace('/upload/', '/upload/c_thumb,w_240,h_240,g_auto,q_auto,f_auto/');
      }
    });

    // 5. Remote adapter: Supabase Auth plus REST requests that always check response.ok
    class SupabaseAdapter {
      constructor() { this.client = null; this.module = null; }
      isConfigured() { return Boolean(state.config.supabaseUrl && state.config.supabaseKey); }
      async ensureClient() {
        if (this.client) return this.client;

        if (!Array.isArray(anonymousRows)) throw new Error('PUBLIC_CONNECTION_INVALID_RESPONSE');
        if (anonymousRows.length > 0) throw new Error('ANONYMOUS_DATA_EXPOSED');

            await this.raw(`businesses?id=eq.${probeId}`, { method: 'DELETE', prefer: 'return=minimal' });
            steps.cleanup = 'pass';
          } catch (error) {
            steps.cleanup = 'fail';
            detail = detail || String(error?.message || error);

    // 8. UI event layer delegates to services and domain functions
    function bindViewEvents() {
      document.querySelectorAll('[data-route]').forEach(button => button.addEventListener('click', () => routeTo(button.dataset.route)));
      document.querySelectorAll('[data-guide-topic]').forEach(button => button.addEventListener('click', () => {
        state.guideTopic = state.guideTopic === button.dataset.guideTopic ? null : button.dataset.guideTopic;
        render();
      }));
      document.querySelectorAll('[data-open-guide-topic]').forEach(button => button.addEventListener('click', () => {
        state.guideTopic = button.dataset.openGuideTopic;
        routeTo('guide');
      }));
      const importFile = el('importFile');
      if (importFile) {
        importFile.addEventListener('change', async () => {
          const file = importFile.files?.[0];
          if (!file) return;
          const status = el('importStatus'), preview = el('importPreview');
          status.innerHTML = `<div class="notice">${icon('loader')}<div>${Utils.escape(file.name)} 읽는 중…</div></div>`;
          preview.innerHTML = '';
          try {
            const res = await SimpleBookImport.parse(await file.arrayBuffer());
            if (!res.rows.length) { state.importReview = null; status.innerHTML = `<div class="notice">${icon('info')}<div>「장부」 시트에서 읽을 거래 행을 찾지 못했습니다(4행부터 확인).</div></div>`; return; }
            state.importReview = { rows: res.rows, fileName: file.name };
            status.innerHTML = importSummaryHtml(res);
            preview.innerHTML = importPreviewHtml(res);
            bindImportOpen();
            if (state.business) renderImportReview();
          } catch (error) {
            state.importReview = null;
            status.innerHTML = `<div class="notice danger">${icon('shield-alert')}<div>${Utils.escape(error.message || '파일을 읽지 못했습니다.')}</div></div>`;
          }
        });
      }
      function bindImportOpen() {
        const btn = el('importStatus')?.querySelector('[data-open-review]');
        if (btn && !btn.disabled) btn.addEventListener('click', () => { if (state.importReview) renderImportReview(); });
      }
      const termSearch = el('termSearch');
      if (termSearch) {
        const box = el('termSearchResults');
        termSearch.addEventListener('input', () => {
          const q = termSearch.value.trim();
          if (!q) { box.innerHTML = ''; return; }
          const matches = TermService.search(q, 20);
          box.innerHTML = matches.length ? matches.map(termCardHtml).join('') : `<div class="notice info">${icon('search')}<div>일치하는 용어가 없습니다. 다른 낱말로 검색해 보세요.</div></div>`;
        });
      }
      document.querySelectorAll('[data-copy-value]').forEach(button => button.addEventListener('click', async () => {
        const value = button.dataset.copyValue || '';
        try {
          if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(value);
          else {
            const helper = document.createElement('textarea');
            helper.value = value; helper.setAttribute('readonly', ''); helper.style.position = 'fixed'; helper.style.opacity = '0';
            document.body.appendChild(helper); helper.select(); document.execCommand('copy'); helper.remove();
          }
          toast('복사했습니다.', 'success');
        } catch { toast('복사하지 못했습니다. 값을 직접 선택해 주세요.', 'error'); }
      }));
      document.querySelectorAll('[data-term]').forEach(button => button.addEventListener('click', event => showTerm(event.currentTarget.dataset.term, event.currentTarget)));
      document.querySelectorAll('[data-account-id]').forEach(button => button.addEventListener('click', event => {
        const account = state.accounts.find(row => row.id === event.currentTarget.dataset.accountId);
        showTooltip(account?.local_explanation || '국세청 용어와 신고 항목을 기준으로 사용하는 계정과목입니다.', event.currentTarget);
      }));

      document.querySelectorAll('[data-transaction-type]').forEach(button => button.addEventListener('click', () => { state.formType = button.dataset.transactionType; render(); }));
      const transactionForm = el('transactionForm');
      if (transactionForm) {
        const preview = () => {
          const amounts = AccountingDomain.calculateAmounts(el('totalAmount').value, el('vatType').value);
          el('supplyPreview').textContent = Utils.won(amounts.supplyAmount);
          el('vatPreview').textContent = Utils.won(amounts.vatAmount);
          el('totalPreview').textContent = Utils.won(amounts.totalAmount);
        };
        el('totalAmount').addEventListener('input', preview);
        el('vatType').addEventListener('change', preview);
        transactionForm.addEventListener('reset', () => setTimeout(preview));
        transactionForm.addEventListener('submit', async event => {
          event.preventDefault();
          transactionForm.querySelectorAll('[data-error]').forEach(node => node.textContent = '');
          try {
            const result = await AppService.saveTransaction({
              transactionDate: el('transactionDate').value, transactionType: state.formType,
              description: el('description').value, counterpartyName: el('counterpartyName').value,
              accountId: el('accountId').value, totalAmount: el('totalAmount').value,
              vatType: el('vatType').value, paymentStatus: el('paymentStatus').value, hasEvidence: el('hasEvidence').checked
            });
            if (!result.ok) {
              for (const [name, message] of Object.entries(result.errors)) transactionForm.querySelector(`[data-error="${name}"]`)?.replaceChildren(message);
              toast('입력값을 확인해 주세요.', 'error'); return;
            }
            toast(`거래와 균형 전표를 저장했습니다. 차변·대변 ${Utils.won(result.validation.debit)}`, 'success');
            routeTo('ledger');
          } catch (error) { diagnostic(error); }
        });
      }

      if (el('estRevenue')) {
        const code = state.business?.main_industry_code || '';
        const estRecalc = () => {
          const priorRaw = el('estPriorRevenue').value.trim();
          const duty = code && priorRaw ? BookkeepingDuty.assess(code, Utils.number(priorRaw), false) : null;
          const method = code && priorRaw ? ExpenseRateMethod.method(code, Utils.number(priorRaw), false) : null;
          el('estDutyAuto').textContent = duty?.obligation ? `기장의무 판정: ${duty.obligation}` : '';
          el('estMethodAuto').textContent = method?.method ? `경비율 적용: ${method.method}` : '';
          const mainCosts = Utils.number(el('estPurchase').value) + Utils.number(el('estRent').value) + Utils.number(el('estLabor').value);
          const res = EstimatedIncome.byStandardRate({
            revenue: Utils.number(el('estRevenue').value), mainCosts,
            stdRate: Utils.number(el('estStdRate').value), simpleRate: Utils.number(el('estSimpleRate').value),
            isDoubleEntry: el('estDuty').value === 'double'
          });
          el('estMainCosts').textContent = Utils.won(mainCosts);
          el('estPrimary').textContent = Utils.won(res.primary);
          el('estComparison').textContent = Utils.won(res.comparison);
          el('estIncome').textContent = Utils.won(res.income);
          el('estNecessary').textContent = Utils.won(res.necessaryExpense);
        };
        el('estPriorRevenue').addEventListener('input', () => {
          const duty = code && el('estPriorRevenue').value.trim() ? BookkeepingDuty.assess(code, Utils.number(el('estPriorRevenue').value), false) : null;
          if (duty?.obligation) el('estDuty').value = duty.obligation === '복식부기의무자' ? 'double' : 'simple';
          estRecalc();
        });
        ['estRevenue', 'estPurchase', 'estRent', 'estLabor', 'estStdRate', 'estSimpleRate'].forEach(id => el(id).addEventListener('input', estRecalc));
        el('estDuty').addEventListener('change', estRecalc);
        estRecalc();
      }

      const ledgerQuery = el('ledgerQuery');
      if (ledgerQuery) ledgerQuery.addEventListener('input', Utils.debounce(() => { state.filters.query = ledgerQuery.value; render(); }));
      el('ledgerType')?.addEventListener('change', event => { state.filters.type = event.target.value; render(); });
      el('ledgerYear')?.addEventListener('change', event => { state.filters.year = event.target.value; render(); });

      const industrySearch = el('industrySearch');
      if (industrySearch) {
        const results = el('industryResults');
        const runSearch = () => {
          const query = industrySearch.value;
          if (!query.trim()) { results.hidden = true; results.innerHTML = ''; return; }
          const matches = IndustryCodes.search(query, 30);
          results.innerHTML = matches.length
            ? matches.map(row => `<button type="button" class="industry-item" data-code="${row.code}" data-name="${Utils.escape(row.name)}" data-major="${Utils.escape(row.major)}"><span class="code">${row.code}</span> ${Utils.escape(row.name)}<br><span class="major">${Utils.escape(row.major)}</span></button>`).join('')
            : `<div class="industry-item"><span class="major">일치하는 업종이 없습니다. 코드를 직접 입력하거나 홈택스에서 조회하세요.</span></div>`;
          results.hidden = false;
          results.querySelectorAll('[data-code]').forEach(item => item.addEventListener('click', () => {
            el('industryCode').value = item.dataset.code;
            el('industryName').value = item.dataset.name;
            el('industryPicked').innerHTML = industryPickedHtml(item.dataset.code, item.dataset.name);
            const broad = industryToBroad(item.dataset.code, item.dataset.major);
            const broadSelect = el('broadIndustry');
            if (broadSelect && broad) broadSelect.value = broad;
            results.hidden = true; industrySearch.value = '';
          }));
        };
        industrySearch.addEventListener('input', Utils.debounce(runSearch, 140));
      }
      el('businessForm')?.addEventListener('submit', async event => {
        event.preventDefault();
        if (!el('businessName').value.trim()) return toast('상호 또는 장부 이름을 입력해 주세요.', 'error');
        const registration = el('registrationNumber').value.replace(/\D/g,'');
        if (registration && registration.length !== 10) return toast('사업자등록번호는 숫자 10자리로 입력해 주세요. (인적용역 등 없으면 비워두세요)', 'error');
        if (registration && !AccountingDomain.isValidBusinessNumber(registration)) return toast('사업자등록번호 검증에 실패했습니다. 숫자를 다시 확인해 주세요.', 'error');
        try {
          await AppService.setupBusiness({ businessType:el('businessType').value, businessName:el('businessName').value, representativeName:el('representativeName').value, registrationNumber:registration, siteName:el('siteName').value, openedOn:el('openedOn').value, broadIndustry:el('broadIndustry').value, industryCode:el('industryCode').value, industryName:el('industryName').value, vatPayerType:el('vatPayerType').value, ledgerStartYear:el('ledgerStartYear').value, address:el('address').value });
          state.config.ledgerStartYear = el('ledgerStartYear').value;
          ConfigAdapter.save(state.config);
          toast('사업자 정보를 이 기기에 저장했습니다.', 'success'); render();
        } catch (error) { diagnostic(error); }
      });

      el('cloudinaryForm')?.addEventListener('submit', async event => {
        event.preventDefault();
        try {
          const cloud = el('cloudinaryCloud').value.trim();
          const preset = el('cloudinaryPreset').value.trim();
          if (Utils.isSecretKey(cloud) || Utils.isSecretKey(preset)) throw new Error('SECRET_KEY_NOT_ALLOWED');
          state.config.cloudinaryCloud = cloud;
          state.config.cloudinaryPreset = preset;
          ConfigAdapter.save(state.config);
          toast('Cloudinary 설정을 저장했습니다.', 'success'); render();
        } catch (error) { diagnostic(error); }
      });
      document.querySelectorAll('[data-attach-tx]').forEach(button => button.addEventListener('click', () => {
        state.pendingEvidenceTx = button.dataset.attachTx;
        el('evidenceFileInput')?.click();
      }));
      document.querySelectorAll('[data-remove-evidence]').forEach(button => button.addEventListener('click', async () => {
        if (!confirm('이 증빙 연결을 제거합니다. 장부에서 링크가 사라지고 다른 기기에도 반영됩니다. (Cloudinary 원본 파일 자체는 남습니다.) 계속하시겠습니까?')) return;
        try { await AppService.removeEvidence(button.dataset.removeEvidence); toast('증빙 연결을 제거했습니다.', 'success'); render(); } catch (error) { diagnostic(error); }
      }));
      el('evidenceFileInput')?.addEventListener('change', async event => {
        const file = event.target.files?.[0];
        const txId = state.pendingEvidenceTx;
        event.target.value = '';
        if (!file || !txId) return;
        if (file.size > 15 * 1024 * 1024) return toast('15MB 이하의 파일만 첨부할 수 있습니다.', 'error');
        try {
          toast('증빙을 업로드하는 중입니다...');
          const result = await CloudinaryAdapter.upload(file);
          await AppService.attachEvidence(txId, result, file);
          state.pendingEvidenceTx = null;
          toast('증빙을 첨부했습니다. 로그인 시 클라우드에 동기화됩니다.', 'success'); render();
        } catch (error) { diagnostic(error); }
      });
      el('supabaseForm')?.addEventListener('submit', async event => {
        event.preventDefault();
        try {
          const key = el('supabaseKey').value.trim();
          if (Utils.isSecretKey(key)) throw new Error('SECRET_KEY_NOT_ALLOWED');
          state.config.supabaseUrl = el('supabaseUrl').value.trim().replace(/\/$/,'');
          state.config.supabaseKey = key || APP_INFO.supabasePublishableKey;
          ConfigAdapter.save(state.config); remote.resetClient();
          toast('Supabase 공개 연결 설정을 저장했습니다.', 'success');
          await SyncService.runConnectionDiagnostics();
        } catch (error) { diagnostic(error); }
      });
      el('connectionDiagnosticButton')?.addEventListener('click', async () => {
        const result = await SyncService.runConnectionDiagnostics();
        if (result.api === 'ready' && result.anonymousIsolation === 'pass') toast('Data API 연결과 익명 RLS 격리를 확인했습니다.', 'success');
        else toast('Supabase 연결 진단에서 확인이 필요한 항목이 있습니다.', 'error');
      });
      el('googleLoginButton')?.addEventListener('click', async () => { try { await remote.signIn(); } catch (error) { diagnostic(error); } });
      el('logoutButton')?.addEventListener('click', async () => { try { await remote.signOut(); state.session=null; state.allowedUser=null; state.allowedUsers=[]; toast('로그아웃했습니다. 로컬 데이터는 유지됩니다.','success'); render(); } catch(error){ diagnostic(error); } });
      el('allowlistForm')?.addEventListener('submit', async event => {
        event.preventDefault();
        try {
          await SyncService.addAllowedUser({ email: el('allowEmail').value, role: el('allowRole').value, label: el('allowLabel').value });
          toast('허용 사용자를 추가했습니다.', 'success'); render();
        } catch (error) { diagnostic(error); }
      });
      document.querySelectorAll('[data-allowlist-revoke]').forEach(button => button.addEventListener('click', async () => {
        if (!confirm('이 계정의 접근을 차단합니다. 로그인해도 회계자료를 볼 수 없게 됩니다. 계속하시겠습니까?')) return;
        try { await SyncService.setAllowedUserStatus(button.dataset.allowlistRevoke, 'blocked'); toast('접근을 차단했습니다.', 'success'); render(); } catch (error) { diagnostic(error); }
      }));
      document.querySelectorAll('[data-allowlist-activate]').forEach(button => button.addEventListener('click', async () => {
        try { await SyncService.setAllowedUserStatus(button.dataset.allowlistActivate, 'active'); toast('접근을 다시 허용했습니다.', 'success'); render(); } catch (error) { diagnostic(error); }
      }));
      el('syncNowButton')?.addEventListener('click', async () => { try { await SyncService.connectAndSync(); toast('클라우드 동기화를 완료했습니다.','success'); render(); } catch(error){ diagnostic(error); } });
      el('businessRoundtripButton')?.addEventListener('click', async () => {
        if (!confirm('클라우드 businesses 테이블에 임시 검증용 행을 만들어 생성·조회·수정·소프트삭제·정리를 확인한 뒤 자동으로 삭제합니다. 계속하시겠습니까?')) return;
        state.businessRoundtrip = { status: 'checking', steps: {}, checkedAt: null, detail: null };
        render();
        try {
          const result = await SyncService.runBusinessRoundtrip();
          if (result.status === 'pass') toast('사업자 CRUD와 RLS 왕복 검증을 통과했습니다.', 'success');
          else toast('사업자 왕복 검증에서 확인이 필요한 항목이 있습니다. 단계별 결과를 확인해 주세요.', 'error');
        } catch (error) { diagnostic(error); }
        render();
      });
      el('dataReloadButton')?.addEventListener('click', async () => { try { await AppService.reload(); toast('저장 상태를 새로고침했습니다.','success'); render(); } catch(error){ diagnostic(error); } });
      el('dataSyncButton')?.addEventListener('click', async () => { try { await SyncService.connectAndSync(); toast('클라우드 동기화를 완료했습니다.','success'); render(); } catch(error){ diagnostic(error); } });
      el('dataCanonicalButton')?.addEventListener('click', async () => {
        if (!confirm('이 기기의 데이터를 클라우드 최종본으로 지정합니다. 다른 기기는 다음 동기화에서 로컬 전용 변경을 버리고 이 기기 기준으로 맞춰집니다. 계속하시겠습니까?')) return;
        try { const v = await SyncService.designateCanonical(); toast(`이 기기를 최종본(canonical v${v})으로 지정했습니다.`,'success'); render(); } catch(error){ diagnostic(error); }
      });
      el('dataBackupButton')?.addEventListener('click', async () => {
        if (!confirm('백업 파일에는 거래처와 세무자료가 포함될 수 있습니다. 안전한 위치에 보관하시겠습니까?')) return;
        try {
          const backup = await AppService.exportBackup();
          const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `accounting-ledger-backup-${Utils.today()}-v${APP_INFO.version}.json`; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
          state.config.lastBackupAt = Utils.now(); ConfigAdapter.save(state.config); toast('JSON 백업 파일을 만들었습니다.','success'); render();
        } catch(error){ diagnostic(error); }
      });
      el('dataRestoreButton')?.addEventListener('click', () => el('dataRestoreFile').click());
      el('dataRestoreFile')?.addEventListener('change', async event => {
        const file = event.target.files?.[0]; if (!file) return;
        if (!confirm('현재 로컬 데이터를 백업 파일 내용으로 교체합니다. 계속하시겠습니까?')) return;
        try { await AppService.restoreBackup(JSON.parse(await file.text())); toast('백업을 복원했습니다.','success'); render(); } catch(error){ diagnostic(error); }
      });
      el('dataPartialDeleteButton')?.addEventListener('click', async () => {
        const select = el('dataDeleteSelect'); const id = select?.value;
        if (!id) return toast('삭제할 거래를 선택해 주세요.','error');
        const label = select.options[select.selectedIndex]?.text || '선택한 거래';
        if (!confirm(`다음 거래를 삭제합니다.\n${label}\n\n관련 전표도 함께 소프트 삭제되고 감사로그에 남습니다. 계속하시겠습니까?`)) return;
        try { const result = await AppService.deleteTransaction(id); toast(`거래를 삭제했습니다. 전표 ${result.deletedJournals}건·라인 ${result.deletedLines}건 반영.`,'success'); render(); } catch(error){ diagnostic(error); }
      });
      el('dataWipeButton')?.addEventListener('click', async () => {
        if (!confirm('이 기기의 모든 장부 데이터를 삭제합니다. Supabase 연결 설정은 유지됩니다. 계속하시겠습니까?')) return;
        if (!confirm('되돌릴 수 없습니다. 먼저 JSON 백업을 만들었는지 확인하세요. 정말 전체 삭제할까요?')) return;
        try { await AppService.clearLocalData(); toast('이 기기의 로컬 데이터를 모두 삭제했습니다.','success'); render(); } catch(error){ diagnostic(error); }
      });
    }

    function showTerm(name, anchor) { showTooltip(TermService.find(name)?.kid || TERM_HELP[name] || '쉬운 설명을 준비 중인 회계용어입니다.', anchor); }
    function showTooltip(text, anchor) {
      const tooltip = el('termTooltip'); tooltip.textContent = text; tooltip.hidden = false;
      const rect = anchor.getBoundingClientRect();
      const left = Math.min(window.innerWidth - tooltip.offsetWidth - 14, Math.max(14, rect.left));
      const top = rect.bottom + 8 + tooltip.offsetHeight > window.innerHeight ? rect.top - tooltip.offsetHeight - 8 : rect.bottom + 8;
      tooltip.style.left = `${left}px`; tooltip.style.top = `${Math.max(8,top)}px`;
    }
    function toast(message, type = '') {
      const node = document.createElement('div'); node.className = `toast ${type}`; node.innerHTML = `${icon(type==='error'?'circle-alert':type==='success'?'circle-check':'info')}<div>${Utils.escape(message)}</div>`;
      el('toastRegion').appendChild(node); refreshIcons(); setTimeout(()=>node.remove(),4200);
    }
    function diagnostic(error) { console.error('[AccountingLedger]', error); state.syncError = String(error?.message || error); toast(errorMessage(error),'error'); renderShellStatus(); }

    // 9. Shell lifecycle
    document.addEventListener('click', event => {
      if (!event.target.closest('.term-button') && !event.target.closest('#termTooltip')) el('termTooltip').hidden = true;
      if (window.innerWidth <= 780 && event.target.closest('[data-route]')) el('sidebar').classList.remove('open');
    });
    el('mobileMenuButton').addEventListener('click', () => el('sidebar').classList.toggle('open'));
    el('quickAddButton').addEventListener('click', () => routeTo('transactions'));
    window.addEventListener('hashchange', () => { state.route = (location.hash || '#dashboard').slice(1); render(); });
    window.addEventListener('online', () => { state.online=true; renderShellStatus(); toast('인터넷 연결이 복구되었습니다. 동기화할 수 있습니다.','success'); });
    window.addEventListener('offline', () => { state.online=false; renderShellStatus(); toast('오프라인입니다. 거래는 이 기기에 계속 저장됩니다.'); });

    async function init() {
      try {
        await storage.open();
        AppService.deviceId();
        await AppService.reload();
        state.ready = true;
        render();
        await SyncService.runConnectionDiagnostics();
        await SyncService.initializeAuth();
        render();
        if (!state.business) setTimeout(() => toast('사업자 정보를 설정하면 거래 입력을 시작할 수 있습니다.'), 500);
      } catch (error) {
        state.ready = false;
        el('app').innerHTML = `<div class="notice danger">${icon('circle-alert')}<div><strong>앱 저장소를 열지 못했습니다.</strong><br>${Utils.escape(errorMessage(error))}</div></div>`;
        diagnostic(error); refreshIcons();
      }
    }

    window.__ACCOUNTING_APP_TEST__ = Object.freeze({ APP_INFO, UPDATE_HISTORY, GuideService, AccountingDomain, Utils, IndustryCodes, ExpenseRates, BookkeepingDuty, ExpenseRateMethod, VatExemption, EstimatedIncome, SimpleBookAccounts, SimpleBookImport, TermService, DOMAIN_GUARDIANS, ARCH_GUARDIANS, GOVERNANCE_AGENTS });
    init();
  })();
  </script>
</body>
</html>

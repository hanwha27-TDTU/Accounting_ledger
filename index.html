<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#163b33">
  <meta name="description" content="대한민국 개인사업자를 위한 간편장부·복식부기 통합 회계장부">
  <title>바른장부</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #66736f;
      --line: #d9e0dd;
      --line-strong: #bdc9c5;
      --surface: #ffffff;
      --surface-soft: #f4f7f5;
      --surface-warm: #fff9ee;
      --brand: #17624f;
      --brand-strong: #104b3d;
      --brand-soft: #e6f3ee;
      --accent: #b65b27;
      --accent-soft: #fff0e5;
      --danger: #b33b3b;
      --danger-soft: #fff0ef;
      --warning: #8a5a12;
      --warning-soft: #fff4d8;
      --success: #1d6b45;
      --shadow: 0 10px 28px rgba(25, 47, 41, .08);
      --sidebar: 232px;
      --header: 68px;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { background: #edf2ef; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      background: var(--surface-soft);
      font-size: 14px;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .52; }
    a { color: inherit; }
    [hidden] { display: none !important; }
    :focus-visible { outline: 3px solid rgba(23, 98, 79, .24); outline-offset: 2px; }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar) minmax(0, 1fr); }
    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 40;
      width: var(--sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid #24483f;
      background: #163b33;
      color: #f7fbf9;
    }
    .brand {
      height: var(--header);
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: #f4c45f;
      color: #163b33;
      font-weight: 900;
      font-size: 16px;
    }
    .brand-name { font-size: 17px; font-weight: 800; }
    .brand-version { margin-top: 2px; color: #b9d1ca; font-size: 11px; }
    .nav { padding: 14px 10px; overflow-y: auto; }
    .nav-group-label { padding: 13px 10px 7px; color: #98b9af; font-size: 11px; font-weight: 700; }
    .nav-button {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 11px;
      border: 0;
      border-radius: 6px;
      color: #dce9e5;
      background: transparent;
      text-align: left;
    }
    .nav-button:hover { background: rgba(255,255,255,.08); }
    .nav-button.active { background: #f7fbf9; color: #163b33; font-weight: 800; }
    .nav-button svg { width: 18px; height: 18px; flex: 0 0 auto; }
    .sidebar-footer { margin-top: auto; padding: 14px; border-top: 1px solid rgba(255,255,255,.12); }
    .sidebar-status { display: flex; align-items: center; gap: 8px; color: #c8dbd5; font-size: 12px; }

    .main-column { grid-column: 2; min-width: 0; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
    }
    .topbar-left, .topbar-actions, .inline-actions { display: flex; align-items: center; gap: 9px; }
    .topbar-title { font-size: 18px; font-weight: 800; }
    .topbar-context { color: var(--muted); font-size: 12px; }
    .icon-button.mobile-menu { display: none; }
    .content { width: min(1420px, 100%); margin: 0 auto; padding: 24px 28px 56px; }

    .icon-button, .button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
    }
    .button { padding: 8px 14px; }
    .icon-button { width: 38px; padding: 0; }
    .button svg, .icon-button svg { width: 17px; height: 17px; }
    .button:hover, .icon-button:hover { border-color: #8da39c; background: #f9fbfa; }
    .button.primary { border-color: var(--brand); background: var(--brand); color: #fff; }
    .button.primary:hover { background: var(--brand-strong); }
    .button.danger { border-color: #e2b4b4; color: var(--danger); background: var(--danger-soft); }
    .button.ghost { border-color: transparent; background: transparent; }
    .button.small { min-height: 32px; padding: 6px 10px; font-size: 12px; }
    .button.block { width: 100%; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #99aaa4; flex: 0 0 auto; }
    .status-dot.online { background: #4bc184; box-shadow: 0 0 0 3px rgba(75,193,132,.14); }
    .status-dot.offline { background: #e1a43d; }
    .status-dot.error { background: #d45151; }
    .sync-chip {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 20px; }
    .page-title { margin: 0; font-size: 25px; line-height: 1.25; }
    .page-subtitle { margin: 7px 0 0; color: var(--muted); line-height: 1.65; }
    .section-title { margin: 0; font-size: 16px; }
    .section-help { margin: 5px 0 0; color: var(--muted); line-height: 1.55; font-size: 13px; }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 13px 14px;
      margin-bottom: 16px;
      border: 1px solid #ead8a7;
      border-radius: 6px;
      background: var(--warning-soft);
      color: #6d4c17;
      line-height: 1.55;
    }
    .notice.info { border-color: #bad7cc; background: var(--brand-soft); color: #245849; }
    .notice.danger { border-color: #e4bcbc; background: var(--danger-soft); color: #7d2d2d; }
    .notice svg { width: 18px; height: 18px; margin-top: 1px; flex: 0 0 auto; }

    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 22px; }
    .metric-card {
      min-width: 0;
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      box-shadow: 0 2px 8px rgba(25,47,41,.03);
    }
    .metric-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .metric-label { color: var(--muted); font-size: 12px; font-weight: 700; }
    .metric-icon { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 6px; background: var(--brand-soft); color: var(--brand); }
    .metric-icon.warm { background: var(--accent-soft); color: var(--accent); }
    .metric-icon svg { width: 16px; height: 16px; }
    .metric-value { margin-top: 13px; font-size: 23px; font-weight: 850; font-variant-numeric: tabular-nums; }
    .metric-foot { margin-top: 7px; color: var(--muted); font-size: 12px; }

    .layout-two { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(300px, .8fr); gap: 16px; }
    .panel { border-top: 1px solid var(--line-strong); background: transparent; padding: 18px 0 4px; }
    .panel + .panel { margin-top: 18px; }
    .panel.card-panel { padding: 18px; border: 1px solid var(--line); border-radius: 7px; background: var(--surface); }
    .panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 15px; }

    .task-list, .activity-list, .guardian-list { display: grid; gap: 8px; }
    .task-row, .activity-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 10px 0;
      border-bottom: 1px solid #e8ecea;
    }
    .task-row:last-child, .activity-row:last-child { border-bottom: 0; }
    .task-main, .activity-main { min-width: 0; flex: 1; }
    .task-title, .activity-title { font-weight: 750; }
    .task-note, .activity-note { margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 3px 7px;
      border-radius: 5px;
      background: #edf1ef;
      color: #53615d;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.success { background: #e5f3ea; color: var(--success); }
    .badge.warning { background: var(--warning-soft); color: var(--warning); }
    .badge.danger { background: var(--danger-soft); color: var(--danger); }
    .badge.info { background: var(--brand-soft); color: var(--brand); }

    .form-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 14px; }
    .field { grid-column: span 6; min-width: 0; }
    .field.third { grid-column: span 4; }
    .field.full { grid-column: 1 / -1; }
    .field label, .field-label { display: block; margin-bottom: 7px; font-size: 12px; font-weight: 800; }
    .required::after { content: " *"; color: var(--danger); }
    .input, .select, .textarea {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }
    .textarea { min-height: 84px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus { border-color: var(--brand); outline: 3px solid rgba(23,98,79,.1); }
    .field-help { margin-top: 6px; color: var(--muted); font-size: 11px; line-height: 1.5; }
    .field-error { min-height: 18px; margin-top: 5px; color: var(--danger); font-size: 11px; }
    .money-wrap { position: relative; }
    .money-wrap .input { padding-right: 36px; text-align: right; font-variant-numeric: tabular-nums; }
    .money-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--line-strong); border-radius: 6px; overflow: hidden; }
    .segment { min-height: 42px; border: 0; border-right: 1px solid var(--line); background: #fff; color: var(--muted); font-weight: 750; }
    .segment:last-child { border-right: 0; }
    .segment.active { background: var(--brand); color: #fff; }
    .checkbox-row { display: flex; align-items: flex-start; gap: 9px; line-height: 1.5; }
    .checkbox-row input { width: 17px; height: 17px; margin-top: 2px; accent-color: var(--brand); }
    .calc-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; margin-top: 14px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--line); }
    .calc-item { padding: 11px; background: var(--surface-soft); text-align: right; }
    .calc-label { color: var(--muted); font-size: 11px; }
    .calc-value { margin-top: 4px; font-weight: 850; font-variant-numeric: tabular-nums; }
    .form-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }

    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 7px; background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 820px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid #e8ecea; text-align: left; vertical-align: middle; }
    th { position: sticky; top: 0; z-index: 2; background: #f3f6f4; color: #57645f; font-size: 11px; font-weight: 850; }
    tbody tr:hover { background: #fafcfb; }
    tbody tr:last-child td { border-bottom: 0; }
    td.number, th.number { text-align: right; font-variant-numeric: tabular-nums; }
    .empty-state { padding: 42px 20px; text-align: center; color: var(--muted); }
    .empty-state svg { width: 30px; height: 30px; margin-bottom: 10px; color: #8da39c; }
    .empty-title { color: var(--ink); font-weight: 800; }
    .empty-note { margin: 6px auto 0; max-width: 420px; line-height: 1.6; font-size: 12px; }

    .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .filter-bar .input, .filter-bar .select { width: auto; min-width: 150px; min-height: 36px; padding: 7px 9px; }
    .amount-positive { color: var(--brand); font-weight: 800; }
    .amount-negative { color: var(--accent); font-weight: 800; }

    .status-board { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .status-item { padding: 14px; border: 1px solid var(--line); border-radius: 7px; background: #fff; }
    .status-item-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .status-item-title { font-weight: 800; }
    .status-item-body { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.6; }

    .term-button { border: 0; border-bottom: 1px dashed #7b918a; padding: 0; background: transparent; color: inherit; font-weight: inherit; }
    .tooltip {
      position: fixed;
      z-index: 100;
      width: min(320px, calc(100vw - 28px));
      padding: 12px 13px;
      border: 1px solid #9eb4ad;
      border-radius: 6px;
      background: #112f28;
      color: #f3f8f6;
      box-shadow: var(--shadow);
      line-height: 1.6;
      font-size: 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(15, 30, 26, .54);
    }
    .modal {
      width: min(680px, 100%);
      max-height: min(780px, calc(100vh - 40px));
      overflow: auto;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(9, 24, 20, .24);
    }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; border-bottom: 1px solid var(--line); }
    .modal-title { margin: 0; font-size: 18px; }
    .modal-body { padding: 20px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 9px; padding: 15px 20px; border-top: 1px solid var(--line); }

    .toast-region { position: fixed; right: 18px; bottom: 18px; z-index: 120; display: grid; gap: 8px; width: min(360px, calc(100vw - 36px)); }
    .toast { display: flex; align-items: flex-start; gap: 10px; padding: 13px 14px; border: 1px solid #b7c8c2; border-radius: 7px; background: #fff; box-shadow: var(--shadow); line-height: 1.5; }
    .toast.error { border-color: #e0aaaa; background: #fff7f6; }
    .toast.success { border-color: #a7ceb9; background: #f5fcf8; }

    .developer-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .guardian-item { padding: 13px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
    .guardian-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .guardian-name { font-weight: 800; }
    .guardian-role { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.55; }

    .guide-topic-list { display: grid; gap: 10px; max-width: 760px; }
    .guide-topic-button {
      width: 100%;
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 15px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      text-align: left;
    }
    .guide-topic-button:hover, .guide-topic-button.active { border-color: var(--brand); background: var(--brand-soft); }
    .guide-topic-icon { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 6px; background: var(--brand); color: #fff; flex: 0 0 auto; }
    .guide-topic-icon svg { width: 19px; height: 19px; }
    .guide-topic-copy { min-width: 0; flex: 1; }
    .guide-topic-title { display: block; font-weight: 850; overflow-wrap: anywhere; }
    .guide-topic-note { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.45; overflow-wrap: anywhere; }
    .guide-topic-arrow { color: var(--brand); flex: 0 0 auto; }
    .guide-topic-arrow svg { width: 18px; height: 18px; }
    .guide-summary { margin: 22px 0 8px; }
    .guide-section { padding: 20px 0 6px; border-top: 1px solid var(--line-strong); scroll-margin-top: calc(var(--header) + 16px); }
    .guide-section:first-child { border-top: 0; }
    .guide-section-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .guide-step-number { width: 29px; height: 29px; display: grid; place-items: center; border-radius: 50%; background: var(--brand); color: #fff; font-size: 12px; font-weight: 900; flex: 0 0 auto; }
    .guide-section-title { margin: 1px 0 0; font-size: 17px; }
    .guide-section-note { margin: 5px 0 0; color: var(--muted); line-height: 1.6; font-size: 13px; }
    .guide-steps { margin: 0; padding-left: 22px; line-height: 1.85; }
    .guide-steps li + li { margin-top: 5px; }
    .guide-values { display: grid; gap: 8px; margin-top: 14px; }
    .guide-value {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(130px, .45fr) minmax(0, 1fr) 38px;
      align-items: center;
      gap: 10px;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    .guide-value-label { color: var(--muted); font-size: 12px; font-weight: 750; }
    .guide-value code { min-width: 0; overflow-wrap: anywhere; color: #254c42; }
    .guide-checks { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin: 14px 0 4px; }
    .guide-check { padding: 11px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
    .guide-check-label { color: var(--muted); font-size: 11px; }
    .guide-check-state { margin-top: 6px; font-weight: 800; }
    .guide-check-state.success { color: var(--success); }
    .guide-check-state.warning { color: var(--warning); }

    @media (max-width: 1100px) {
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout-two { grid-template-columns: 1fr; }
    }
    @media (max-width: 780px) {
      :root { --header: 60px; }
      .app-shell { display: block; }
      .sidebar { transform: translateX(-100%); transition: transform .2s ease; box-shadow: 12px 0 30px rgba(0,0,0,.15); }
      .sidebar.open { transform: translateX(0); }
      .main-column { width: 100%; }
      .icon-button.mobile-menu { display: inline-flex; }
      .topbar { padding: 0 14px; }
      .topbar-context { display: none; }
      .content { padding: 18px 14px 42px; }
      .page-header { align-items: stretch; flex-direction: column; }
      .page-header .inline-actions { width: 100%; }
      .page-header .inline-actions .button { flex: 1; }
      .page-title { font-size: 21px; }
      .metric-grid { grid-template-columns: 1fr 1fr; gap: 9px; }
      .metric-card { padding: 14px; }
      .metric-value { font-size: 19px; }
      .form-grid { grid-template-columns: 1fr; }
      .field, .field.third, .field.full { grid-column: 1; }
      .status-board, .developer-grid, .guide-checks { grid-template-columns: 1fr; }
      .topbar-actions .button-label { display: none; }
    }
    @media (max-width: 480px) {
      .metric-grid { grid-template-columns: 1fr; }
      .segmented { grid-template-columns: 1fr; }
      .segment { border-right: 0; border-bottom: 1px solid var(--line); }
      .segment:last-child { border-bottom: 0; }
      .calc-strip { grid-template-columns: 1fr; }
      .form-actions { flex-direction: column-reverse; }
      .form-actions .button { width: 100%; }
      .topbar-title { font-size: 16px; }
      .guide-value { grid-template-columns: 1fr 38px; }
      .guide-value-label { grid-column: 1 / -1; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="주 메뉴">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">장</div>
        <div>
          <div class="brand-name">바른장부</div>
          <div class="brand-version">Accounting Ledger <span id="sidebarVersion"></span></div>
        </div>
      </div>
      <nav class="nav" id="mainNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-status"><span class="status-dot" id="sidebarStatusDot"></span><span id="sidebarStatusText">로컬 저장 준비 중</span></div>
      </div>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button mobile-menu" id="mobileMenuButton" type="button" title="메뉴 열기" aria-label="메뉴 열기"><i data-lucide="menu"></i></button>
          <div>
            <div class="topbar-title" id="topbarTitle">대시보드</div>
            <div class="topbar-context" id="topbarContext">사업자 설정을 확인하세요</div>
          </div>

      isSecretKey: value => /(?:service[_-]?role|sb_secret_|cloudinary:\/\/[^:]+:|oauth.{0,8}secret)/i.test(String(value || '')),
      latestByUpdatedAt(local, remote) {
        if (!local) return remote;
        if (!remote) return local;
        return Date.parse(local.updated_at || local.created_at || 0) > Date.parse(remote.updated_at || remote.created_at || 0) ? local : remote;
      },
      debounce(fn, wait = 180) {
        let timer;
        return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), wait); };
      }
    });

    // 3. Accounting domain layer: no DOM, storage, or remote calls
    const AccountingDomain = Object.freeze({
      calculateAmounts(totalInput, vatType) {
        const total = Math.max(0, Math.round(Utils.number(totalInput)));
        if (vatType !== 'taxable') return { supplyAmount: total, vatAmount: 0, totalAmount: total };
        const supplyAmount = Math.round(total / 1.1);
        return { supplyAmount, vatAmount: total - supplyAmount, totalAmount: total };
      },

      accountChoices(accounts, transactionType) {
        return accounts.filter(account => {
          if (account.deleted_at) return false;
          if (transactionType === 'income') return account.account_type === 'revenue';
          if (transactionType === 'expense') return account.account_type === 'expense';
          return account.local_key === 'equipment' || account.account_code === '203';
        });
      },

      buildPosting(transaction, accountsByKey) {
        const lines = [];
        const total = Number(transaction.total_amount);
        const supply = Number(transaction.supply_amount);
        const vat = Number(transaction.vat_amount);
        const settled = transaction.payment_status === 'paid';
        const selectedAccount = transaction.account_id;

        const addLine = (accountId, debit, credit, memo, sortOrder) => lines.push({
          id: Utils.uuid(),
          business_id: transaction.business_id,
          journal_entry_id: null,
          account_id: accountId,
          debit_amount: debit,
          credit_amount: credit,
          line_memo: memo,
          sort_order: sortOrder,
          created_at: transaction.created_at,
          updated_at: transaction.updated_at,
          deleted_at: null
        });

        if (transaction.transaction_type === 'income') {
          addLine(settled ? accountsByKey.bank.id : accountsByKey.receivable.id, total, 0, settled ? '입금 또는 즉시 수입' : '아직 받지 않은 수입', 1);
          addLine(selectedAccount, 0, supply, transaction.description, 2);
          if (vat > 0) addLine(accountsByKey.vat_payable.id, 0, vat, '매출 부가세 후보', 3);
        } else if (transaction.transaction_type === 'expense') {
          addLine(selectedAccount, supply, 0, transaction.description, 1);
          if (vat > 0) addLine(accountsByKey.vat_receivable.id, vat, 0, '매입 부가세 공제 후보', 2);
          addLine(settled ? accountsByKey.bank.id : accountsByKey.payable.id, 0, total, settled ? '지급 완료' : '아직 지급하지 않은 금액', 3);
        } else if (transaction.transaction_type === 'asset_purchase') {
          addLine(selectedAccount, supply, 0, transaction.description, 1);
          if (vat > 0) addLine(accountsByKey.vat_receivable.id, vat, 0, '자산 매입 부가세 공제 후보', 2);
          addLine(settled ? accountsByKey.bank.id : accountsByKey.payable.id, 0, total, settled ? '자산 대금 지급' : '자산 미지급금', 3);
        } else {
          throw new Error('POSTING_TYPE_UNSUPPORTED');
        }
        return lines;
      },

      validateTransaction(input) {
        const errors = {};
        if (!/^20\d{2}-\d{2}-\d{2}$/.test(input.transactionDate || '')) errors.transactionDate = '거래일을 확인해 주세요.';
        if (!['income', 'expense', 'asset_purchase'].includes(input.transactionType)) errors.transactionType = '거래 유형을 선택해 주세요.';
        if (!String(input.description || '').trim()) errors.description = '거래 내용을 입력해 주세요.';
        if (!input.accountId) errors.accountId = '계정과목을 선택해 주세요.';
        if (Utils.number(input.totalAmount) <= 0) errors.totalAmount = '0원보다 큰 금액을 입력해 주세요.';
        return errors;
      },

      validateJournal(lines) {
        const debit = lines.reduce((sum, line) => sum + Number(line.debit_amount || 0), 0);
        const credit = lines.reduce((sum, line) => sum + Number(line.credit_amount || 0), 0);
        const invalidLine = lines.some(line => !line.account_id || (Number(line.debit_amount) > 0) === (Number(line.credit_amount) > 0));
        return { status: !invalidLine && debit === credit && debit > 0 ? 'pass' : 'error', debit, credit, difference: debit - credit, invalidLine };
      },

      summarize(transactions) {
        return transactions.filter(row => !row.deleted_at).reduce((summary, row) => {
          summary.count += 1;
          if (row.transaction_type === 'income') summary.income += Number(row.total_amount || 0);
          if (row.transaction_type === 'expense') summary.expense += Number(row.total_amount || 0);
          if (row.transaction_type === 'asset_purchase') summary.assets += Number(row.total_amount || 0);
          if (row.evidence_status !== 'attached') summary.missingEvidence += 1;
          if (row.review_status !== 'normal') summary.review += 1;
          return summary;
        }, { count: 0, income: 0, expense: 0, assets: 0, missingEvidence: 0, review: 0 });
      }
    });

    // 4. IndexedDB persistence adapter
    class IndexedDbAdapter {
      constructor() { this.db = null; this.name = 'accounting-ledger-v1'; this.version = 1; }
      async open() {
        if (this.db) return this.db;
        this.db = await new Promise((resolve, reject) => {
          const request = indexedDB.open(this.name, this.version);
          request.onupgradeneeded = () => {
            const db = request.result;
            for (const storeName of LOCAL_STORES) {
              if (!db.objectStoreNames.contains(storeName)) {
                const store = db.createObjectStore(storeName, { keyPath: 'id' });
                if (storeName !== 'sync_queue' && storeName !== 'tombstones') store.createIndex('updated_at', 'updated_at');
                if (['source_transactions','journal_entries','journal_entry_lines','accounts','counterparties'].includes(storeName)) store.createIndex('business_id', 'business_id');
              }
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error || new Error('IDB_OPEN_FAILED'));
        });
        return this.db;
      }
      async transaction(storeNames, mode, executor) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeNames, mode);
          let result;
          tx.oncomplete = () => resolve(result);
          tx.onerror = () => reject(tx.error || new Error('IDB_TRANSACTION_FAILED'));
          tx.onabort = () => reject(tx.error || new Error('IDB_TRANSACTION_ABORTED'));
          result = executor(tx);
        });
      }
      async getAll(storeName) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readonly').objectStore(storeName).getAll();
          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);
        });
      }
      async get(storeName, id) {
        const db = await this.open();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readonly').objectStore(storeName).get(id);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
      }
      async put(storeName, value) {
        return this.transaction([storeName], 'readwrite', tx => tx.objectStore(storeName).put(value));
      }
      async putMany(recordsByStore) {
        const names = Object.keys(recordsByStore);
        if (!names.length) return;
        return this.transaction(names, 'readwrite', tx => {
          for (const [storeName, rows] of Object.entries(recordsByStore)) {
            const store = tx.objectStore(storeName);
            for (const row of rows) store.put(row);
          }
        });
      }
      async replaceStore(storeName, rows) {
        return this.transaction([storeName], 'readwrite', tx => {
          const store = tx.objectStore(storeName);
          store.clear();
          for (const row of rows) store.put(row);
        });
      }
      async clearAll() {
        return this.transaction([...LOCAL_STORES], 'readwrite', tx => {
          for (const store of LOCAL_STORES) tx.objectStore(store).clear();
        });
      }
      async snapshot() {
        const tables = {};
        for (const store of LOCAL_STORES) tables[store] = await this.getAll(store);
        return tables;
      }
    }

    const ConfigAdapter = Object.freeze({
      key: 'accounting-ledger-config-v1',
      load() {
        try { return JSON.parse(localStorage.getItem(this.key) || '{}'); }
        catch { return {}; }
      },
      save(next) {
        const clean = { ...next };
        if (Utils.isSecretKey(clean.supabaseKey)) throw new Error('SECRET_KEY_NOT_ALLOWED');
        localStorage.setItem(this.key, JSON.stringify(clean));
        return clean;
      },
      clear() { localStorage.removeItem(this.key); }
    });

    // 5. Remote adapter: Supabase Auth plus REST requests that always check response.ok
    class SupabaseAdapter {
      constructor() { this.client = null; this.module = null; }
      isConfigured() { return Boolean(state.config.supabaseUrl && state.config.supabaseKey); }
      async ensureClient() {
        if (this.client) return this.client;
        if (!this.isConfigured()) throw new Error('SUPABASE_NOT_CONFIGURED');
        if (Utils.isSecretKey(state.config.supabaseKey)) throw new Error('SECRET_KEY_NOT_ALLOWED');
        this.module = this.module || await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2/+esm');
        this.client = this.module.createClient(state.config.supabaseUrl, state.config.supabaseKey, {
          auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
        });
        return this.client;
      }
      resetClient() { this.client = null; }
      async session() {
        const client = await this.ensureClient();
        const { data, error } = await client.auth.getSession();
        if (error) throw error;
        return data.session;
      }
      async signIn() {
        const diagnostic = await this.diagnose();
        if (diagnostic.googleProvider !== 'ready') throw new Error('GOOGLE_PROVIDER_DISABLED');
        const client = await this.ensureClient();
        const redirectTo = `${location.origin}${location.pathname}`;
        const { error } = await client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
        if (error) throw error;
      }
      async diagnose() {
        const client = await this.ensureClient();
        const response = await fetch(`${state.config.supabaseUrl}/rest/v1/businesses?select=id&limit=1`, {
          headers: {
            apikey: state.config.supabaseKey,
            Authorization: `Bearer ${state.config.supabaseKey}`
          }
        });
        if (!response.ok) throw new Error(`PUBLIC_CONNECTION_${response.status}`);
        const anonymousRows = await response.json();
        if (!Array.isArray(anonymousRows)) throw new Error('PUBLIC_CONNECTION_INVALID_RESPONSE');
        if (anonymousRows.length > 0) throw new Error('ANONYMOUS_DATA_EXPOSED');

        const redirectTo = `${location.origin}${location.pathname}`;
        const providerResponse = await fetch(
          `${state.config.supabaseUrl}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`,
          { headers: { apikey: state.config.supabaseKey }, redirect: 'manual' }
        );
        let providerDisabled = false;
        if (providerResponse.status === 400) {
          const providerDetail = await providerResponse.text();
          providerDisabled = /unsupported provider|provider is not enabled/i.test(providerDetail);
          if (!providerDisabled) throw new Error(`GOOGLE_PROVIDER_${providerResponse.status}:${providerDetail.slice(0, 160)}`);
        } else if (!(providerResponse.type === 'opaqueredirect' || providerResponse.status === 0 || (providerResponse.status >= 300 && providerResponse.status < 400))) {
          throw new Error(`GOOGLE_PROVIDER_UNEXPECTED_${providerResponse.status}`);
        }
        return {
          api: 'ready',
          anonymousIsolation: 'pass',
          googleProvider: providerDisabled ? 'disabled' : 'ready',
          checkedAt: Utils.now(),
          detail: providerDisabled ? 'Supabase Google provider가 비활성입니다.' : null
        };
      }
      async signOut() {
        const client = await this.ensureClient();
        const { error } = await client.auth.signOut();
        if (error) throw error;
      }
      async checkAllowed(session) {
        const email = Utils.normalizeEmail(session?.user?.email);
        if (!email) throw new Error('AUTH_EMAIL_MISSING');
        const client = await this.ensureClient();
        const { data, error } = await client.from('app_allowed_users').select('email,role,status,label').eq('email', email).maybeSingle();
        if (error) throw error;
        if (!data || data.status !== 'active') throw new Error('AUTH_EMAIL_NOT_ALLOWED');
        return data;
      }
      async raw(path, { method = 'GET', body, prefer } = {}) {
        const session = await this.session();
        if (!session?.access_token) throw new Error('AUTH_REQUIRED');
        const response = await fetch(`${state.config.supabaseUrl}/rest/v1/${path}`, {
          method,
          headers: {
            apikey: state.config.supabaseKey,
            Authorization: `Bearer ${session.access_token}`,
            'Content-Type': 'application/json',
            ...(prefer ? { Prefer: prefer } : {})
          },
          body: body === undefined ? undefined : JSON.stringify(body)
        });
        if (!response.ok) {
          const detail = await response.text();
          throw new Error(`REMOTE_${response.status}:${detail.slice(0, 240)}`);
        }
        if (response.status === 204) return null;
        const text = await response.text();
        return text ? JSON.parse(text) : null;
      }
      async pullTable(table) {
        const orderColumn = table === 'audit_logs' ? 'created_at' : 'updated_at';
        return this.raw(`${table}?select=*&order=${orderColumn}.desc`);
      }
      async upsert(table, payload) {
        const body = table === 'businesses' && state.session?.user?.id ? { ...payload, owner_user_id: state.session.user.id } : payload;
        return this.raw(`${table}?on_conflict=id`, { method: 'POST', body: [body], prefer: 'resolution=merge-duplicates,return=minimal' });
      }
      async syncMeta() {
        const rows = await this.raw('accounting_sync_meta?select=key,value,updated_at');
        return Object.fromEntries((rows || []).map(row => [row.key, row]));
      }
    }

    const AppService = Object.freeze({
      async reload() {
        const [businesses, sites, accounts, transactions, counterparties, journals, journalLines, auditLogs, closings, queue] = await Promise.all([
          storage.getAll('businesses'), storage.getAll('business_sites'), storage.getAll('accounts'), storage.getAll('source_transactions'),
          storage.getAll('counterparties'), storage.getAll('journal_entries'), storage.getAll('journal_entry_lines'), storage.getAll('audit_logs'),

      },

      async setupBusiness(input) {
        const now = Utils.now();
        const businessId = state.business?.id || Utils.uuid();
        const siteId = state.site?.id || Utils.uuid();
        const business = {
          id: businessId,
          owner_user_id: state.session?.user?.id || null,

          registration_number: input.registrationNumber.replace(/\D/g, '') || null,
          representative_name: input.representativeName.trim() || null,
          tax_profile_status: input.vatPayerType === 'unconfirmed' ? 'draft' : 'confirmed',
          created_at: state.business?.created_at || now,
          updated_at: now,
          deleted_at: null
        };
        const site = {
          id: siteId,
          business_id: businessId,
          site_name: input.siteName.trim() || input.businessName.trim(),
          address: input.address.trim() || null,
          main_industry_code: input.industryCode.trim() || null,
          main_industry_name: input.industryName.trim() || null,

          closed_on: null,
          is_primary: true,

          updated_at: now,

        };
        const period = {
          id: state.business ? ((await storage.getAll('ledger_period_settings')).find(row => row.business_id === businessId)?.id || Utils.uuid()) : Utils.uuid(),
          business_id: businessId,
          ledger_start_year: Number(input.ledgerStartYear),
          ledger_start_date: `${input.ledgerStartYear}-01-01`,
          first_import_year: null,
          opening_balance_date: null,
          retroactive_import_enabled: true,
          created_at: now,
          updated_at: now,
          deleted_at: null
        };
        const existingAccounts = state.accounts.filter(row => row.business_id === businessId && !row.deleted_at);
        const accounts = [...existingAccounts];
        for (const template of ACCOUNT_TEMPLATES) {
          const found = accounts.find(row => row.account_code === template.account_code);
          if (found) {
            found.local_key = template.key;
            found.local_explanation = template.explanation;
            continue;
          }
          accounts.push({
            id: Utils.uuid(), business_id: businessId, standard_account_id: null, account_code: template.account_code,
            account_name: template.account_name, account_type: template.account_type, is_active: true,
            local_key: template.key, local_explanation: template.explanation,
            created_at: now, updated_at: now, deleted_at: null

        }
        const audit = this.audit('business', businessId, state.business ? 'update' : 'create', state.business, business, '사업자 설정 저장');
        const changedAccounts = accounts.filter(row => !existingAccounts.some(existing => existing.id === row.id));
        const queueRows = [this.queue('businesses', business), this.queue('business_sites', site), this.queue('ledger_period_settings', period), ...changedAccounts.map(row => this.queue('accounts', this.remoteSafeAccount(row)))];
        await storage.putMany({ businesses: [business], business_sites: [site], ledger_period_settings: [period], accounts, audit_logs: [audit], sync_queue: queueRows });
        state.config.vatPayerType = input.vatPayerType;

      },

      remoteSafeAccount(account) {
        const { local_key, local_explanation, ...safe } = account;
        return safe;
      },

      accountMap() {
        const map = {};
        for (const template of ACCOUNT_TEMPLATES) {
          const account = state.accounts.find(row => row.local_key === template.key) || state.accounts.find(row => row.account_code === template.account_code);
          if (account) map[template.key] = account;
        }
        return map;
      },

      async saveTransaction(input) {
        if (!state.business) throw new Error('BUSINESS_REQUIRED');
        const errors = AccountingDomain.validateTransaction(input);
        if (Object.keys(errors).length) return { ok: false, errors };
        const now = Utils.now();
        const amounts = AccountingDomain.calculateAmounts(input.totalAmount, input.vatType);
        let counterparty = state.counterparties.find(row => !row.deleted_at && row.name.trim().toLowerCase() === input.counterpartyName.trim().toLowerCase());
        if (!counterparty && input.counterpartyName.trim()) {
          counterparty = { id: Utils.uuid(), business_id: state.business.id, name: input.counterpartyName.trim(), registration_number: null, contact: null, memo: null, created_at: now, updated_at: now, deleted_at: null };
        }
        const reviewReasons = [];
        const vatProfile = state.config.vatPayerType || 'unconfirmed';
        if (!input.hasEvidence) reviewReasons.push('missing_evidence');
        if (vatProfile === 'unconfirmed' && input.vatType === 'taxable') reviewReasons.push('tax_profile_unconfirmed');
        if (input.vatType === 'taxable' && input.transactionType !== 'income') reviewReasons.push('vat_deduction_review');
        if (input.vatType === 'taxable' && ['simplified', 'exempt', 'mixed'].includes(vatProfile)) reviewReasons.push('tax_profile_conflict');
        const transaction = {
          id: Utils.uuid(), business_id: state.business.id, business_site_id: state.site?.id || null,
          transaction_date: input.transactionDate, recognition_date: input.transactionDate,
          transaction_type: input.transactionType, description: input.description.trim(),
          counterparty_id: counterparty?.id || null, account_id: input.accountId,
          supply_amount: amounts.supplyAmount, vat_amount: amounts.vatAmount, total_amount: amounts.totalAmount,
          vat_type: input.vatType, evidence_status: input.hasEvidence ? 'attached' : 'not_attached',
          payment_status: input.paymentStatus, review_status: reviewReasons.length ? 'requires_review' : 'normal',
          source_channel: 'manual', source_revision: 1, posting_rule_version: APP_INFO.postingRuleVersion,
          created_at: now, updated_at: now, deleted_at: null
        };
        const journal = {
          id: Utils.uuid(), business_id: state.business.id, source_transaction_id: transaction.id,
          entry_date: transaction.transaction_date, status: 'generated', generated_from: 'source_transaction',
          posting_rule_version: APP_INFO.postingRuleVersion, memo: transaction.description,
          created_at: now, updated_at: now, deleted_at: null
        };
        const lines = AccountingDomain.buildPosting(transaction, this.accountMap()).map(line => ({ ...line, journal_entry_id: journal.id }));
        const validation = AccountingDomain.validateJournal(lines);
        if (validation.status !== 'pass') throw new Error(`JOURNAL_UNBALANCED:${validation.difference}`);
        const audit = this.audit('source_transaction', transaction.id, 'create', null, transaction, '직접 입력');
        const queueRows = [
          ...(counterparty && !state.counterparties.some(row => row.id === counterparty.id) ? [this.queue('counterparties', counterparty)] : []),
          this.queue('source_transactions', transaction), this.queue('journal_entries', journal),
          ...lines.map(row => this.queue('journal_entry_lines', row)), this.queue('audit_logs', audit)
        ];
        await storage.putMany({
          ...(counterparty ? { counterparties: [counterparty] } : {}),
          source_transactions: [transaction], journal_entries: [journal], journal_entry_lines: lines,
          audit_logs: [audit], sync_queue: queueRows
        });
        await this.reload();
        return { ok: true, transaction, journal, lines, validation };
      },

      audit(entityType, entityId, action, beforeData, afterData, reason) {
        return { id: Utils.uuid(), business_id: state.business?.id || afterData?.business_id || null, actor_user_id: state.session?.user?.id || null, entity_type: entityType, entity_id: entityId, action, before_data: beforeData, after_data: afterData, reason, created_at: Utils.now() };
      },

      queue(entityType, payload) {
        const now = Utils.now();
        return { id: Utils.uuid(), entity_type: entityType, entity_id: payload.id, operation: 'upsert', payload, status: 'pending', retry_count: 0, last_error: null, created_at: now, updated_at: now, deleted_at: null };
      },

      async exportBackup() {
        const tables = await storage.snapshot();
        return {
          backupSchemaVersion: APP_INFO.backupSchemaVersion,
          appVersion: APP_INFO.version,
          schemaVersion: APP_INFO.schemaVersion,
          createdAt: Utils.now(),
          deviceId: this.deviceId(),
          canonicalVersion: Number(state.config.canonicalVersion || 0),
          tables,
          warnings: ['이 파일에는 거래처와 세무자료가 포함될 수 있습니다. 공개 저장소나 공유 폴더에 올리지 마세요.']
        };
      },

      async restoreBackup(backup) {
        if (!backup || backup.backupSchemaVersion !== APP_INFO.backupSchemaVersion || !backup.tables) throw new Error('BACKUP_SCHEMA_UNSUPPORTED');
        const recordsByStore = {};
        for (const store of LOCAL_STORES) {
          const rows = backup.tables[store];
          if (rows !== undefined && !Array.isArray(rows)) throw new Error(`BACKUP_TABLE_INVALID:${store}`);
          recordsByStore[store] = rows || [];
        }
        for (const store of LOCAL_STORES) await storage.replaceStore(store, recordsByStore[store]);
        state.config.canonicalVersion = Number(backup.canonicalVersion || 0);
        ConfigAdapter.save(state.config);
        await this.reload();
      },

      deviceId() {
        if (!state.config.deviceId) {
          state.config.deviceId = Utils.uuid();
          ConfigAdapter.save(state.config);
        }
        return state.config.deviceId;
      }
    });

    const SyncService = Object.freeze({
      async runConnectionDiagnostics() {
        state.connectionDiagnostics = { ...state.connectionDiagnostics, status: 'checking', detail: null };
        renderShellStatus();
        try {
          state.connectionDiagnostics = { status: 'complete', ...(await remote.diagnose()) };
        } catch (error) {
          state.connectionDiagnostics = {
            status: 'error', api: 'error', anonymousIsolation: 'unknown', googleProvider: 'unknown',
            checkedAt: Utils.now(), detail: error.message
          };
        }
        renderShellStatus();
        if (state.route === 'settings' || state.route === 'developer' || state.route === 'guide') render();
        return state.connectionDiagnostics;
      },
      async initializeAuth() {
        if (!remote.isConfigured()) return;
        try {
          state.session = await remote.session();
          if (state.session) state.allowedUser = await remote.checkAllowed(state.session);
        } catch (error) {
          state.syncError = error.message;
          if (error.message === 'AUTH_EMAIL_NOT_ALLOWED') {
            try { await remote.signOut(); } catch { /* keep original denial */ }
            state.session = null;
            state.allowedUser = null;
          }
        }
      },

      async connectAndSync() {
        if (!remote.isConfigured()) throw new Error('SUPABASE_NOT_CONFIGURED');
        state.syncStatus = 'syncing'; renderShellStatus();
        state.session = await remote.session();
        if (!state.session) throw new Error('AUTH_REQUIRED');
        state.allowedUser = await remote.checkAllowed(state.session);
        await this.syncNow();
      },

      async syncNow() {
        if (!state.session) throw new Error('AUTH_REQUIRED');
        state.syncStatus = 'syncing'; state.syncError = null; renderShellStatus();
        try {
          const meta = await remote.syncMeta();
          const cloudCanonical = Number(meta.canonical_version?.value || 0);
          const localCanonical = Number(state.config.canonicalVersion || 0);
          if (cloudCanonical > localCanonical) {
            for (const table of SYNC_TABLE_ORDER) await storage.replaceStore(table, await remote.pullTable(table));
            const pending = await storage.getAll('sync_queue');
            const completedAt = Utils.now();
            await storage.replaceStore('sync_queue', pending.map(row => ({ ...row, status: 'superseded_by_canonical', updated_at: completedAt })));
            state.config.canonicalVersion = cloudCanonical;
          } else {
            const queue = (await storage.getAll('sync_queue')).filter(row => row.status === 'pending' && !row.deleted_at);
            queue.sort((a,b) => SYNC_TABLE_ORDER.indexOf(a.entity_type) - SYNC_TABLE_ORDER.indexOf(b.entity_type));
            for (const item of queue) {
              try {
                const payload = item.entity_type === 'accounts' ? AppService.remoteSafeAccount(item.payload) : item.payload;
                await remote.upsert(item.entity_type, payload);
                await storage.put('sync_queue', { ...item, status: 'complete', updated_at: Utils.now(), last_error: null });
              } catch (error) {
                await storage.put('sync_queue', { ...item, retry_count: Number(item.retry_count || 0) + 1, last_error: error.message, updated_at: Utils.now() });
                throw error;
              }
            }
            for (const table of SYNC_TABLE_ORDER) {
              const [localRows, cloudRows] = await Promise.all([storage.getAll(table), remote.pullTable(table)]);
              const merged = new Map(localRows.map(row => [row.id, row]));
              for (const remoteRow of cloudRows) merged.set(remoteRow.id, Utils.latestByUpdatedAt(merged.get(remoteRow.id), remoteRow));
              await storage.replaceStore(table, [...merged.values()]);
            }
          }
          state.config.lastSyncAt = Utils.now();
          state.config.canonicalVersion = cloudCanonical;
          ConfigAdapter.save(state.config);
          state.syncStatus = 'complete';
          await AppService.reload();
        } catch (error) {
          state.syncStatus = 'error'; state.syncError = error.message; throw error;
        } finally {
          renderShellStatus();
        }
      }
    });

      if (code.includes('AUTH_REQUIRED')) return 'Google 로그인이 필요합니다.';

      if (code.includes('ANONYMOUS_DATA_EXPOSED')) return '로그인하지 않은 상태에서 회계 데이터가 조회되어 연결을 중단했습니다. RLS를 점검해 주세요.';
      if (code.includes('PUBLIC_CONNECTION')) return 'Supabase 공개 연결을 확인하지 못했습니다. 네트워크와 프로젝트 설정을 확인해 주세요.';
      if (code.includes('SECRET_KEY_NOT_ALLOWED')) return '비밀키 또는 service role 형태의 키는 이 앱에 저장할 수 없습니다.';

      if (code.includes('BACKUP_')) return '백업 파일 구조를 확인할 수 없어 복원하지 않았습니다.';

    }

          ${guideSection(2, 'Google 인증 플랫폼을 설정합니다', '로그인 화면에 표시될 앱 정보와 사용할 사람을 정합니다.', `<ol class="guide-steps"><li>상단 검색창에 <strong>Google Auth Platform</strong>을 입력해 이동합니다.</li><li><strong>시작하기</strong>를 누르고 앱 이름과 사용자 지원 이메일을 입력합니다. 앱 이름은 나중에 로그인 화면에 보입니다.</li><li>대상은 <strong>외부</strong>를 선택합니다. 조직 계정이 없어도 사용할 수 있는 방식입니다.</li><li>게시 상태는 <strong>테스트 중</strong>으로 둡니다. 지금은 앱 게시 버튼을 누르지 않습니다.</li><li><strong>대상</strong> 메뉴의 테스트 사용자에서 아래 이메일만 추가합니다.</li></ol><div class="guide-values">${guideValue('로그인 화면 앱 이름', APP_INFO.name)}${guideValue('사용자 지원 이메일', APP_INFO.ownerEmail)}${guideValue('앱 소유자·테스트 사용자', APP_INFO.ownerEmail)}</div>`)}
          ${guideSection(3, '필요한 권한만 선택합니다', '이 앱은 로그인한 사람의 기본 이름과 이메일만 확인합니다.', `<ol class="guide-steps"><li><strong>데이터 액세스</strong> 메뉴에서 <strong>범위 추가 또는 삭제</strong>를 누릅니다.</li><li>아래 세 범위만 체크하고 저장합니다.</li><li>Gmail, Drive, Calendar 같은 다른 권한은 선택하지 않습니다.</li></ol><div class="guide-values">${guideValue('범위 1', 'openid')}${guideValue('범위 2', '.../auth/userinfo.email')}${guideValue('범위 3', '.../auth/userinfo.profile')}</div>`)}
          ${guideSection(4, '웹 OAuth 클라이언트를 만듭니다', 'Google이 바른장부와 Supabase를 믿을 수 있도록 정확한 주소를 등록합니다.', `<ol class="guide-steps"><li><strong>클라이언트</strong> 메뉴에서 <strong>클라이언트 만들기</strong>를 누릅니다.</li><li>애플리케이션 유형은 <strong>웹 애플리케이션</strong>을 선택합니다.</li><li>아래 클라이언트 이름을 입력합니다.</li><li><strong>승인된 JavaScript 원본</strong>에는 아래 세 주소를 각각 추가합니다. GitHub 주소에는 저장소 경로를 넣지 않습니다.</li><li><strong>승인된 리디렉션 URI</strong>에는 Supabase callback 주소 하나만 넣습니다.</li><li><strong>만들기</strong>를 누른 뒤 Client ID와 Client Secret을 확인합니다. Secret은 복사한 뒤 Supabase에만 붙여넣습니다.</li></ol><div class="guide-values">${guideValue('OAuth 클라이언트 이름', APP_INFO.googleOAuthClientName)}${origins}${guideValue('승인된 리디렉션 URI', GuideService.callbackUrl())}</div>`)}
          ${guideSection(5, 'Supabase에서 Google 로그인을 켭니다', 'Google에서 만든 두 값을 Supabase Auth에 연결합니다.', `<ol class="guide-steps"><li>Supabase Dashboard에서 현재 프로젝트를 엽니다.</li><li><strong>Authentication → Sign In / Providers → Google</strong>로 이동합니다.</li><li><strong>Enable Sign in with Google</strong>을 켭니다.</li><li>Google Cloud의 Client ID를 <strong>Client IDs</strong>에 입력합니다.</li><li>Client Secret을 <strong>Client Secret (for OAuth)</strong>에 입력합니다.</li><li><strong>Skip nonce checks</strong>와 <strong>Allow users without an email</strong>은 끈 상태로 둡니다.</li><li><strong>Save</strong>를 누릅니다.</li></ol><div class="guide-values">${guideValue('Supabase 프로젝트 ref', GuideService.projectRef())}${guideValue('Supabase Project URL', GuideService.supabaseUrl())}${guideValue('Google에 등록할 callback', GuideService.callbackUrl())}</div>`)}
          ${guideSection(6, 'Supabase 이동 주소를 등록합니다', '로그인 뒤 돌아올 수 있는 앱 주소만 허용합니다.', `<ol class="guide-steps"><li>Supabase에서 <strong>Authentication → URL Configuration</strong>으로 이동합니다.</li><li><strong>Site URL</strong>에 GitHub Pages 앱 주소를 입력하고 저장합니다.</li><li><strong>Redirect URLs</strong>에서 아래 세 주소를 하나씩 추가합니다.</li><li>주소 끝의 <code>/</code>까지 똑같이 입력합니다.</li></ol><div class="guide-values">${guideValue('Site URL', APP_INFO.githubPagesUrl)}${redirects}</div>`)}
          ${guideSection(7, '바른장부에서 연결을 확인합니다', '세 가지 진단이 통과한 다음 소유자 계정으로 로그인합니다.', `<ol class="guide-steps"><li>왼쪽 메뉴에서 <strong>설정</strong>을 누릅니다.</li><li><strong>Supabase 및 Google 로그인</strong>에서 <strong>연결 진단</strong>을 누릅니다.</li><li>Data API는 <strong>정상</strong>, 익명 회계자료 격리는 <strong>차단 정상</strong>, Google OAuth는 <strong>사용 가능</strong>인지 확인합니다.</li><li><strong>Google로 로그인</strong>을 누르고 아래 소유자 계정을 선택합니다.</li><li>앱으로 돌아왔을 때 위쪽 상태가 <strong>동기화 완료</strong>이면 연결이 끝난 것입니다.</li></ol><div class="guide-values">${guideValue('로그인할 Google 계정', APP_INFO.ownerEmail)}</div><div class="form-actions"><button class="button" type="button" data-route="settings">${icon('settings-2')}설정에서 확인</button></div>`)}
          ${guideSection(8, '문제가 생기면 이 순서로 봅니다', '주소 한 글자, 테스트 사용자, 비밀값 위치를 먼저 확인하면 대부분 해결됩니다.', `<ol class="guide-steps"><li><strong>redirect_uri_mismatch</strong>: Google Cloud의 승인된 리디렉션 URI가 위 callback 주소와 완전히 같은지 확인합니다.</li><li><strong>Access blocked</strong>: Google Auth Platform이 테스트 중인지, 소유자 이메일이 테스트 사용자에 들어 있는지 확인합니다.</li><li><strong>Google 설정 필요</strong>: Supabase Google provider가 켜져 있고 Client ID와 Secret이 저장됐는지 확인합니다.</li><li><strong>로그인은 됐지만 자료 접근 불가</strong>: 허용 사용자 대장에서 이메일 상태가 active인지 확인합니다.</li><li>주소를 고친 뒤 앱의 <strong>설정 → 연결 진단</strong>을 다시 누릅니다.</li></ol>`)}
        </div>`;
    }

    function renderDeveloper() {
      const statusText = { implemented:'구현', manual_only:'부분/수동', planned:'계획', blocked:'차단' };
      const statusKind = { implemented:'success', manual_only:'warning', planned:'', blocked:'danger' };
      const registry = [...DOMAIN_GUARDIANS, ...ARCH_GUARDIANS, ...GOVERNANCE_AGENTS];
      return `${pageHeader('개발 기록','앱 버전, 저장소 계약, Guardian의 실제 구현 상태를 확인합니다.')}
        <div class="status-board"><div class="status-item"><div class="status-item-head"><span class="status-item-title">앱 버전</span>${badge(`v${APP_INFO.version}`,'info')}</div><div class="status-item-body">DB schema ${APP_INFO.schemaVersion} · Backup ${APP_INFO.backupSchemaVersion} · Posting ${APP_INFO.postingRuleVersion}</div></div><div class="status-item"><div class="status-item-head"><span class="status-item-title">로컬 저장소</span>${badge(state.ready?'정상':'확인 필요',state.ready?'success':'danger')}</div><div class="status-item-body">IndexedDB <code>${storage.name}</code> · ${LOCAL_STORES.length} stores</div></div><div class="status-item"><div class="status-item-head"><span class="status-item-title">동기화</span>${badge(state.syncStatus,state.syncStatus==='error'?'danger':'info')}</div><div class="status-item-body">canonical v${Number(state.config.canonicalVersion || 0)} · 대기 ${state.queue.length}건 · RLS ${state.connectionDiagnostics.anonymousIsolation === 'pass' ? '격리 확인' : '미확인'} · Google ${state.connectionDiagnostics.googleProvider === 'ready' ? '준비' : state.connectionDiagnostics.googleProvider === 'disabled' ? '비활성' : '미확인'}${state.syncError?`<br>진단: ${Utils.escape(state.syncError.slice(0,180))}`:''}</div></div><div class="status-item"><div class="status-item-head"><span class="status-item-title">릴리스 기록</span>${badge(UPDATE_HISTORY[0].label,'success')}</div><div class="status-item-body">${UPDATE_HISTORY[0].date} · ${Utils.escape(UPDATE_HISTORY[0].detail)}</div></div></div>
        <section class="panel"><div class="panel-head"><div><h2 class="section-title">Guardian 레지스트리</h2><p class="section-help">설계 목록과 실제 구현 상태를 구분합니다. 표시 자체가 테스트 통과를 뜻하지는 않습니다.</p></div>${badge(`${registry.length}개`)}</div><div class="developer-grid">${registry.map(([id,name,status,role])=>`<article class="guardian-item"><div class="guardian-head"><div class="guardian-name">${Utils.escape(name)}</div>${badge(statusText[status],statusKind[status])}</div><div class="guardian-role">${Utils.escape(role)}<br><code>${id}</code></div></article>`).join('')}</div></section>`;
    }

    function emptyState(iconName, title, note) { return `<div class="empty-state">${icon(iconName)}<div class="empty-title">${title}</div><div class="empty-note">${note}</div></div>`; }

    function render() {
      const renderers = { dashboard:renderDashboard, transactions:renderTransactionForm, ledger:renderLedger, journals:renderJournals, evidence:renderEvidence, imports:renderImports, reports:renderReports, closing:renderClosing, settings:renderSettings, developer:renderDeveloper, guide:renderGuide };
      if (!renderers[state.route]) state.route = 'dashboard';
      const item = NAV_ITEMS.find(nav => nav.id === state.route);
      el('topbarTitle').textContent = item?.label || '대시보드';
      el('app').innerHTML = renderers[state.route]();
      renderNav(); renderShellStatus(); bindViewEvents(); refreshIcons();
      el('app').focus({ preventScroll: true });
    }

    // 8. UI event layer delegates to services and domain functions
    function bindViewEvents() {
      document.querySelectorAll('[data-route]').forEach(button => button.addEventListener('click', () => routeTo(button.dataset.route)));
      document.querySelectorAll('[data-guide-topic]').forEach(button => button.addEventListener('click', () => {
        state.guideTopic = state.guideTopic === button.dataset.guideTopic ? null : button.dataset.guideTopic;
        render();
      }));
      document.querySelectorAll('[data-copy-value]').forEach(button => button.addEventListener('click', async () => {
        const value = button.dataset.copyValue || '';
        try {
          if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(value);
          else {
            const helper = document.createElement('textarea');
            helper.value = value; helper.setAttribute('readonly', ''); helper.style.position = 'fixed'; helper.style.opacity = '0';
            document.body.appendChild(helper); helper.select(); document.execCommand('copy'); helper.remove();
          }
          toast('복사했습니다.', 'success');
        } catch { toast('복사하지 못했습니다. 값을 직접 선택해 주세요.', 'error'); }
      }));
      document.querySelectorAll('[data-term]').forEach(button => button.addEventListener('click', event => showTerm(event.currentTarget.dataset.term, event.currentTarget)));
      document.querySelectorAll('[data-account-id]').forEach(button => button.addEventListener('click', event => {
        const account = state.accounts.find(row => row.id === event.currentTarget.dataset.accountId);
        showTooltip(account?.local_explanation || '국세청 용어와 신고 항목을 기준으로 사용하는 계정과목입니다.', event.currentTarget);
      }));

      document.querySelectorAll('[data-transaction-type]').forEach(button => button.addEventListener('click', () => { state.formType = button.dataset.transactionType; render(); }));
      const transactionForm = el('transactionForm');
      if (transactionForm) {
        const preview = () => {
          const amounts = AccountingDomain.calculateAmounts(el('totalAmount').value, el('vatType').value);
          el('supplyPreview').textContent = Utils.won(amounts.supplyAmount);
          el('vatPreview').textContent = Utils.won(amounts.vatAmount);
          el('totalPreview').textContent = Utils.won(amounts.totalAmount);
        };
        el('totalAmount').addEventListener('input', preview);
        el('vatType').addEventListener('change', preview);
        transactionForm.addEventListener('reset', () => setTimeout(preview));
        transactionForm.addEventListener('submit', async event => {
          event.preventDefault();
          transactionForm.querySelectorAll('[data-error]').forEach(node => node.textContent = '');
          try {
            const result = await AppService.saveTransaction({
              transactionDate: el('transactionDate').value, transactionType: state.formType,
              description: el('description').value, counterpartyName: el('counterpartyName').value,
              accountId: el('accountId').value, totalAmount: el('totalAmount').value,
              vatType: el('vatType').value, paymentStatus: el('paymentStatus').value, hasEvidence: el('hasEvidence').checked
            });
            if (!result.ok) {
              for (const [name, message] of Object.entries(result.errors)) transactionForm.querySelector(`[data-error="${name}"]`)?.replaceChildren(message);
              toast('입력값을 확인해 주세요.', 'error'); return;
            }
            toast(`거래와 균형 전표를 저장했습니다. 차변·대변 ${Utils.won(result.validation.debit)}`, 'success');
            routeTo('ledger');
          } catch (error) { diagnostic(error); }
        });
      }

      const ledgerQuery = el('ledgerQuery');
      if (ledgerQuery) ledgerQuery.addEventListener('input', Utils.debounce(() => { state.filters.query = ledgerQuery.value; render(); }));
      el('ledgerType')?.addEventListener('change', event => { state.filters.type = event.target.value; render(); });
      el('ledgerYear')?.addEventListener('change', event => { state.filters.year = event.target.value; render(); });

      el('businessForm')?.addEventListener('submit', async event => {
        event.preventDefault();
        if (!el('businessName').value.trim()) return toast('상호 또는 장부 이름을 입력해 주세요.', 'error');
        const registration = el('registrationNumber').value.replace(/\D/g,'');
        if (registration && registration.length !== 10) return toast('사업자등록번호는 숫자 10자리로 입력해 주세요.', 'error');
        try {
          await AppService.setupBusiness({ businessType:el('businessType').value, businessName:el('businessName').value, representativeName:el('representativeName').value, registrationNumber:registration, siteName:el('siteName').value, openedOn:el('openedOn').value, broadIndustry:el('broadIndustry').value, industryCode:el('industryCode').value, industryName:el('industryName').value, vatPayerType:el('vatPayerType').value, ledgerStartYear:el('ledgerStartYear').value, address:el('address').value });
          state.config.ledgerStartYear = el('ledgerStartYear').value;
          ConfigAdapter.save(state.config);
          toast('사업자 정보를 이 기기에 저장했습니다.', 'success'); render();
        } catch (error) { diagnostic(error); }
      });

      el('supabaseForm')?.addEventListener('submit', async event => {
        event.preventDefault();
        try {
          const key = el('supabaseKey').value.trim();
          if (Utils.isSecretKey(key)) throw new Error('SECRET_KEY_NOT_ALLOWED');
          state.config.supabaseUrl = el('supabaseUrl').value.trim().replace(/\/$/,'');
          state.config.supabaseKey = key || APP_INFO.supabasePublishableKey;
          ConfigAdapter.save(state.config); remote.resetClient();
          toast('Supabase 공개 연결 설정을 저장했습니다.', 'success');
          await SyncService.runConnectionDiagnostics();
        } catch (error) { diagnostic(error); }
      });
      el('connectionDiagnosticButton')?.addEventListener('click', async () => {
        const result = await SyncService.runConnectionDiagnostics();
        if (result.api === 'ready' && result.anonymousIsolation === 'pass') toast('Data API 연결과 익명 RLS 격리를 확인했습니다.', 'success');
        else toast('Supabase 연결 진단에서 확인이 필요한 항목이 있습니다.', 'error');
      });
      el('googleLoginButton')?.addEventListener('click', async () => { try { await remote.signIn(); } catch (error) { diagnostic(error); } });
      el('logoutButton')?.addEventListener('click', async () => { try { await remote.signOut(); state.session=null; state.allowedUser=null; toast('로그아웃했습니다. 로컬 데이터는 유지됩니다.','success'); render(); } catch(error){ diagnostic(error); } });
      el('syncNowButton')?.addEventListener('click', async () => { try { await SyncService.connectAndSync(); toast('클라우드 동기화를 완료했습니다.','success'); render(); } catch(error){ diagnostic(error); } });
      el('backupButton')?.addEventListener('click', async () => {
        if (!confirm('백업 파일에는 거래처와 세무자료가 포함될 수 있습니다. 안전한 위치에 보관하시겠습니까?')) return;
        try {
          const backup = await AppService.exportBackup();
          const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `accounting-ledger-backup-${Utils.today()}-v${APP_INFO.version}.json`; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
          state.config.lastBackupAt = Utils.now(); ConfigAdapter.save(state.config); toast('JSON 백업 파일을 만들었습니다.','success'); render();
        } catch(error){ diagnostic(error); }
      });
      el('restoreButton')?.addEventListener('click', () => el('restoreFile').click());
      el('restoreFile')?.addEventListener('change', async event => {
        const file = event.target.files?.[0]; if (!file) return;
        if (!confirm('현재 로컬 데이터를 백업 파일 내용으로 교체합니다. 계속하시겠습니까?')) return;
        try { await AppService.restoreBackup(JSON.parse(await file.text())); toast('백업을 복원했습니다.','success'); render(); } catch(error){ diagnostic(error); }
      });
    }

    function showTerm(name, anchor) { showTooltip(TERM_HELP[name] || '쉬운 설명을 준비 중인 회계용어입니다.', anchor); }
    function showTooltip(text, anchor) {
      const tooltip = el('termTooltip'); tooltip.textContent = text; tooltip.hidden = false;
      const rect = anchor.getBoundingClientRect();
      const left = Math.min(window.innerWidth - tooltip.offsetWidth - 14, Math.max(14, rect.left));
      const top = rect.bottom + 8 + tooltip.offsetHeight > window.innerHeight ? rect.top - tooltip.offsetHeight - 8 : rect.bottom + 8;
      tooltip.style.left = `${left}px`; tooltip.style.top = `${Math.max(8,top)}px`;
    }
    function toast(message, type = '') {
      const node = document.createElement('div'); node.className = `toast ${type}`; node.innerHTML = `${icon(type==='error'?'circle-alert':type==='success'?'circle-check':'info')}<div>${Utils.escape(message)}</div>`;
      el('toastRegion').appendChild(node); refreshIcons(); setTimeout(()=>node.remove(),4200);
    }
    function diagnostic(error) { console.error('[AccountingLedger]', error); state.syncError = String(error?.message || error); toast(errorMessage(error),'error'); renderShellStatus(); }

    // 9. Shell lifecycle
    document.addEventListener('click', event => {
      if (!event.target.closest('.term-button') && !event.target.closest('#termTooltip')) el('termTooltip').hidden = true;
      if (window.innerWidth <= 780 && event.target.closest('[data-route]')) el('sidebar').classList.remove('open');
    });
    el('mobileMenuButton').addEventListener('click', () => el('sidebar').classList.toggle('open'));
    el('quickAddButton').addEventListener('click', () => routeTo('transactions'));
    window.addEventListener('hashchange', () => { state.route = (location.hash || '#dashboard').slice(1); render(); });
    window.addEventListener('online', () => { state.online=true; renderShellStatus(); toast('인터넷 연결이 복구되었습니다. 동기화할 수 있습니다.','success'); });
    window.addEventListener('offline', () => { state.online=false; renderShellStatus(); toast('오프라인입니다. 거래는 이 기기에 계속 저장됩니다.'); });

    async function init() {
      try {
        await storage.open();
        AppService.deviceId();
        await AppService.reload();
        state.ready = true;
        render();
        await SyncService.runConnectionDiagnostics();
        await SyncService.initializeAuth();
        render();
        if (!state.business) setTimeout(() => toast('사업자 정보를 설정하면 거래 입력을 시작할 수 있습니다.'), 500);
      } catch (error) {
        state.ready = false;
        el('app').innerHTML = `<div class="notice danger">${icon('circle-alert')}<div><strong>앱 저장소를 열지 못했습니다.</strong><br>${Utils.escape(errorMessage(error))}</div></div>`;
        diagnostic(error); refreshIcons();
      }
    }

    window.__ACCOUNTING_APP_TEST__ = Object.freeze({ APP_INFO, UPDATE_HISTORY, GuideService, AccountingDomain, Utils, DOMAIN_GUARDIANS, ARCH_GUARDIANS, GOVERNANCE_AGENTS });
    init();
  })();
  </script>
</body>
</html>
